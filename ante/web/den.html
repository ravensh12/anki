      .progbook .pb-spine::before, .progbook .pb-spine::after { content:""; position:absolute; left:2px; right:2px; height:4px;
        background:linear-gradient(#eccd63,#7a5f16); box-shadow:0 1px 1px rgba(0,0,0,.6), 0 -1px 0 rgba(255,255,255,.15); }
      .progbook .pb-spine::before { top:20px; } .progbook .pb-spine::after { bottom:20px; }
      .progbook .pb-cover { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px;
        min-width:188px; padding:16px 26px; overflow:hidden; border:1px solid rgba(201,162,39,.6); border-left:none;
        background:
          radial-gradient(120% 100% at 50% -10%, rgba(233,221,190,.16), transparent 55%),
          linear-gradient(125deg, rgba(255,255,255,.10) 8%, rgba(0,0,0,0) 30%),
          linear-gradient(#1a2e22,#0d1b14 70%,#0a1610);
        box-shadow: inset 0 1px 0 rgba(233,221,190,.18), inset 0 0 30px rgba(0,0,0,.55); }
      /* double gilt frame */
      .progbook .pb-cover::before { content:""; position:absolute; inset:5px; border:1.5px solid rgba(201,162,39,.42);
        border-radius:2px; pointer-events:none; box-shadow: inset 0 0 0 3px rgba(10,16,12,.35), inset 0 0 0 4px rgba(201,162,39,.18); }
      /* slow sheen sweeping across the leather */
      .progbook .pb-cover::after { content:""; position:absolute; top:-60%; left:-30%; width:40%; height:220%; pointer-events:none;
        background:linear-gradient(100deg, transparent, rgba(255,246,214,.22), transparent); transform:rotate(8deg);
        animation:pbSheen 6.5s ease-in-out infinite; }
      @keyframes pbSheen { 0%,72%{transform:translateX(-40px) rotate(8deg)} 100%{transform:translateX(360px) rotate(8deg)} }
      .progbook .pb-pages { width:8px; flex:none; align-self:stretch; border-radius:0 4px 4px 0;
        background:repeating-linear-gradient(180deg,#f6efdd 0 2px,#c7bb98 2px 3px); box-shadow: inset -2px 0 3px rgba(0,0,0,.45); }
      .progbook .pb-title { position:relative; z-index:1; font-family:var(--serif); font-weight:800; font-size:23px; line-height:1.02;
        text-align:center; letter-spacing:.16em; text-transform:uppercase; white-space:nowrap;
        background:linear-gradient(180deg,#f6e6ab 0%,#d8b23f 42%,#a97f16 58%,#f0d873 100%);
        -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
        filter:drop-shadow(0 1px 0 rgba(0,0,0,.55)) drop-shadow(0 0 10px rgba(201,162,39,.25)); }
      .progbook .pb-flourish { position:relative; z-index:1; width:78%; height:1px; background:linear-gradient(90deg,transparent,rgba(201,162,39,.85),transparent); }
      .progbook .pb-flourish::before { content:""; position:absolute; left:50%; top:50%; width:6px; height:6px;
        background:linear-gradient(135deg,#f0d873,#a97f16); transform:translate(-50%,-50%) rotate(45deg); box-shadow:0 0 5px rgba(201,162,39,.6); }
      .progbook .pb-ribbon { position:absolute; top:-4px; right:26px; z-index:2; width:12px; height:40px;
        background:linear-gradient(#e7c65b,#a97f16); clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);
        box-shadow:0 4px 7px rgba(0,0,0,.5); }
      .progbook.won .pb-ribbon { background:linear-gradient(#5fb187,#23573f); }
      .progbook.won .pb-cover { border-color:rgba(63,143,107,.72); }
      .progbook:hover { transform:translateY(-3px) rotate(-.6deg) scale(1.02); filter:drop-shadow(0 22px 40px rgba(0,0,0,.65)); }
      .progbook:hover .pb-cover { border-color:var(--brass); }
      .progbook:active { transform:translateY(-1px) scale(1.005); }

      /* ---------------------- the rail medallions (the Circuit / the Rooms) ---------------------- */
      .rail button { position:relative; overflow:hidden; min-width:212px; padding:12px 16px 12px 15px; gap:13px;
        border:1px solid var(--rule); border-left:3px solid rgba(201,162,39,.5);
        background:linear-gradient(180deg, rgba(233,221,190,.06), rgba(0,0,0,0) 42%), linear-gradient(135deg,#16281e,#0d1b14 72%);
        box-shadow: inset 0 1px 0 rgba(233,221,190,.08), 0 8px 22px rgba(0,0,0,.42);
        transition:border-color .18s, color .18s, transform .18s, box-shadow .18s; }
      .rail button::after { content:""; position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity .25s;
        background:linear-gradient(115deg, transparent 40%, rgba(201,162,39,.16) 50%, transparent 60%); }
      .rail button:hover { color:var(--ink); border-color:var(--brass); border-left-color:var(--brass); transform:translateX(4px);
        box-shadow: inset 0 1px 0 rgba(233,221,190,.12), 0 12px 30px rgba(0,0,0,.5), -6px 0 22px rgba(201,162,39,.12); }
      .rail button:hover::after { opacity:1; }
      .rail .glyph { width:34px; height:34px; flex:none; display:flex; align-items:center; justify-content:center; font-size:16px;
        color:#20160a; border-radius:50%; border:1.5px solid rgba(233,221,190,.4);
        background:radial-gradient(circle at 50% 34%, #eccd63 0 40%, #a8811b 42% 66%, #caa227 68% 100%);
        box-shadow: inset 0 1px 2px rgba(255,255,255,.55), inset 0 -3px 5px rgba(0,0,0,.4), 0 2px 5px rgba(0,0,0,.45);
        transition:transform .18s, box-shadow .18s; }
      .rail button:hover .glyph { transform:rotate(-8deg) scale(1.07);
        box-shadow: inset 0 1px 2px rgba(255,255,255,.65), inset 0 -3px 5px rgba(0,0,0,.4), 0 0 13px rgba(201,162,39,.6); }
      .rail .rl { flex:1; font-family:var(--serif); font-size:14.5px; font-weight:700; letter-spacing:.01em; text-transform:none;
        color:var(--ink); line-height:1.14; }
      .rail .rl small { font-family:var(--mono); font-size:9.5px; letter-spacing:.05em; text-transform:uppercase;
        color:var(--faint); font-weight:400; margin-top:3px; }
      .rail button:hover .rl small { color:var(--soft); }
      .rail .badge { margin-left:0; align-self:center; }
      .rail .rl-go { flex:none; align-self:center; color:var(--faint); font-size:17px; line-height:1; transition:color .18s, transform .18s; }
      .rail button:hover .rl-go { color:var(--brass); transform:translateX(2px); }

      /* ---------------------- the Midnight Game (bigger, themed) ---------------------- */
      .mn-hero { position:relative; margin:-24px -24px 20px; padding:30px 26px 26px; overflow:hidden;
        background:radial-gradient(120% 90% at 80% -20%, rgba(201,162,39,.18), transparent 55%),
          linear-gradient(160deg,#0a1526 0%,#0c1b2c 45%,#0a1712 100%);
        border-bottom:1px solid rgba(201,162,39,.3); }
      .mn-moon { position:absolute; top:14px; right:30px; font-size:66px; line-height:1; color:#f2e6b8;
        text-shadow:0 0 24px rgba(240,224,150,.55), 0 0 60px rgba(201,162,39,.3); animation:lampFlicker 8s ease-in-out infinite; }
      .mn-stars { position:absolute; inset:0; opacity:.55; pointer-events:none; background-image:
          radial-gradient(1.5px 1.5px at 18% 32%, #fff, transparent), radial-gradient(1px 1px at 58% 20%, #cfe, transparent),
          radial-gradient(1.5px 1.5px at 84% 60%, #fff, transparent), radial-gradient(1px 1px at 38% 72%, #dde, transparent),
          radial-gradient(1px 1px at 70% 82%, #fff, transparent), radial-gradient(1px 1px at 46% 44%, #eef, transparent); }
      .mn-hero-t { position:relative; }
      .mn-kicker { font-family:var(--mono); font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--brass); }
      .mn-headline { font-family:var(--serif); font-style:italic; font-size:25px; font-weight:800; color:var(--ink);
        margin-top:6px; max-width:70%; text-shadow:0 2px 12px rgba(0,0,0,.6); }
      .mn-games { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
      @media (max-width:640px){ .mn-games { grid-template-columns:1fr; } .mn-headline { max-width:100%; font-size:21px; } }
      .mgame { display:flex; gap:14px; align-items:flex-start; padding:18px; border:1px solid var(--rule);
        border-top:2px solid rgba(201,162,39,.5); box-shadow:0 10px 26px rgba(0,0,0,.4);
        background:linear-gradient(180deg, rgba(233,221,190,.05), rgba(0,0,0,0) 45%), var(--panel2); }
      .mgame.done { opacity:.82; }
      .mgame .mg-ic { flex:none; width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:24px;
        color:var(--brass); border-radius:50%; border:1px solid rgba(201,162,39,.4);
        background:radial-gradient(circle at 50% 35%, rgba(201,162,39,.28), rgba(201,162,39,.04)); }
      .mgame .mg-b { flex:1; min-width:0; }
      .mgame .mg-h { display:flex; align-items:center; justify-content:space-between; gap:10px; }
      .mgame .mg-h b { font-family:var(--serif); font-size:18px; font-weight:800; color:var(--ink); }
      .mgame .mg-at { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--soft); white-space:nowrap; }
      .mreel { display:block; width:100%; text-align:left; margin-top:16px; padding:20px 22px; cursor:pointer; position:relative; overflow:hidden;
        border:1px solid rgba(201,162,39,.5); box-shadow:0 12px 30px rgba(0,0,0,.45);
        background:radial-gradient(120% 140% at 0% 0%, rgba(201,162,39,.16), transparent 46%), linear-gradient(160deg,#12271d,#0c1b13);
        transition:border-color .18s, transform .18s, box-shadow .18s; }

        background:var(--brass); padding:3px 9px; margin-bottom:9px; }
      .mreel-t { font-family:var(--serif); font-size:20px; font-weight:800; color:var(--ink); margin-bottom:4px; }

  <body>
    <div id="scenehold"></div>
    <div id="root"></div>
    <div id="ov"></div>
    <div id="film"></div>
    <div id="call"></div>
    <div id="sim"></div>
    <div id="toast"></div>
    <script>
      /* =======================================================================
         ANTE client. State, bridge, boot; the den; the rooms; the cinema.
         ======================================================================= */
      const S = { data:null, view:"boot", session:null, viva:null, reel:null, felt:null,
        ob:null, diag:null, film:null, filmShown:false, call:null, simOpen:false,
        ledger:null, quiz:null, fl:null, authPoll:null, studioPoll:null, voPlayed:false };
      const $ = (s,r=document)=>r.querySelector(s);
      const esc = (s)=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
      // for values interpolated into single-quoted JS strings inside onclick
      // attributes: JS-escape quotes/backslashes, then HTML-escape the rest
      const jsq = (s)=>esc((s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'"));
      const nice = (t)=>(t||"").replace(/^mcat::/,"").replace(/::/g," · ").replace(/_/g," ");
      const leaf = (t)=>{ const p=nice(t).split(" · "); return p[p.length-1]||nice(t); };
      const pycmdSafe = (c)=>{ if(window.pycmd) window.pycmd(c); };
      /* A write that can be awaited: resolves once the Qt bridge has run the
         handler (it returns a small ack), so a refetch right after sees the
         write. Falls back to resolving after a beat if the bridge is absent
         (plain-browser dev) or the callback never arrives — the felt must
         never hang on a lost ack. */
      const pycmdAck = (c)=>new Promise((resolve)=>{
        let settled=false;
        const done=(v)=>{ if(!settled){ settled=true; resolve(v||null); } };
        if(!window.pycmd){ setTimeout(()=>done(null), 60); return; }
        try{ window.pycmd(c, done); }catch(e){ done(null); }
        setTimeout(()=>done(null), 4000);
      });
      // the in-app page carries a per-boot token (window.ANTE_TOKEN) that the
      // engine requires on den endpoints; attach it to every engine URL
      const withTok = (u)=>window.ANTE_TOKEN ? u+(u.includes("?")?"&":"?")+"antetoken="+encodeURIComponent(window.ANTE_TOKEN) : u;
      const getJSON = (u)=>fetch(withTok(u)).then(r=>{ if(!r.ok) throw new Error("http "+r.status); return r.json(); });
      const b64 = (s)=>{ try{ return btoa(unescape(encodeURIComponent(s))); }catch(e){ return btoa(s); } };
      const pct = (x)=>(x==null?"—":Math.round(x*100)+"%");
      const ASSET = (n)=>withTok(`/_anki/anteAsset?name=${encodeURIComponent(n)}&v=2`);
      const STUDIO = (n)=>withTok(`/_anki/anteStudioAsset?name=${encodeURIComponent(n)}`);
      const SECNAME = { bio_biochem:"Bio / Biochem", chem_phys:"Chem / Phys", psych_soc:"Psych / Soc", cars:"CARS" };
      const AVATARS = [
        {id:"avatar_1", name:"The Scholar"}, {id:"avatar_2", name:"The Analyst"},
        {id:"avatar_3", name:"The Duchess"}, {id:"avatar_4", name:"The Anchor"},
        {id:"avatar_5", name:"The Strategist"}, {id:"avatar_6", name:"The Shark"},
      ];
      const store = {
        get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
        set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
      };
      // the simulator panel stays up unless the player explicitly closes it
      S.simOpen = store.get("anteSim")!=="closed";
      const session = {
        get(k){ try{ return sessionStorage.getItem(k); }catch(e){ return null; } },
        set(k,v){ try{ sessionStorage.setItem(k,v); }catch(e){} },
      };
      const todayKey = ()=>new Date().toISOString().slice(0,10);

      /* ---- game progress that survives leaving the room ----
         Every game saves a small snapshot after each answer (per account, in
         the engine) and restores it on open, so walking out — or quitting the
         app — never restarts progress. S.gameLocal shadows the engine copy for
         this run, so a refetch racing a just-fired save can't hand back a
         stale snapshot. */
      function gameState(id){
        if (S.gameLocal && id in S.gameLocal) return S.gameLocal[id]; // null = cleared
        return ((S.data||{}).game_state||{})[id] || null;
      }
      function saveGame(id, state){
        (S.gameLocal=S.gameLocal||{})[id]=state;
        pycmdSafe("angame:save:"+id+":"+b64(JSON.stringify(state)));
      }
      function clearGame(id){
        (S.gameLocal=S.gameLocal||{})[id]=null;
        pycmdSafe("angame:clear:"+id);
      }
      /* a per-day counter snapshot (the table / open felt tallies) */
      function todayGame(id){
        const g=gameState(id);
        return (g && g.date===todayKey()) ? g : null;
      }

      function toast(msg){ const t=$("#toast"); t.innerHTML=`<div class="toast">${esc(msg)}</div>`; setTimeout(()=>{ t.innerHTML=""; }, 3400); }
      // The nudge, rendered in-app: the Qt scheduler calls this for every
      // fired reminder so a notification is never invisible, whatever macOS
      // decides about banners. Clicking it takes your seat.
      let _nudgeTimer=null;
      window.anNudge = (title, body)=>{
        let host=$("#nudge"); if(!host){ host=document.createElement("div"); host.id="nudge"; document.body.appendChild(host); }
        host.innerHTML = `<div class="nudgecard" onclick="this.remove();seatGo&&seatGo()">
          <div class="nh"><span>☎</span> FROM THE DEN</div>
          <div class="nt">${esc(title||"Ante")}</div>
          <div class="nb">${esc(body||"The table's open.")}</div></div>`;
        clearTimeout(_nudgeTimer);
        _nudgeTimer=setTimeout(()=>{ const c=$(".nudgecard"); if(c) c.remove(); }, 9000);
      };
      function has(name){ return !!((S.data&&S.data.world_assets)||{})[name]; }
      function isDemo(){ return !!(S.data&&S.data.demo&&S.data.demo.enabled); }
      // Anki's QtWebEngine ships without proprietary codecs: H.264 mp4 decodes
      // to a black rectangle. WebM (VP9) first, mp4 second, stills as fallback.
      function vid(base, attrs){
        const srcs = [];
        if (has(base+".webm")) srcs.push(`<source src="${ASSET(base+".webm")}" type="video/webm">`);
        if (has(base+".mp4"))  srcs.push(`<source src="${ASSET(base+".mp4")}" type="video/mp4">`);
        if (!srcs.length || !has(base+".webm")) return null; // no decodable video
        return `<video ${attrs||`autoplay muted loop playsinline preload="auto"`}>${srcs.join("")}</video>`;
      }
      window.anStudioReady = ()=>{ if(S.view==="den"||$(".sheet")) loadData(true); };

      /* Living loops are short clips; a native <video loop> jump-cuts back to
         frame zero at the seam. This overlaps each pass with a second copy of
         the same clip and crossfades the last half-second, so the room
         breathes instead of restarting. */
      function seamlessify(v){
        if (!v || v._seam || !v.loop) return; v._seam=true;
        const host=v.parentElement; if(!host) return;
        if (getComputedStyle(host).position==="static") host.style.position="relative";
        const c=v.cloneNode(true); c._seam=true;
        c.removeAttribute("autoplay"); c.muted=true;
        if (getComputedStyle(v).position!=="absolute"){ c.style.position="absolute"; c.style.inset="0"; }
        c.style.opacity="0";
        c.style.transition="opacity .5s linear"; v.style.transition="opacity .5s linear";
        host.insertBefore(c, v.nextSibling);
        let a=v, b=c, busy=false;
        const F=.55; // seconds of overlap at the seam
        function tick(){
          if (!a.isConnected || !b.isConnected) return; // scene was torn down
          const d=a.duration;
          if (!busy && d && isFinite(d) && d>2 && a.currentTime>d-F){
            busy=true;
            try{ b.currentTime=0; }catch(e){}
            const p=b.play(); if(p&&p.catch) p.catch(()=>{});
            b.style.opacity="1"; a.style.opacity="0";
            setTimeout(()=>{ try{ a.pause(); }catch(e){} const t=a; a=b; b=t; busy=false; }, F*1000+120);
          }
          requestAnimationFrame(tick);
        }
        const arm=()=>requestAnimationFrame(tick);
        if (v.readyState>=1) arm(); else v.addEventListener("loadedmetadata", arm, {once:true});
      }

      /* =============================== MUSIC ===============================
         A procedural noir-jazz trio — rain against the glass, a dark pad, and
         a slow swung rhythm section (walking bass, brushed ride, felt-piano
         comps) — so the den always has a card-room score with zero bundled
         audio. WebAudio only; starts as soon as the context is allowed
         (Anki's webview permits it), else on the first gesture; toggled from
         the HUD. */
      // The score is part of the room — always on, quietly (no toggle).
      const MUSIC = { ctx:null, master:null, on:false, built:false, timers:[], pref: true };
      function musicBuild(){
        if (MUSIC.built) return true;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          const ctx = new AC();
          const master = ctx.createGain(); master.gain.value = 0; master.connect(ctx.destination);
          // rain: looped noise through a slowly-breathing bandpass
          const len = 2 * ctx.sampleRate;
          const buf = ctx.createBuffer(1, len, ctx.sampleRate);
          const ch = buf.getChannelData(0);
          for (let i=0;i<len;i++) ch[i] = Math.random()*2-1;
          const rain = ctx.createBufferSource(); rain.buffer = buf; rain.loop = true;
          const band = ctx.createBiquadFilter(); band.type="bandpass"; band.frequency.value=700; band.Q.value=.6;
          const rainG = ctx.createGain(); rainG.gain.value = .11;
          rain.connect(band); band.connect(rainG); rainG.connect(master); rain.start();
          const bLFO = ctx.createOscillator(); bLFO.frequency.value = .05;
          const bAmt = ctx.createGain(); bAmt.gain.value = 260; bLFO.connect(bAmt); bAmt.connect(band.frequency); bLFO.start();
          // pad: a D-minor-9 voicing, detuned triangles through a dark lowpass
          const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=440; lp.Q.value=.4;
          const padG = ctx.createGain(); padG.gain.value = .07; lp.connect(padG); padG.connect(master);
          [73.42, 110.0, 146.83, 174.61, 220.0].forEach((f,i)=>{
            const o = ctx.createOscillator(); o.type="triangle"; o.frequency.value=f; o.detune.value=(i%2? 5:-4);
            const g = ctx.createGain(); g.gain.value = .5; o.connect(g); g.connect(lp); o.start();
          });
          const pLFO = ctx.createOscillator(); pLFO.frequency.value=.03;
          const pAmt = ctx.createGain(); pAmt.gain.value=.02; pLFO.connect(pAmt); pAmt.connect(padG.gain); pLFO.start();
          // shared echo for the piano, like the far corner of the room
          const delay = ctx.createDelay(2.0); delay.delayTime.value=.46;
          const fb = ctx.createGain(); fb.gain.value=.28; delay.connect(fb); fb.connect(delay);
          const dG = ctx.createGain(); dG.gain.value=.4; delay.connect(dG); dG.connect(master);
          // bass bus: warm, felted
          const bassLP = ctx.createBiquadFilter(); bassLP.type="lowpass"; bassLP.frequency.value=320; bassLP.Q.value=.5;
          const bassG = ctx.createGain(); bassG.gain.value=.85; bassLP.connect(bassG); bassG.connect(master);
          // brush bus: airy noise ticks
          const brushHP = ctx.createBiquadFilter(); brushHP.type="highpass"; brushHP.frequency.value=3800;
          const brushG = ctx.createGain(); brushG.gain.value=.7; brushHP.connect(brushG); brushG.connect(master);
          function bassNote(freq, t, vel){
            const o=ctx.createOscillator(); o.type="triangle"; o.frequency.value=freq;
            const g=ctx.createGain();
            g.gain.setValueAtTime(0,t);
            g.gain.linearRampToValueAtTime(vel||.34, t+.015);
            g.gain.exponentialRampToValueAtTime(.001, t+1.05);
            o.connect(g); g.connect(bassLP); o.start(t); o.stop(t+1.15);
          }
          function brush(t, vel){
            const n=ctx.createBufferSource(); n.buffer=buf; n.loop=true;
            n.playbackRate.value=1+Math.random()*.2;
            const g=ctx.createGain();
            g.gain.setValueAtTime(0,t);
            g.gain.linearRampToValueAtTime(vel, t+.008);
            g.gain.exponentialRampToValueAtTime(.0005, t+.09);
            n.connect(g); g.connect(brushHP); n.start(t, Math.random()); n.stop(t+.14);
          }
          function comp(tones, t, vel){
            tones.forEach((f,i)=>{
              const o=ctx.createOscillator(); o.type="triangle"; o.frequency.value=f; o.detune.value=(i%2?4:-3);
              const g=ctx.createGain();
              g.gain.setValueAtTime(0,t);
              g.gain.linearRampToValueAtTime((vel||.045)/tones.length*3, t+.02);
              g.gain.exponentialRampToValueAtTime(.0006, t+1.5);
              o.connect(g); g.connect(delay); g.connect(master); o.start(t); o.stop(t+1.6);
            });
          }
          function lick(scale, t){
            const f=scale[(Math.random()*scale.length)|0];
            const o=ctx.createOscillator(); o.type="sine"; o.frequency.value=f;
            const g=ctx.createGain();
            g.gain.setValueAtTime(0,t);
            g.gain.linearRampToValueAtTime(.11, t+.02);
            g.gain.exponentialRampToValueAtTime(.0004, t+2.2);
            o.connect(g); g.connect(delay); g.connect(master); o.start(t); o.stop(t+2.3);
          }
          // the changes: a slow noir cycle in D minor (i — iv — ♭VI — V7)
          const D2=73.42,F2=87.31,G2=98.0,A2=110.0,Bb2=116.54,C3=130.81,D3=146.83,E2=82.41,Fs2=92.5;
          const PROG = [
            { walk:[D2,F2,A2,C3],   comp:[293.66,349.23,440.0,523.25], scale:[293.66,349.23,392.0,440.0,523.25] },   // Dm9
            { walk:[G2,Bb2,D3,C3],  comp:[392.0,466.16,587.33,698.46], scale:[392.0,466.16,523.25,587.33,698.46] },  // Gm9
            { walk:[D2,F2,A2,G2],   comp:[293.66,349.23,440.0,523.25], scale:[293.66,349.23,392.0,440.0,523.25] },   // Dm9
            { walk:[A2,E2,Fs2,G2],  comp:[440.0,554.37,659.25,783.99], scale:[440.0,523.25,554.37,659.25] },         // A7
            { walk:[D2,F2,A2,C3],   comp:[293.66,349.23,440.0,523.25], scale:[293.66,349.23,392.0,440.0,523.25] },   // Dm9
            { walk:[Bb2,D3,F2,C3],  comp:[349.23,440.0,523.25,587.33], scale:[349.23,440.0,466.16,587.33] },         // B♭∆
            { walk:[G2,Bb2,D3,C3],  comp:[392.0,466.16,587.33,698.46], scale:[392.0,466.16,523.25,587.33,698.46] },  // Gm9
            { walk:[A2,Fs2,E2,G2],  comp:[440.0,554.37,659.25,783.99], scale:[440.0,523.25,554.37,659.25] },         // A7
          ];
          const BEAT = 60/64; // ~64bpm, unhurried
          let nextBeat = ctx.currentTime + .2, beatN = 0;
          function schedule(){
            while (nextBeat < ctx.currentTime + 1.4){
              if (MUSIC.on){
                const bar = (beatN/4)|0, beat = beatN%4;
                const chd = PROG[bar % PROG.length];
                bassNote(chd.walk[beat], nextBeat, beat===0?.5:.42);
                brush(nextBeat, beat%2 ? .075 : .055);                      // ride on every beat
                if (beat===1 || beat===3) brush(nextBeat+BEAT*2/3, .042);   // the swung skip-note
                if (beat===1 && Math.random()<.8) comp(chd.comp, nextBeat+BEAT*2/3, .07);
                if (beat===3 && Math.random()<.35) comp(chd.comp, nextBeat, .05);
                if (beat===2 && Math.random()<.5) lick(chd.scale, nextBeat+BEAT*(Math.random()<.5?0:2/3));
              }
              beatN++; nextBeat += BEAT;
            }
            if (nextBeat < ctx.currentTime) { nextBeat = ctx.currentTime + .2; } // fell behind (tab slept)
          }
          MUSIC.timers.push(setInterval(schedule, 400));
          MUSIC.ctx = ctx; MUSIC.master = master; MUSIC.built = true;
          return true;
        } catch(e) { return false; }
      }
      function musicSet(on, level){
        MUSIC.on = on;
        if (!MUSIC.built && on && !musicBuild()) return;
        if (!MUSIC.built) return;
        if (MUSIC.ctx.state === "suspended") MUSIC.ctx.resume().catch(()=>{});
        const target = on ? (level!=null?level:.38) : 0;
        try {
          MUSIC.master.gain.cancelScheduledValues(MUSIC.ctx.currentTime);
          MUSIC.master.gain.setTargetAtTime(target, MUSIC.ctx.currentTime, 1.2);
        } catch(e){}
      }
      function musicKick(){
        if (MUSIC.pref && !MUSIC.on) musicSet(true);
        else if (MUSIC.built && MUSIC.ctx.state === "suspended") MUSIC.ctx.resume().catch(()=>{});
      }

      /* ------------------------------- boot -------------------------------- */
      async function boot(){
        $("#root").innerHTML = `<div class="cover"><div><div class="spin"></div>
          <div class="mono" style="text-align:center;color:var(--soft);letter-spacing:.2em;font-size:11px">FINDING YOUR TABLE…</div></div></div>`;
        // the webview allows audio without a gesture; if this ever runs in a
        // stricter browser the pointerdown kick below picks it up instead
        if (MUSIC.pref) musicSet(true);
        await loadData(true);
      }
      async function loadData(force){
        let d;
        try { d = await getJSON("/_anki/anteData?budget=75"); }
        catch(e){ $("#root").innerHTML = `<div class="cover"><div class="err">Could not reach the engine. Reopen Ante.</div></div>`; return; }
        S.data = d;
        route();
      }
      function route(){
        const d = S.data;
        if (!d) return;
        renderSim();
        if (S.film) return; // the film owns the screen until it ends
        // the demo is a walk-in tour: it bypasses the door entirely
        if (!isDemo() && (d.signed_out || (d.auth && !d.auth.signed_in))) { S.view="gate"; return renderGate(); }
        if (d.profile && !d.profile.onboarded && !S.ob && !S.diag) { return filmStart(true); }
        if (S.ob) return renderOnboard();
        if (S.diag) return renderDiag();
        // the cold open plays once per sign-in / app launch (the demo triggers
        // it from the simulator instead, so time-travel stays snappy)
        if (!S.filmShown && !isDemo()) { return filmStart(false); }
        S.view="den";
        renderDen();
      }

      /* ============================ THE DEN ============================ */
      function renderDen(){
        const d=S.data, w=d.world||{}, night=w.night||{phase:"night"};
        document.documentElement.setAttribute("data-hour", night.phase||"night");
        const prof=d.profile||{}; const acct=(d.auth&&d.auth.account)||{};
        const avatarChip = avatarFace(prof.avatar, acct.name);
        const cities=w.cities||[]; const listedTotal=cities.reduce((a,c)=>a+(c.listed||0),0);

        ensureScene(night.phase);
        $("#root").innerHTML = `
          <div class="hud topbar">
            <div class="brand"><span class="tick"></span><div>ANTE<small>The Emerald Room</small></div></div>
            <div class="topright">
              ${standingChip(d)}
              <div class="chip avchip" onclick="openSettings()">${avatarChip}<span>${esc(acct.name||"player")}</span></div>
            </div>
          </div>
          <div class="rail">
            <div class="rail-h" aria-hidden="true">The Floor</div>
            <button onclick="openCircuit()"><span class="glyph">✈</span><span class="rl">The Circuit<small>mastery map — every section, every topic</small></span>${w.cities_beaten?`<span class="badge">${w.cities_beaten}</span>`:`<span class="rl-go" aria-hidden="true">›</span>`}</button>
            <button onclick="openRooms()"><span class="glyph">♠</span><span class="rl">The Rooms<small>oral exam · memory vault · daily games</small></span><span class="rl-go" aria-hidden="true">›</span></button>
          </div>
          <div class="hud seatbar">
            ${seatCard(w.seat, listedTotal)}
          </div>`;
        wireParallax();
        maybeRing();
        syncBackgroundPlayback(); // resume the room now that it's uncovered
      }

      /* The Progress Book — one bound ledger carrying the whole standing: the
         Book's line, the clock (days to the exam), and the run. Tap it for the
         full sheet of all three. */
      function standingChip(d){
        const won = !!((d.streak||{}).gift_card_earned);
        return `<button class="progbook ${won?"won":""}" onclick="openStanding()" title="your standing — the Book's line, the clock, and the run">
          <span class="pb-spine" aria-hidden="true"></span>
          <span class="pb-cover">
            <span class="pb-flourish" aria-hidden="true"></span>
            <span class="pb-title">Progress<br>Book</span>
            <span class="pb-flourish" aria-hidden="true"></span>
          </span>
          <span class="pb-pages" aria-hidden="true"></span>
          <span class="pb-ribbon" aria-hidden="true"></span>
        </button>`;
      }
      function avatarFace(avatar, name){
        if (avatar && has(avatar+".jpg")) return `<img src="${ASSET(avatar+".jpg")}" alt=""/>`;
        const initial=(name||"?").trim().charAt(0).toUpperCase()||"?";
        return `<span class="mono-face">${esc(initial)}</span>`;
      }
      // cards present in the collection but not tagged to any Circuit topic
      function untaggedCount(){
        const t=(S.data.topics||[]).find(x=>x.topic==="(untagged)");
        return t ? (t.total_cards||0) : 0;
      }
      function seatCard(seat, listedTotal){
        const d=S.data;
        if (!listedTotal && !isDemo()){
          const surveyed=!!(d.diagnostic&&d.diagnostic.taken);
          const untagged=untaggedCount();
          // cards ARE imported, just not seated at a table yet — offer to map
          // them onto the Circuit instead of telling the player to import again
          if (untagged>0){
            return `<div class="seat">
              <div><div class="kd">Your deck isn't seated yet</div>
                <div class="lb">${untagged} card${untagged===1?"":"s"} imported, not on a table</div>
                <div class="rs">Your cards aren't tagged by MCAT topic, so the Circuit can't place them. Seat the deck and Ante tags each card to its table — anything it can't confidently place stays unlisted (it won't guess).</div></div>
              <button class="gobtn" onclick='seatMyDeck()'>Seat my deck →</button></div>`;
          }
          return `<div class="seat">
            <div><div class="kd">Setting the table</div>
              <div class="lb">Dealing in your MCAT deck</div>
              <div class="rs">The full MCAT deck is built in — nothing to import, ever. ${surveyed?"Your tables are opening now.":"Play the buy-in game first so the Book knows your stack."}</div></div>
            <button class="gobtn" onclick='${surveyed?"openCircuit()":"openBuyin()"}'>${surveyed?"See the Circuit →":"The buy-in game →"}</button></div>`;
        }
        if (!seat) return "";
        return `<div class="seat">
          <div><div class="kd">Your seat is waiting</div><div class="lb">${esc(seat.label)}</div>
            <div class="rs">${esc(seat.reason||"")}</div></div>
          <button class="gobtn" onclick='seatGo()'>Take your seat →</button></div>
          ${seatTasks(seat)}`;
      }
      function seatTasks(seat){
        const d=S.data; const r=d.ritual||{};
        const slots=((d.study_plan||{}).today||{}).slots||[];
        const slotFor=(w)=>slots.find(s=>s.window===w)||null;
        // The games follow the clock in BOTH modes (the demo uses its simulated
        // hour) so the cards always agree with the headline. The engine only
        // banks morning reviews before noon, so an out-of-window card must not
        // pose as playable.
        const hour = isDemo() ? ((d.demo||{}).hour ?? 9) : new Date().getHours();
        const morningActive = hour < 12;
        const nightActive = hour >= 17;
        const state=(bk, window, active)=>{
          if(!bk) return null;
          if (bk.done) return {sub:"banked ✓", playable:false, short:"banked ✓"};
          if (!active) return window==="morning"
            ? {sub:"the morning window has passed — tonight still counts", playable:false, short:"window passed"}
            : {sub:"opens after dusk", playable:false, short:"opens after dusk"};
          const s=slotFor(window);
          const sub = s ? `~${s.flashcards||0} cards${(s.quiz||s.open)?` · ${(s.quiz||0)+(s.open||0)} questions`:""} · ${s.minutes}m`
                        : esc(bk.detail||"");
          return {sub, playable:true, short:"open now"};
        };
        const mSt=state(r.morning,"morning",morningActive), nSt=state(r.night,"night",nightActive);
        const extras=seatExtras();
        if(!mSt && !nSt) return extras?`<div class="tasks">${extras}</div>`:"";
        // When the seat CTA is itself the felt session, the two game cards
        // would only duplicate it — collapse them to one quiet status line so
        // the seat stays the single pulled-out chair.
        if (seat && seat.kind==="session"){
          const bit=(bk,st,glyph)=>bk&&st?`${glyph} ${esc(String(bk.label||"").toLowerCase())} — ${st.short}`:"";
          const line=[bit(r.morning,mSt,"☀"),bit(r.night,nSt,"☾")].filter(Boolean).join(" · ");
          return (line?`<button class="tasksline" onclick="openMidnight()">${line} ›</button>`:"")
               + (extras?`<div class="tasks">${extras}</div>`:"");
        }
        const row=(bk, window, glyph, st)=>{
          if(!bk||!st) return "";
          const on = st.playable ? `onclick="startGame('${window}')"` : "";
          const at = bk.done ? "✓" : (st.playable && bk.at ? `reminds ${esc(bk.at)}` : "");

      function renderFilmShot(){

            requestAnimationFrame(()=>{
              nxt.style.opacity="1"; cur.style.opacity="0";
              // freeze the outgoing plate: two VP9 decodes through a cross-
              // fade is exactly where weaker machines drop frames, and a
              // fading still is indistinguishable from a fading loop
              cur.querySelectorAll("video").forEach(o=>{ try{ o.pause(); }catch(e){} });

        // spool the shot's choreography to projector speed: the Web
        // Animations clock rescales every CSS delay and duration together,
        // so the authored beats keep their relative timing at any rate
        if (fx && fx.getAnimations && FILM_RATE!==CHOREO_BASE){
          requestAnimationFrame(()=>{ if(S.film!==f) return;
            fx.getAnimations({subtree:true}).forEach(a=>{ a.playbackRate = FILM_RATE/CHOREO_BASE; });
          });
        }

          const fill = i<f.i ? `<b style="transform:scaleX(1)"></b>` : (i===f.i?`<b id="barNow" style="transform:scaleX(0)"></b>`:"");

      // The cold open runs hot: Sahir reads at 1.4× (pitch preserved) and
      // the silent cuts shorten with him. Choreographed shots carry a minDur
      // so a short voice line can never cut a walkthrough before its animation
      // resolves. The CSS choreography and minDur floors were authored against
      // CHOREO_BASE — renderFilmShot spools every overlay animation by
      // RATE/BASE and the floors scale the same way, so raising FILM_RATE
      // speeds the entire film (voice, cuts, choreography) without desyncing
      // a shot.
      const FILM_RATE = 1.4;
      const CHOREO_BASE = 1.5;
      function filmPlay(){
        const f=S.film; if(!f||!f.started) return;
        const sc=FILM[f.i];
        clearTimeout(f.timer);
        if (f.audio){ try{ f.audio.pause(); }catch(e){} f.audio=null; }
        const floor=(ms)=>Math.max(ms, ((sc.minDur||0)*CHOREO_BASE)/FILM_RATE);
        let dur = floor(sc.dur/FILM_RATE); let advanced=false;
        // every callback below checks the shot token: audio events from a
        // shot that was skipped or jumped away from must never re-arm the
        // projector (a stale onloadedmetadata once advanced the wrong shot)
        const shot=f.i;
        const live=()=>S.film===f && f.i===shot;
        const adv=()=>{ if(advanced||!live()) return; advanced=true; filmNext(); };
        const rearm=(ms)=>{ if(!live()) return; clearTimeout(f.timer); f.timer=setTimeout(adv, ms); };
        const voName = `vo_film_${sc.vo}.mp3`;
        if (has(voName)){
          try {
            const a=new Audio(ASSET(voName)); f.audio=a; a.volume=.95;
            a.playbackRate=FILM_RATE; if("preservesPitch" in a) a.preservesPitch=true;
            a.onloadedmetadata=()=>{ if(live() && a.duration&&isFinite(a.duration)){ dur=floor((a.duration*1000)/FILM_RATE+500); armBar(dur); rearm(dur+350); } };
            a.onended=()=>{ const left=(f.shownAt||0)+dur-Date.now(); if(live()) setTimeout(adv, Math.max(350, left)); };
            a.onerror=()=>rearm(dur);
            a.play().catch(()=>rearm(dur));
          } catch(e){ f.timer=setTimeout(adv, dur); }
        }
        f.shownAt=Date.now();
        armBar(dur);
        f.timer=setTimeout(adv, dur+500);
      }
      // deep-link a shot by kind. Default is a freeze-frame (the e2e
      // walkthrough test and stills step the projector without racing its

      function filmJump(kind, roll){
        const f=S.film; if(!f) return;

      /* ===================== THE TABLE (a session) ===================== */

      async function tableBegin(){

      function motionOK(){ return !(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches); }
      /* A dry card-flick, synthesized so no audio is bundled. Reuses the room's
         WebAudio context (already unlocked by the click that started the hand). */
      function flickSfx(){
        try{
          const ctx = MUSIC && MUSIC.ctx; if(!ctx) return;
          const now = ctx.currentTime;
          const dur = 0.055;
          const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate*dur), ctx.sampleRate);
          const d = buf.getChannelData(0);
          for(let i=0;i<d.length;i++){ const k=1-i/d.length; d[i]=(Math.random()*2-1)*k*k; }
          const src=ctx.createBufferSource(); src.buffer=buf;
          const bp=ctx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=2500; bp.Q.value=0.7;
          const g=ctx.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.linearRampToValueAtTime(0.14, now+0.004);
          g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
          src.connect(bp).connect(g).connect(ctx.destination);
          src.start(now); src.stop(now+dur);
        }catch(e){}
      }
      /* Sahir for the deal: the Higgsfield "sahir_deal" clip of him actually

      function dealerCinemaMarkup(){
        return vid("sahir_deal") || vid("dealer_deal") || vid("dealer_idle")
          || (has("sahir_deal.jpg") ? `<img src="${ASSET("sahir_deal.jpg")}" alt="">`

      async function dealCinematic(card){
        const felt=$(".tablefelt"); if(!felt) return;
        const markup = dealerCinemaMarkup();
        const live = /<(video|img)/.test(markup); // a real dealer plate/clip vs. the inked silhouette
        felt.classList.add("dealing");
        const stage=document.createElement("div"); stage.className="dealstage"+(live?" live":"");
        stage.innerHTML=`<div class="glowpool"></div><div class="dealer2">${markup}</div>`;
        felt.appendChild(stage);
        const gone=()=>!document.body.contains(stage);
        const setV=(el,tx,ty,rot)=>{ el.style.setProperty("--tx",tx+"px"); el.style.setProperty("--ty",ty+"px"); el.style.setProperty("--rot",rot+"deg"); };
        // a small hand thrown down first (fewer over a live dealer — the clip
        // already shows him dealing; more with the silhouette for flourish)
        const N = live ? 1 : 3;
        for(let i=0;i<N;i++){
          if(gone()) return;
          const el=document.createElement("div"); el.className="fly";
          el.innerHTML=`<div class="cardback"></div>`;

      function tableLoading(){ const b=$(".tablefelt"); if(b) b.innerHTML=`<div class="spin"></div>`; }

      /* ---- the table tutor: interrogate the card you just played ----

      function tutorHost(){

        t.busy=false;
        t.msgs.push({who:"sahir", offline: !(out&&out.available),
          text: (out&&out.reply) || "The line dropped — ask me again."});
        tutorRefresh();
      }
      function chipsHtml(n, raked){
        let out=`<div class="stake ${raked?"raked":""}">`;
        const cls=["","g","","r",""];
        for(let i=0;i<n;i++) out+=`<span class="pchip ${cls[i%5]}"></span>`;
        return out+`</div>`;
      }
      function tableCard(s){
        const c=s.card;
        const chips=chipsHtml(stakeFor(c.topic), s.raking);
        const ans = s.showAns
          ? `<div class="a">${c.answer.replace(c.question,"")||c.answer}</div>`
          : "";
        const controls = s.showAns
          ? `<div class="easeRow">
               <button class="e1" onclick="tableAnswer(1)">Again</button>
               <button class="e2" onclick="tableAnswer(2)">Hard</button>
               <button class="e3" onclick="tableAnswer(3)">Good</button>
               <button class="e4" onclick="tableAnswer(4)">Easy</button></div>
             <div class="note" style="margin-top:8px;font-size:12px">Again returns it to the shoe — the House rakes the chips for now.</div>
             ${tutorHtml()}`
          : (s.conf==null
            ? `<div class="note" style="margin-top:10px">Before it turns — where are you?</div>
               <div class="conf"><button onclick="tableReveal(0.2)">Check<small>guessing</small></button>
               <button onclick="tableReveal(0.5)">Call<small>probably</small></button>
               <button onclick="tableReveal(0.85)">Raise<small>certain</small></button></div>`
            : `<div class="row" style="margin-top:12px"><button class="btn primary big" onclick="tableFlip()">Turn it over</button></div>`);
        return `${dealerLine("Card up. " + (s.conf==null?"How do you stand before it turns?":"Turn it when you're ready."))}
          <div class="playcard">${chips}
            <div class="corner">A♠</div><div class="corner br">A♠</div>
            <div class="kind">recall · ${esc(leaf(c.topic||""))}</div>
            <div class="q">${c.question}</div>${ans}</div>${controls}`;
      }
      function tableReveal(conf){ S.session.conf=conf; renderTable(); }
      function tableFlip(){ S.session.showAns=true; renderTable(); }
      async function tableAnswer(ease){
        const s=S.session; if(!s || s.answering) return;
        s.answering=true;
        const c=(s.conf==null?"":s.conf);
        // real think-time (up to the moment of answering, before the rake beat)
        const ms=Math.max(0, Date.now()-(s.cardShownAt||Date.now()));
        if (ease===1 && !s.raking){
          s.raking=true; s.tally.raked++; renderTable();
          await sleep(560); // let the House rake the pot
        }
        // wait for the grade to land before dealing — otherwise the shoe can
        // hand the same card straight back. elapsed_ms carries the honest
        // response time so the review counts toward the streak and bookends.
        await pycmdAck("ananswer:"+ease+":"+(c!==""?c:"")+":"+ms);
        if (S.session!==s) return; // left the room mid-answer
        s.tally.cards++; tallySnapshot(s); tableLoading(); await sleep(140);
        if (S.session===s) tableAdvance();
      }
      function tallySnapshot(s){
        saveGame("table", {date:todayKey(), cards:s.tally.cards, quiz:s.tally.quiz, raked:s.tally.raked});
      }
      function tableRiver(s){
        const it=s.item;
        const tag=`<div class="rivertag">◆ The river · application — this moves the Circuit</div>`;
        if(it.type==="open"){
          if(s.qphase==="done"){
            const g=s.grade||{};
            const verdict = g.ungraded
              ? `<b>Couldn't grade that just now</b> — the line dropped. Your answer was recorded and still counts; no score to show.`
              : `<b>Score ${Math.round((g.score||0)*100)}%.</b> ${esc(g.feedback||"")}`;
            return `${tag}<div class="playcard river"><div class="kind">production · ${esc(leaf(it.topic||""))}</div>
              <div class="q" style="font-size:20px">${esc(it.stem)}</div>
              <div class="a">${verdict}${g.model_answer?`<div class="note" style="margin-top:8px;color:#5c5340"><b>Model:</b> ${esc(g.model_answer)}</div>`:""}</div></div>
              ${tutorHtml()}
              <div class="row" style="margin-top:12px"><button class="btn primary" onclick="riverNext()">Continue →</button></div>`;
          }
          return `${tag}<div class="playcard river"><div class="kind">production · ${esc(leaf(it.topic||""))}</div>
            <div class="q" style="font-size:20px">${esc(it.stem)}</div>

            <div class="note" style="margin-top:8px">How sure?</div>
            <div class="conf"><button onclick="riverOpen(0.3)">Check<small>unsure</small></button><button onclick="riverOpen(0.6)">Call<small>fairly</small></button><button onclick="riverOpen(0.9)">Raise<small>confident</small></button></div>`;
        }
        const choices = it.choices.map((c,i)=>{
          let cls="choice";
          if(s.qphase==="done"){ if(i===it.correct_index) cls+=" correct"; else if(i===s.chosen) cls+=" wrong"; }
          const on = s.qphase? "" : `onclick="riverPick(${i})"`;
          return `<button class="${cls}" ${on}>${esc(c)}</button>`;
        }).join("");
        let tail="";
        if(s.qphase==="conf") tail=`<div class="note" style="margin-top:10px">Locked in. How sure?</div>
          <div class="conf"><button onclick="riverConf(0.3)">Check<small>unsure</small></button><button onclick="riverConf(0.6)">Call<small>fairly</small></button><button onclick="riverConf(0.9)">Raise<small>confident</small></button></div>`;
        else if(s.qphase==="done") tail=`${tutorHtml()}<div class="row" style="margin-top:12px"><button class="btn primary" onclick="riverNext()">Continue →</button></div>`;
        return `${tag}<div class="playcard river"><div class="kind">application · ${esc(leaf(it.topic||""))}</div>
          <div class="q" style="font-size:20px">${esc(it.stem)}</div><div class="choices">${choices}</div></div>${tail}`;
      }
      function riverPick(i){ S.session.chosen=i; S.session.qphase="conf"; renderTable(); }
      function riverConf(v){ const s=S.session; const ms=Date.now()-(s.shownAt||Date.now());
        pycmdSafe(`anquiz:${s.item.id}:${s.chosen}:${v}:${ms}`); s.conf=v; s.qphase="done"; renderTable(); }
      async function riverOpen(v){ const s=S.session; const ta=$("#oaText"); const a=ta?ta.value.trim():""; if(!a){ if(ta)ta.focus(); return; }
        const ms=Date.now()-(s.shownAt||Date.now()); s.answer=a; s.conf=v;
        let g=null; try{ g=await getJSON(`/_anki/anteGradeOpen?id=${encodeURIComponent(s.item.id)}&answer=${encodeURIComponent(a)}`);}catch(e){}
        await pycmdAck(`anopen:${s.item.id}:${v}:${ms}:${b64(a)}`);
        if (S.session!==s) return;
        // a failed grade fetch is not a 0% — say so instead of inventing a score
        s.grade=g||{ungraded:true}; s.qphase="done"; renderTable(); }
      async function riverNext(){ const s=S.session; if(!s) return;
        s.tally.quiz++; tallySnapshot(s); tableLoading(); await sleep(140); if (S.session===s) tableAdvance(); }

      function sceneFigure(sc){
        const media = sc.motion
          ? `<video class="scene-clip" autoplay loop muted playsinline><source src="${STUDIO(sc.motion)}" type="video/mp4"></video>`

        return `<figure style="margin:0">${media}<figcaption class="note" style="margin-top:6px"><b>${esc(sc.title||"Vault scene")}.</b> ${esc(sc.caption||"")}</figcaption></figure>`;

      /* ===================== OPEN FELT (unlimited practice) ===================== */
      function openFelt(){
        musicKick();
        // the day's played count carries across visits — leaving never resets it
        const t=todayGame("felt");
        S.felt = { mode:"flash", last:"", n:(t&&t.n)||0, item:null, card:null, show:false, phase:null, chosen:null };

      async function feltNext(){
        const f=S.felt; if(!f) return;
        f.tutor=null; // each new card/question starts a fresh conversation

        try{
          const d = await getJSON(`/_anki/antePractice?mode=${f.mode}&scope=all&exclude=${encodeURIComponent(f.last)}`);

      function renderFeltLoading(){ const b=$(".sheet-b"); if(b) b.innerHTML=`<div class="spin"></div>`; else renderFelt(true); }

        const f=S.felt; if(!f) return;
        const tabs = `<div class="row" style="margin-bottom:14px">
          <button class="btn ${f.mode==="flash"?"primary":"ghost"}" onclick="feltMode('flash')">Flashcards</button>

            <div class="row" style="margin-top:14px">
              ${f.show?`<button class="btn primary" onclick="feltDraw()">Next card →</button>`

            const on = f.phase? "" : `onclick="feltPick(${i})"`;

          </div>`;
        } else body = `<div class="spin"></div>`;

      /* ===================== THE CIRCUIT (mastery map) ===================== */

      function openCircuit(){
        const w=S.data.world||{}; const cities=w.cities||[];

        const felt = `<div class="row" style="align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--rule);border-left:3px solid var(--brass);background:var(--panel2);padding:14px 16px;margin-top:14px">
          <div><b class="serif" style="font-size:17px">◇ Open Felt</b>
            <div class="note" style="font-size:12.5px;margin-top:2px">unlimited practice, off the clock — flashcards and questions from any table; spaced play stays the main game</div></div>
          <button class="btn primary" onclick="openFelt()">Play →</button></div>`;

          <div><b class="serif" style="font-size:17px">Seat your deck</b>

      function cityPanel(c){

      function cityCss(id){

      function tableTile(t){
        const stateWord={won:"won",open:"open",lowtable:"low table",roped:"roped off",unlisted:"unlisted"}[t.state]||t.state;

      /* ===================== THE BOOK (readiness + calibration) ===================== */

      function trackRecordHtml(rd){

        }

        const chips=(tr.checks||[]).slice(-4).map(c=>{
          const ok=c.within_range;
          return `<span class="mono" style="display:inline-block;margin:3px 6px 0 0;padding:2px 7px;border:1px solid var(--rule);border-radius:2px;font-size:11px;color:${ok?'var(--brass)':'var(--ember)'}">

            <div class="rng" style="padding-bottom:8px">honest range ${lo}–${hi} ${conf}</div></div></div>

      /* ===================== YOUR STANDING (Book + clock + run, one sheet) ===================== */
      function clockBlockHtml(d){
        const sp=d.study_plan||{}; const recal=d.recalibration||{};
        const days=((d.world||{}).exam_days_left==null)?null:d.world.exam_days_left;
        if (days==null || !sp.available){
          return `<hr class="hr"/><div class="seclabel">THE CLOCK</div>
            <div class="note" style="margin-top:8px">${esc(sp.reason||"No exam date on the books yet — set it in House Rules and the whole game retunes around it.")}</div>
            <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="openSettings()">Set the clock →</button></div>`;
        }
        const dr = recal.desired_retention?Math.round(recal.desired_retention*100):null;
        return `<hr class="hr"/><div class="seclabel">THE CLOCK</div>
          <div class="ledgerhead" style="margin-top:10px">
            <div class="stat"><b class="num">D−${sp.days_remaining}</b><span>to the final table</span></div>
            <div class="stat"><b class="num">${sp.daily_minutes}m</b><span>a night</span></div>
            ${dr?`<div class="stat"><b class="num">${dr}%</b><span>the blinds (retention)</span></div>`:""}
            <div class="stat"><b class="num">${sp.topics_remaining??"—"}</b><span>tables left</span></div>
          </div>
          ${recal.headline?`<div class="note" style="margin-top:8px">${esc(recal.headline)}</div>`:""}
          <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="openLedger()">Open the Ledger — the plan, night by night →</button></div>`;
      }
      function openStanding(){
        const d=S.data;
        const body = bookBoardHtml(d) + calibrationBlock(d) + clockBlockHtml(d)
          + `<hr class="hr"/><div class="seclabel">THE RUN</div><div style="margin-top:12px">${runBlockHtml(d)}</div>`;
        overlay(sheet("◈","Your standing","the Book · the clock · the run", body, false));
      }
      function calibrationBlock(d){
        const src=d.calibration_sources||{};
        const cal=src.combined||d.calibration||{};
        const flash=src.flashcard||{}, quiz=src.application||{};
        const comparison=src.comparison||{};
        const trust=d.self_trust||{};
        const pct=v=>Math.round((v||0)*100);
        let verdict = "NO READ YET", cls="none", detail="Answer with Check / Call / Raise and the Book learns whether your certainty can be trusted.";
        if (cal.available){
          const v=String(cal.verdict||"").toLowerCase();
          if (v.includes("over")){ verdict="OVERCONFIDENT"; cls="over"; detail="You say Raise and miss. The Book pulls your line down and widens the range until your word is good."; }
          else if (v.includes("under")){ verdict="UNDERCONFIDENT"; cls="under"; detail="You know more than you bet. Trust the reps — say Raise when you feel it."; }
          else { verdict="WELL CALIBRATED"; cls="well"; detail="When you say Raise, you're right. The Book takes your word — that's worth points on test day."; }
        }
        const score = trust.available!==false && trust.score!=null ? Math.round(trust.score) : null;

        // one bar of the felt-vs-real chart
        const calBar=(tag,val,kind)=>`<div class="calbar ${kind}">
            <span class="tag">${tag}</span>
            <div class="meter"><i style="width:${Math.max(2,Math.min(100,pct(val)))}%"></i></div>
            <b class="num">${pct(val)}%</b></div>`;

        // THE headline chart: how confident you said you were on the cards vs
        // how many quiz questions you actually landed.
        let headliner="";
        if (flash.available && quiz.available){
          const fconf=flash.avg_confidence||0, qacc=quiz.accuracy||0;
          const trap=fconf>qacc;
          headliner = `<div class="seclabel" style="margin-top:18px">CARDS SAID vs QUIZ PAID</div>
            <div class="calgroup lead-group">
              <div class="callabel"><span>the familiarity test</span><span>${flash.n} card reads · ${quiz.n} quiz answers</span></div>
              ${calBar("cards: felt", fconf, "felt")}
              ${calBar("quiz: real", qacc, trap?"real miss":"real")}
              <div class="calgap">On the cards you said you were <b>${pct(fconf)}%</b> sure — when the quiz reworded those facts, you landed <b>${pct(qacc)}%</b>${trap?` — a <b>${pct(fconf-qacc)}-point</b> bluff`:" — your word held"}.</div>
              ${comparison.available&&comparison.detail?`<div class="note" style="margin-top:8px">${esc(comparison.detail)}</div>`:""}
            </div>`;
        } else if (flash.available || quiz.available){
          headliner = `<div class="note" style="margin-top:12px">${flash.available?"Rate your confidence on a few quiz answers":"Rate a few flashcards (say how sure you are before the flip)"} and the Book can chart cards-said against quiz-paid.</div>`;
        }

        // per-source audit: what you felt vs what actually landed, per bank
        const srcGroup=(title,c)=>{
          if(!c.available) return `<div class="calgroup">
              <div class="callabel"><span>${title}</span></div>
              <div class="note" style="margin-top:6px">${esc(c.reason||"no rated answers yet")}</div></div>`;
          const gap=(c.avg_confidence||0)-(c.accuracy||0); const over=gap>0.02, under=gap<-0.02;
          const readout = over?`ran <b>+${pct(gap)} pts</b> hot`:(under?`ran <b>${pct(gap)} pts</b> cold`:"<b>dead even</b>");
          return `<div class="calgroup">
              <div class="callabel"><span>${title}</span><span>${c.n} rated · Brier ${c.brier!=null?Number(c.brier).toFixed(2):"—"}</span></div>
              ${calBar("felt", c.avg_confidence, "felt")}
              ${calBar("real", c.accuracy, over?"real miss":"real")}
              <div class="calgap">Confidence ${readout} against results · reads ${esc(c.verdict||"")}.</div>
            </div>`;
        };

        // reliability ladder: every confidence band, audited said-vs-got
        const bins=(cal.available&&cal.bins)||[];
        const ladder = bins.length ? `<div class="seclabel" style="margin-top:18px">THE RELIABILITY LADDER — EVERY CLAIM, AUDITED</div>
          ${bins.map(b=>{
            const off=pct(b.actual)-pct(b.predicted);
            return `<div class="calgroup" style="padding:9px 14px">
              <div class="callabel"><span>claimed ${Math.round(b.lo*100)}–${Math.round(b.hi*100)}%</span><span>${b.n} answer${b.n===1?"":"s"} · ${off===0?"exact":`${off>0?"+":""}${off} pts`}</span></div>
              ${calBar("said", b.predicted, "felt")}
              ${calBar("got", b.actual, off<0?"real miss":"real")}
            </div>`;}).join("")}
          <div class="note" style="margin-top:8px">Reading the ladder: the brass bar is how sure you claimed to be; the bar under it is how often you were actually right at that level of certainty. Matching bars = a tell the Book can trust.</div>` : "";

        // per-section table
        const rows=(cal.available&&cal.per_section)||[];
        const secTable = rows.length ? `<div class="seclabel" style="margin-top:18px">BY SECTION</div>
          <table class="caltable"><tr><th>section</th><th>rated</th><th>felt</th><th>real</th><th>read</th></tr>
          ${rows.map(s=>{
            const v=String(s.verdict||""); const vc=v.includes("over")?"over":(v.includes("under")?"under":"well");
            return `<tr><td>${esc(SECNAME[s.section]||s.section)}</td><td class="num">${s.n}</td>
              <td class="num">${pct(s.avg_confidence)}%</td><td class="num">${pct(s.accuracy)}%</td>
              <td><span class="calverd ${vc}">${esc(v)}</span></td></tr>`;}).join("")}</table>` : "";

        const audit = cal.available
          ? `<div class="calgap" style="margin-top:12px">Audited across <b>${cal.n}</b> rated answers · Brier <b>${Number(cal.brier).toFixed(2)}</b> (0 = perfect) · bias <b>${cal.bias>0?"+":""}${pct(cal.bias)} pts</b> ${cal.bias>0?"(hot)":(cal.bias<0?"(cold)":"")}</div>` : "";

        return `<hr class="hr"/>
          <div class="seclabel">CONFIDENCE CALIBRATION</div>
          <div class="bigword ${cls}">${verdict}</div>
          <div class="note" style="margin-top:10px">${detail}</div>
          ${score!=null?`<div class="row" style="justify-content:space-between;margin-top:14px"><span class="mono" style="font-size:10px;letter-spacing:.16em;color:var(--soft)">YOUR TELL</span><b class="num serif" style="font-size:26px">${score}</b></div>
          <div class="meter" style="margin-top:6px"><i style="width:${score}%"></i></div>`:""}
          ${headliner}
          ${srcGroup("FLASHCARDS — before the flip", flash)}
          ${srcGroup("THE QUIZ — under pressure", quiz)}
          ${ladder}
          ${secTable}
          ${audit}`;
      }

      /* ===================== THE LEDGER (calendar + recalibration) ===================== */
      function openLedger(){
        const d=S.data; const sp=d.study_plan||{}; const recal=d.recalibration||{};
        if (!sp.available){
          overlay(sheet("▦","The Ledger","the plan, night by night",
            `<div class="note">${esc(sp.reason||"Set your exam date in House Rules and the Ledger writes itself — every night from here to the final table.")}</div>
             <div class="row" style="margin-top:14px"><button class="btn primary" onclick="openSettings()">Set the clock →</button></div>`, false));
          return;
        }
        const dr = recal.desired_retention?Math.round(recal.desired_retention*100):null;
        const head = `<div class="ledgerhead">
          <div class="stat"><b class="num">D−${sp.days_remaining}</b><span>to the final table</span></div>
          <div class="stat"><b class="num">${sp.daily_minutes}m</b><span>a night</span></div>
          ${dr?`<div class="stat"><b class="num">${dr}%</b><span>the blinds (retention)</span></div>`:""}
          <div class="stat"><b class="num">${sp.topics_remaining??"—"}</b><span>tables left</span></div>
          <div class="note" style="flex:1;min-width:200px">${esc(recal.headline||"")}</div>
        </div>`;
        const phases=(sp.timeline||[]).filter(p=>p.id!=="sharpen");
        const phasebar = `<div class="phasebar">${phases.map(p=>
          `<div class="ph ${p.id}" style="flex:${Math.max(p.days,1)}" title="${esc(p.blurb||"")}">${esc(p.name)} · ${p.days}d</div>`).join("")}</div>`;
        const cal = sp.calendar||[];
        const miles = sp.milestones||[];
        S.ledger = { cal, mileByOffset:{}, mileByDate:{} };
        miles.forEach(m=>{ S.ledger.mileByOffset[m.offset]=m; if(m.date) S.ledger.mileByDate[m.date]=m; });
        const pad = cal.length ? (new Date(cal[0].date+"T12:00:00").getDay()||7)-1 : 0;
        const wk = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(x=>`<span>${x}</span>`).join("");
        let cells = "";
        for (let i=0;i<pad;i++) cells += `<div></div>`;
        cal.slice(0, 42-pad).forEach((dp,idx)=>{
          const m = S.ledger.mileByOffset[dp.offset];
          // the day's flag: exam > full-length > quiz checkpoint
          let flag = "";
          if (dp.is_exam || (m&&m.kind==="exam")) flag = `<div class="flag exam">★ Exam day</div>`;
          else if (m&&m.kind==="full_length") flag = `<div class="flag fl">◆ Full-length ${m.test_no||""}</div>`;
          else if (m&&(m.kind==="practice_test")) flag = `<div class="flag quiz">✎ Quiz checkpoint</div>`;
          const foc = dp.is_exam ? "The MCAT" : dp.is_rest ? "Rest night" : (dp.focus_label||"Review");
          const load = dp.is_exam||dp.is_rest ? "" : `<div class="load">${dp.minutes}m · ${dp.flashcards||0}🂠 ${(dp.quiz||0)+(dp.open||0)}◆</div>`;
          const sec = (dp.is_exam||dp.is_rest||!dp.section_abbr) ? "" : `<div class="sec">${esc(dp.section_abbr)}</div>`;
          cells += `<button class="cal ${dp.is_today?"today":""} ${dp.is_rest?"rest":""} ${dp.is_exam?"exam":""}" onclick="openDay(${idx})">
            <div class="phdot ${dp.phase}"></div>
            <div class="d"><span>${esc(dp.weekday)}</span><span>${esc((dp.date||"").slice(5))}</span></div>
            <div class="foc">${esc(foc)}</div>${sec}${load}${flag}</button>`;
        });
        const mileList = miles.slice(0,6).map(m=>{
          const act = m.kind==="full_length" ? `<button class="btn ghost" style="margin-left:auto" onclick="openFullLength(${m.test_no||1})">Sit it →</button>`
            : m.kind==="practice_test" ? `<button class="btn ghost" style="margin-left:auto" onclick="openPracticeQuiz()">Take it →</button>` : "";
          return `<div class="mile-row" style="align-items:center"><span class="when num">${esc(m.date||("D+"+m.offset))}</span>
            <div><b>${esc(m.label)}</b><div class="note" style="font-size:12.5px">${esc(m.detail||"")}</div></div>${act}</div>`;
        }).join("");
        const recalNote = `<hr class="hr"/><div class="seclabel">RECALIBRATION — THE CLOCK RETUNES THE GAME</div>
          <div class="note">Everything above is recomputed from your exam date: nightly minutes from the work left, retention ramping ${dr?`to ${Math.round((recal.desired_retention||0)*100)}%`:"up"} as the final table nears (Cepeda 2008), and no card scheduled past test day. Change the date in House Rules and the whole Ledger rewrites itself.</div>
          <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="openSettings()">Retune in House Rules →</button></div>`;
        overlay(sheet("▦","The Ledger",`the plan, night by night · ${esc(sp.exam_date||"")}`,
          head + phasebar + `<div class="calwk">${wk}</div><div class="calgrid">${cells}</div>` +
          (mileList?`<div class="seclabel" style="margin-top:16px">MARKED NIGHTS — QUIZZES & FULL-LENGTHS</div><div class="milelist">${mileList}</div>`:"") +
          recalNote, true));
      }

      /* ---- a single night's plan (click any calendar day) ---- */
      function openDay(idx){
        const L=S.ledger; if(!L) return; const dp=L.cal[idx]; if(!dp) return;
        const m=L.mileByOffset[dp.offset];
        const when = `${dp.weekday} · ${esc(dp.date||"")}${dp.is_today?" · tonight":""}`;
        let body;
        if (dp.is_exam){
          body = `<div class="daycard"><div class="dtop"><b>The MCAT</b><span class="stamp">Exam day</span></div>
            <div class="note" style="margin-top:10px">Trust the reps you've banked. One last morning game, then walk in.</div></div>`;
        } else if (dp.is_rest){
          body = `<div class="daycard"><div class="dtop"><b>Rest night</b></div>
            <div class="note" style="margin-top:10px">Rest is part of the schedule — a freeze night, no chain to break.</div></div>`;
        } else {
          const focus = dp.focus_label ? `${esc(dp.focus_label)} <span class="mono" style="font-size:11px;color:var(--brass)">· ${esc(dp.section_abbr||"")}</span>` : "Mixed review";
          const flTag = m&&m.kind==="full_length";
          const quizTag = m&&m.kind==="practice_test";
          const marker = flTag ? `<span class="stamp">◆ Full-length ${m.test_no||""}</span>`
            : quizTag ? `<span class="stamp" style="border-color:#7c9ec9;color:#bcd3f0">✎ Quiz checkpoint</span>` : "";
          body = `<div class="daycard">
            <div class="dtop"><b>${focus}</b>${marker}</div>
            <div class="note" style="margin-top:6px">${esc(({build:"Build phase — learn new tables, prove them.",bridge:"Bridge phase — connect topics, close gaps.",sharpen:"Sharpen phase — timed practice, taper in.",})[dp.phase]||"")}</div>
            <div class="plan">
              <div class="c"><b class="num">${dp.flashcards||0}</b><span>cards on the felt</span></div>
              <div class="c"><b class="num">${dp.quiz||0}</b><span>river questions</span></div>
              <div class="c"><b class="num">${dp.minutes}</b><span>minutes</span></div>
            </div>
            <div class="note" style="margin-top:12px">Two cues that day: the morning game (before coffee) and the midnight game (before sleep).</div>
            ${flTag?`<div class="row" style="margin-top:14px"><button class="btn primary" onclick="openFullLength(${m.test_no||1})">Sit full-length ${m.test_no||""} →</button><span class="note">every section, timed, scored</span></div>`:""}
            ${quizTag?`<div class="row" style="margin-top:14px"><button class="btn primary" onclick="openPracticeQuiz()">Take the quiz checkpoint →</button><span class="note">re-measure your baseline</span></div>`:""}
            ${(!flTag&&!quizTag&&!dp.is_rest)?`<div class="row" style="margin-top:14px"><button class="btn primary" onclick="openPracticeQuiz()">Play a practice quiz →</button>${dp.focus_tag?`<button class="btn ghost" onclick="$('#ov').innerHTML='';openTable('${jsq(dp.focus_tag)}')">Sit this table →</button>`:""}</div>`:""}
          </div>`;
        }
        overlay(sheet("▦", "Night plan", when, `${body}<div class="row" style="margin-top:14px"><button class="btn ghost" onclick="openLedger()">← Back to the Ledger</button></div>`, false));
      }

      /* ===================== PRACTICE QUIZ (checkpoint) ===================== */
      async function openPracticeQuiz(){
        musicKick();
        // an unfinished quiz picks up at the question it left, not at Q1
        const saved=gameState("quiz");
        if (saved && saved.n>0 && saved.n<saved.total){
          S.quiz = { n:saved.n, total:saved.total, correct:saved.correct||0, item:null, phase:null, chosen:null, last:saved.last||"" };
          toast(`Back at the quiz — resuming at question ${saved.n+1} of ${saved.total}.`);
        } else {
          if (saved) clearGame("quiz"); // fully answered last time — spent
          S.quiz = { n:0, total:6, correct:0, item:null, phase:null, chosen:null, last:"" };
        }
        quizNext();
      }
      async function quizNext(){
        const q=S.quiz; if(!q) return;
        if (q.n >= q.total){ return quizScore(); }
        overlay(sheet("✎","Practice quiz","application questions · scored at the end", `<div class="spin"></div>`, false));
        let d=null, failed=false;
        try{ d = await getJSON(`/_anki/antePractice?mode=mcq&scope=all&exclude=${encodeURIComponent(q.last)}`); }catch(e){ failed=true; }
        q.item = d&&d.item||null; q.phase=null; q.chosen=null;
        if(!q.item){
          if(failed && q.n===0){
            // a dead line before the first deal is not a 0% quiz
            overlay(sheet("✎","Practice quiz","",`<div class="err">Could not reach the engine.</div>
              <div class="row" style="margin-top:12px"><button class="btn primary" onclick="quizNext()">Retry</button>
              <button class="btn ghost" onclick="closeOverlay()">Close</button></div>`, false));
            return;
          }
          if(failed) q.errored=true;
          q.total=q.n; return quizScore();
        }
        q.last=q.item.id; renderQuiz();
      }
      function renderQuiz(){
        const q=S.quiz; const it=q.item; if(!it) return;
        const prog=Math.round(q.n/q.total*100);
        const choices = it.choices.map((c,i)=>{
          let cls="choice";
          if(q.phase==="done"){ if(i===it.correct_index) cls+=" correct"; else if(i===q.chosen) cls+=" wrong"; }
          const on=q.phase?"":`onclick="quizPick(${i})"`;
          return `<button class="${cls}" ${on}>${esc(c)}</button>`;
        }).join("");
        const body = `<div class="qzhead"><span class="mono" style="font-size:11px;color:var(--soft)">Q ${q.n+1} / ${q.total}</span>
            <div class="prog"><div class="meter"><i style="width:${prog}%"></i></div></div>
            <span class="mono" style="font-size:11px;color:var(--good)">${q.correct} right</span></div>
          <div class="tablefelt"><div class="playcard river"><div class="kind">application · ${esc(leaf(it.topic||""))}</div>
            <div class="q" style="font-size:19px">${esc(it.stem)}</div><div class="choices">${choices}</div></div></div>
          ${q.phase==="done"?`<div class="row" style="margin-top:12px"><button class="btn primary" onclick="quizAfter()">${q.n+1>=q.total?"See the score →":"Next →"}</button></div>`:""}`;
        overlay(sheet("✎","Practice quiz","application questions · scored at the end", body, false));
      }
      function quizPick(i){
        const q=S.quiz; if(q.phase) return;
        q.chosen=i; q.phase="done";
        if(i===q.item.correct_index) q.correct++;
        pycmdSafe(`anquiz:${q.item.id}:${i}:0.6:0`); // evidence still counts
        // snapshot the resume point: this question is answered, next is n+1
        saveGame("quiz", {n:q.n+1, total:q.total, correct:q.correct, last:q.item.id});
        renderQuiz();
      }
      function quizAfter(){ const q=S.quiz; q.n++; quizNext(); }
      function quizScore(){
        clearGame("quiz"); // the checkpoint is complete — nothing to resume
        const q=S.quiz; const pctv=q.total?Math.round(q.correct/q.total*100):0;
        const good=pctv>=80;
        overlay(sheet("✎","Practice quiz","checkpoint complete",
          `<div class="qzscore"><div class="big" style="color:${good?"var(--good)":"var(--brass)"}">${pctv}%</div>
            <div class="note">${q.correct} of ${q.total} — ${good?"above the mastery bar. Tables like this get won.":"below the bar; the Book routes the misses back to the low table."}</div></div>
          ${q.errored?`<div class="note" style="text-align:center;color:var(--ember)">The line dropped partway — this counts only the ${q.total} question${q.total===1?"":"s"} actually dealt.</div>`:""}
          <div class="note" style="text-align:center">Every answer fed your mastery map and calibration — a checkpoint is a real loop, not a throwaway.</div>
          <div class="row" style="justify-content:center;margin-top:16px"><button class="btn primary" onclick="openPracticeQuiz()">Another quiz</button>
            <button class="btn ghost" onclick="closeOverlay()">Done</button></div>`, false));
        S.quiz=null;
      }

      /* ===================== FULL-LENGTH ===================== */
      async function openFullLength(testNo){
        musicKick();
        overlay(sheet("◆",`Full-length ${testNo||1}`,"every section, timed in spirit, scored", `<div class="spin"></div>`, false));
        let d=null;
        try{ d = await getJSON(`/_anki/anteFullLength?test=${testNo||1}`); }catch(e){}
        if(!d||!d.sections){ overlay(sheet("◆","Full-length","",`<div class="note">The full-length is unavailable right now.</div>`,false)); return; }
        // an unfinished sitting resumes with every answer intact
        const saved = d.result ? null : gameState("fl"+d.test_no);
        const answers = (saved && saved.answers) || {};
        S.fl = { test:d.test_no, sections:d.sections, answers,
          open:(saved && saved.open!=null)?saved.open:0, submitted:d.result||null };
        const kept=Object.keys(answers).length;
        if (kept) toast(`Resuming full-length ${d.test_no} — ${kept} answer${kept===1?"":"s"} kept.`);
        renderFL();
      }
      function renderFL(){
        const f=S.fl; if(!f) return;
        if (f.submitted) return renderFLScore(f.submitted);
        const total = f.sections.reduce((a,s)=>a+s.items.length,0);
        const answered = Object.keys(f.answers).length;
        const secs = f.sections.map((s,si)=>{
          const open = f.open===si;
          const qs = open ? s.items.map(it=>{
            const chosen=f.answers[it.id];
            // the engine sends the answers as "options"
            const choices=(it.choices||it.options||[]).map((c,i)=>`<button class="choice ${chosen===i?"correct":""}" onclick="flPick('${jsq(it.id)}',${i})">${esc(c)}</button>`).join("");
            return `<div class="flq"><div class="stem">${esc(it.stem)}</div><div class="choices">${choices}</div></div>`;
          }).join("") : "";
          const done=s.items.filter(it=>f.answers[it.id]!=null).length;
          return `<div class="flsec"><div class="fh" onclick="flToggle(${si})"><span>${esc(s.name||SECNAME[s.id]||s.id)}</span><span class="n">${done}/${s.items.length} ${open?"▴":"▾"}</span></div>${qs}</div>`;
        }).join("");
        overlay(sheet("◆",`Full-length ${f.test}`,`every section, scored · ${answered}/${total} answered`,
          `<div class="note">Answer what you can — blanks score nothing, same as the real exam. Tap a section to open it. Every answer is saved as you go — leave any time and pick up where you stopped.</div>
           <div style="margin-top:12px">${secs}</div>
           <div class="row" style="margin-top:14px"><button class="btn primary" onclick="flSubmit()">Score the test →</button>
           <button class="btn ghost" onclick="openLedger()">Save for later</button></div>`, true));
      }
      function flToggle(si){ const f=S.fl; f.open = f.open===si?-1:si; flSnapshot(f); renderFL(); }
      function flSnapshot(f){
        if (Object.keys(f.answers).length) saveGame("fl"+f.test, {answers:f.answers, open:f.open});
      }
      function flPick(id,i){ const f=S.fl; f.answers[id]=i; flSnapshot(f); renderFL(); }
      function flSubmit(){
        const f=S.fl;
        pycmdSafe("anfl:"+f.test+":"+b64(JSON.stringify(f.answers)));
        clearGame("fl"+f.test); // submitted — the resume point is spent
        // score locally for instant feedback (the same scorer runs server-side)
        let total=0; const secOut=[];
        f.sections.forEach(s=>{
          let correct=0; s.items.forEach(it=>{ if(f.answers[it.id]===it.correct_index) correct++; });
          const n=s.items.length; const scaled=118+Math.round(14*(n?correct/n:0));
          total+=scaled; secOut.push({id:s.id,name:s.name,n,correct,scaled});
        });
        renderFLScore({test_no:f.test,sections:secOut,total});
      }
      function renderFLScore(r){
        const secs=(r.sections||[]).map(s=>`<div style="margin:10px 0"><div class="row" style="justify-content:space-between">
          <span>${esc(SECNAME[s.id]||s.name||s.id)}</span><b class="num">${s.scaled||"—"}</b></div>
          <div class="meter"><i style="width:${Math.round((((s.scaled||118)-118)/14)*100)}%"></i></div></div>`).join("");
        overlay(sheet("◆",`Full-length ${r.test_no}`,"scored",
          `<div class="qzscore"><div class="big" style="color:var(--brass)">${r.total||"—"}</div>
            <div class="note">A practice full-length — the Book folds this into your honest line, it never inflates it.</div></div>
          ${secs}
          <div class="row" style="justify-content:center;margin-top:16px"><button class="btn ghost" onclick="openLedger()">← The Ledger</button>
            <button class="btn primary" onclick="closeOverlay()">Done</button></div>`, false));
        S.fl=null;
      }

      /* ===================== THE ROOMS (submenu) ===================== */
      function openRooms(){
        const d=S.data;
        const vivaN=((d.viva||{}).suggested||[]).length;
        const vaultN=(d.palace_gallery||{}).count||0;
        const rooms = [

          {g:"❦", n:"The Vault", s:`memory aids — visual mnemonic scenes made for the cards you keep getting wrong${vaultN?` · ${vaultN} saved`:""}`, on:"openVault()"},
          {g:"☾", n:"The Midnight Game", s:"daily bookends — a short review when you wake and one before bed, ending with tonight's hardest cards replayed", on:"openMidnight()"},
