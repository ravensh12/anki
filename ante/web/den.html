 ANTE — the den. There is no dashboard: you open the app seated in the
 Emerald Room, a members-only card den above Canal Street, where Sahir deals
 your due cards onto green felt. Your opponent is the House — the forgetting
 curve. The mastery map is THE CIRCUIT (cities = sections, tables = topics);
 readiness is THE BOOK (which posts no line without evidence); the calendar
 is THE LEDGER; the oral defense is heads-up in the BACK ROOM; the memory
 palace is the VAULT.

 Backed by the same engine over mediasrv + the pycmd bridge; offline-safe:
 when the Higgsfield plates (gen_world.py) are absent, the room is drawn in
 CSS. Card text is NEVER baked into generated media — cards are crisp HTML
 composited over the cinematic plates. One rule survives every incarnation of
 this app, because Principle 2 demands it: THE SEAT — exactly one pulled-out
 chair pointing at the single best next action.
-->
<html lang="en" data-hour="night">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANTE · The Emerald Room</title>
    <style>
      :root {
        --serif: "Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
        --mono: ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,monospace;
        --sans: -apple-system,system-ui,"Segoe UI",Roboto,Helvetica,sans-serif;
        --felt:#0c1712; --panel:#12211a; --panel2:#182b21; --ink:#ece4cd;
        --soft:#b9b09a; --faint:#7d7862; --rule:#2a3c30; --rule-strong:#ece4cd;
        --brass:#c9a227; --good:#3f8f6b; --ember:#b5533c; --card:#f6efdd; --card-ink:#221c12;
        --glow:rgba(201,162,39,.35);
      }
      * { box-sizing: border-box; }
      html, body { height:100%; margin:0; overflow:hidden; }
      body { background:var(--felt); color:var(--ink); font-family:var(--sans); font-size:16px;
        line-height:1.6; -webkit-font-smoothing:antialiased; }
      .num { font-variant-numeric: tabular-nums; }
      .mono { font-family:var(--mono); } .serif { font-family:var(--serif); }
      ::selection { background:var(--brass); color:var(--felt); }

      /* ------------------------- motion vocabulary ------------------------- */
      @keyframes fade { from{opacity:0} to{opacity:1} }
      @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
      @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.98)} to{opacity:1;transform:none} }
      @keyframes dealIn { 0%{opacity:0;transform:translate(-60px,-90px) rotate(-9deg) scale(.9)}
        62%{opacity:1;transform:translate(5px,7px) rotate(1.8deg)} 100%{opacity:1;transform:none} }
      @keyframes flipIn { from{transform:rotateX(70deg);opacity:0} to{transform:none;opacity:1} }
      @keyframes rake { 0%{transform:none;opacity:1} 100%{transform:translate(190px,-36px) rotate(14deg);opacity:0} }
      @keyframes smokeDrift { 0%{transform:translate(-4%,2%) scale(1)} 50%{transform:translate(3%,-2%) scale(1.05)} 100%{transform:translate(-4%,2%) scale(1)} }
      /* rain falls by transform only (compositor-cheap; background-position
         repaints the whole band every frame and stutters in QtWebEngine).
         346.7px is exactly two periods of the 103° stripe pattern projected
         onto the vertical (39px / cos77° · 2), so the loop wraps seamlessly. */
      @keyframes rainShift { from{transform:translate3d(0,-346.7px,0)} to{transform:translate3d(0,0,0)} }
      @keyframes neonPulse { 0%,100%{opacity:.55} 40%{opacity:.75} 60%{opacity:.6} }
      @keyframes lampFlicker { 0%,100%{opacity:.9} 47%{opacity:.78} 52%{opacity:.95} 80%{opacity:.85} }
      @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:.5} }
      @keyframes ringPulse { 0%{box-shadow:0 0 0 0 rgba(201,162,39,.45)} 100%{box-shadow:0 0 0 26px rgba(201,162,39,0)} }
      @keyframes stampin { 0%{opacity:0;transform:scale(1.7) rotate(-10deg)} 60%{opacity:1;transform:scale(.94) rotate(-3deg)} 100%{opacity:1;transform:scale(1) rotate(-3deg)} }
      @keyframes bandgrow { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes floatUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
      @keyframes chipBob { 0%,100%{transform:none} 50%{transform:translateY(-2px)} }
      @keyframes kenburns { from{transform:scale(1.06) translate(1.2%, .8%)} to{transform:scale(1.14) translate(-1.2%, -.8%)} }
      @keyframes bigword { 0%{opacity:0;letter-spacing:.6em;filter:blur(6px)} 100%{opacity:1;letter-spacing:.18em;filter:none} }
      @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
      @media (prefers-reduced-motion: reduce) { *{animation:none !important; transition:none !important;} }

      /* ------------------------------ the room ------------------------------ */
      #scene { position:fixed; inset:0; overflow:hidden; background:var(--felt); transition:opacity .9s ease; }
      #scene .parallax { position:absolute; inset:-2.5%; will-change:transform; transition:transform .6s cubic-bezier(.2,.7,.2,1); }
      #scene video, #scene img.plate { position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
        filter:saturate(1.06) contrast(1.06); backface-visibility:hidden; transform:translateZ(0); }
      .vignette { position:absolute; inset:0; pointer-events:none;
        background: radial-gradient(ellipse at 50% 42%, rgba(0,0,0,0) 30%, rgba(4,9,6,.72) 100%); }
      .grain { position:absolute; inset:0; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
        background-image: repeating-conic-gradient(rgba(255,255,255,.6) 0 .00008turn, transparent 0 .00016turn); }

      /* the built-in room (no plates needed): window wall, rain, neon, felt, lamp */
      .cssden { position:absolute; inset:0; }
      .cssden .sky { position:absolute; inset:0 0 34% 0; transition:background 1.2s; }
      [data-hour="dawn"]  .cssden .sky { background: linear-gradient(#1a2431 0%, #4a3b33 55%, #b0793f 100%); }
      [data-hour="day"]   .cssden .sky { background: linear-gradient(#31404c 0%, #56646d 60%, #8b939a 100%); }
      [data-hour="dusk"]  .cssden .sky { background: linear-gradient(#171a2c 0%, #4c2c3c 55%, #c26a3a 100%); }
      [data-hour="night"] .cssden .sky { background: linear-gradient(#05070c 0%, #0d1420 60%, #1c2a3c 100%); }
      .cssden .skyline { position:absolute; left:0; right:0; bottom:34%; height:34%; opacity:.9;
        background:
          linear-gradient(transparent 62%, rgba(4,7,10,.96) 62%),
          repeating-linear-gradient(90deg, rgba(6,10,14,.95) 0 26px, rgba(10,16,22,.9) 26px 40px, rgba(4,7,10,.97) 40px 74px, rgba(12,19,26,.9) 74px 92px);
      }
      .cssden .lights { position:absolute; left:0; right:0; bottom:34%; height:26%; animation:neonPulse 7s ease-in-out infinite;
        background:
          repeating-linear-gradient(90deg, transparent 0 9px, rgba(240,196,84,.16) 9px 11px, transparent 11px 30px, rgba(120,190,220,.13) 30px 32px, transparent 32px 47px),
          repeating-linear-gradient(0deg, transparent 0 7px, rgba(232,170,90,.1) 7px 9px, transparent 9px 22px);
      }
      /* rain is clipped to the window band exactly (matching .sky) — it must
         never draw over the felt or the room reads as raining indoors. The
         streak sheet is an oversized child moved by transform (GPU-only). */
      .cssden .rain { position:absolute; inset:0 0 34% 0; opacity:.35; overflow:hidden; pointer-events:none; }
      .cssden .rain::before { content:""; position:absolute; left:-60px; right:-60px; top:-360px; bottom:-360px;
        background: repeating-linear-gradient(103deg, transparent 0 17px, rgba(190,214,220,.13) 17px 18px, transparent 18px 39px);
        animation:rainShift 1.35s linear infinite; will-change:transform; }
      [data-hour="day"] .cssden .rain { opacity:.14; }
      .cssden .mullions { position:absolute; inset:0 0 33% 0;
        background:
          repeating-linear-gradient(90deg, transparent 0 calc(20% - 5px), rgba(3,6,4,.9) calc(20% - 5px) 20%),
          linear-gradient(transparent calc(52% - 4px), rgba(3,6,4,.9) calc(52% - 4px) 52%, transparent 52%);
      }
      .cssden .felt { position:absolute; left:-12%; right:-12%; bottom:-26%; height:62%; border-radius:50% 50% 0 0;
        background: radial-gradient(ellipse at 50% 8%, #1d4030 0%, #143024 42%, #0b1d15 78%, #081510 100%);
        box-shadow: 0 -8px 60px rgba(0,0,0,.55) inset, 0 -2px 0 rgba(233,221,190,.06) inset; }
      .cssden .feltline { position:absolute; left:9%; right:9%; bottom:8%; height:38%; border-radius:50% 50% 42% 42%;
        border:2px solid rgba(201,162,39,.16); border-bottom:none; pointer-events:none; }
      .cssden .lamp { position:absolute; left:50%; top:-4%; width:56%; height:74%; transform:translateX(-50%);
        background: radial-gradient(ellipse at 50% 0%, rgba(240,206,120,.2) 0%, rgba(240,206,120,.05) 45%, transparent 70%);
        animation: lampFlicker 9s ease-in-out infinite; pointer-events:none; }
      .cssden .smoke { position:absolute; left:14%; right:14%; top:22%; height:44%; opacity:.14; filter:blur(14px);
        background: radial-gradient(ellipse at 30% 60%, #cfd8cd 0%, transparent 55%), radial-gradient(ellipse at 68% 38%, #cfd8cd 0%, transparent 50%);
        animation: smokeDrift 16s ease-in-out infinite; pointer-events:none; }

      /* Sahir — the plate when it exists, an inked silhouette otherwise */
      .dealer { position:absolute; left:50%; bottom:30%; transform:translateX(-50%); width:min(300px,34vw);
        pointer-events:none; filter: drop-shadow(0 18px 34px rgba(0,0,0,.5)); }
      .dealer video, .dealer img { width:100%; border-radius:6px 6px 0 0; display:block;
        mask-image: linear-gradient(#000 78%, transparent 100%); -webkit-mask-image: linear-gradient(#000 78%, transparent 100%); }
      .dealer svg { width:100%; display:block; opacity:.94; }

      /* -------------------------- HUD -------------------------- */
      .hud { position:fixed; left:0; right:0; z-index:30; pointer-events:none; }
      .hud > * { pointer-events:auto; }
      .topbar { top:0; display:flex; align-items:flex-start; justify-content:space-between; padding:18px 22px; gap:14px;
        background: linear-gradient(rgba(5,10,7,.82), rgba(0,0,0,0)); }
      .brand { font-family:var(--serif); font-weight:800; font-size:22px; letter-spacing:.16em; display:flex; align-items:center; gap:10px; text-shadow:0 2px 14px rgba(0,0,0,.6); }
      .brand .tick { width:6px; height:22px; background:var(--brass); display:inline-block; }
      .brand small { font-family:var(--mono); font-weight:400; font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--soft); display:block; margin-top:2px; }
      .topright { display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
      .chip { font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--soft);
        background:rgba(18,33,26,.86); border:1px solid var(--rule); padding:7px 11px; cursor:pointer; backdrop-filter:blur(4px); }
      .chip:hover { color:var(--ink); border-color:var(--brass); }
      .chip b { color:var(--ink); } .chip .dot { color:var(--brass); }
      .avchip { display:flex; align-items:center; gap:8px; }
      .avchip img { width:22px; height:22px; border-radius:50%; object-fit:cover; border:1px solid var(--brass); }
      .avchip .mono-face { width:22px; height:22px; border-radius:50%; background:var(--panel2); border:1px solid var(--brass);
        display:inline-flex; align-items:center; justify-content:center; font-size:11px; color:var(--brass); font-family:var(--mono); }

      /* ---------------------- the Progress Book (top-right standing) ---------------------- */
      .progbook { position:relative; display:inline-flex; align-items:stretch; height:104px; padding:0; border:none;
        background:none; cursor:pointer; filter:drop-shadow(0 16px 30px rgba(0,0,0,.55));
        transition:transform .22s cubic-bezier(.2,.7,.2,1), filter .22s ease; }
      .progbook .pb-spine { width:16px; flex:none; border-radius:5px 0 0 5px; position:relative;
        background:linear-gradient(90deg,#1c1405,#6d5413 34%,#8a6d1a 48%,#4f3d10 62%,#140e03);
        box-shadow: inset -3px 0 5px rgba(0,0,0,.55), inset 2px 0 0 rgba(233,221,190,.3); }
      .progbook .pb-spine::before, .progbook .pb-spine::after { content:""; position:absolute; left:2px; right:2px; height:4px;
        background:linear-gradient(#eccd63,#7a5f16); box-shadow:0 1px 1px rgba(0,0,0,.6), 0 -1px 0 rgba(255,255,255,.15); }
      .progbook .pb-spine::before { top:20px; } .progbook .pb-spine::after { bottom:20px; }
      .progbook .pb-cover { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px;
        min-width:188px; padding:16px 26px; overflow:hidden; border:1px solid rgba(201,162,39,.6); border-left:none;
        background:
          radial-gradient(120% 100% at 50% -10%, rgba(233,221,190,.16), transparent 55%),
          linear-gradient(125deg, rgba(255,255,255,.10) 8%, rgba(0,0,0,0) 30%),
          linear-gradient(#1a2e22,#0d1b14 70%,#0a1610);
        box-shadow: inset 0 1px 0 rgba(233,221,190,.18), inset 0 0 30px rgba(0,0,0,.55); }
      .progbook .pb-cover::before { content:""; position:absolute; inset:5px; border:1.5px solid rgba(201,162,39,.42);
        border-radius:2px; pointer-events:none; box-shadow: inset 0 0 0 3px rgba(10,16,12,.35), inset 0 0 0 4px rgba(201,162,39,.18); }
      .progbook .pb-cover::after { content:""; position:absolute; top:-60%; left:-30%; width:40%; height:220%; pointer-events:none;
        background:linear-gradient(100deg, transparent, rgba(255,246,214,.22), transparent); transform:rotate(8deg);
        animation:pbSheen 6.5s ease-in-out infinite; }
      @keyframes pbSheen { 0%,72%{transform:translateX(-40px) rotate(8deg)} 100%{transform:translateX(360px) rotate(8deg)} }
      .progbook .pb-pages { width:8px; flex:none; align-self:stretch; border-radius:0 4px 4px 0;
        background:repeating-linear-gradient(180deg,#f6efdd 0 2px,#c7bb98 2px 3px); box-shadow: inset -2px 0 3px rgba(0,0,0,.45); }
      .progbook .pb-title { position:relative; z-index:1; font-family:var(--serif); font-weight:800; font-size:23px; line-height:1.02;
        text-align:center; letter-spacing:.16em; text-transform:uppercase; white-space:nowrap;
        background:linear-gradient(180deg,#f6e6ab 0%,#d8b23f 42%,#a97f16 58%,#f0d873 100%);
        -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
        filter:drop-shadow(0 1px 0 rgba(0,0,0,.55)) drop-shadow(0 0 10px rgba(201,162,39,.25)); }
      .progbook .pb-flourish { position:relative; z-index:1; width:78%; height:1px; background:linear-gradient(90deg,transparent,rgba(201,162,39,.85),transparent); }
      .progbook .pb-flourish::before { content:""; position:absolute; left:50%; top:50%; width:6px; height:6px;
        background:linear-gradient(135deg,#f0d873,#a97f16); transform:translate(-50%,-50%) rotate(45deg); box-shadow:0 0 5px rgba(201,162,39,.6); }
      .progbook .pb-ribbon { position:absolute; top:-4px; right:26px; z-index:2; width:12px; height:40px;
        background:linear-gradient(#e7c65b,#a97f16); clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);
        box-shadow:0 4px 7px rgba(0,0,0,.5); }
      .progbook.won .pb-ribbon { background:linear-gradient(#5fb187,#23573f); }
      .progbook.won .pb-cover { border-color:rgba(63,143,107,.72); }
      .progbook:hover { transform:translateY(-3px) rotate(-.6deg) scale(1.02); filter:drop-shadow(0 22px 40px rgba(0,0,0,.65)); }
      .progbook:hover .pb-cover { border-color:var(--brass); }
      .progbook:active { transform:translateY(-1px) scale(1.005); }

      /* nav rail (the floor) — a grouped module in the upper-left under the
         brand; it balances the Progress Book at top-right and leaves the center
         of the room as the stage and the bottom for the seat console */
      .rail { position:fixed; left:22px; top:122px; z-index:30; display:flex; flex-direction:column; gap:9px; }
      .rail-h { font-family:var(--mono); font-size:9.5px; letter-spacing:.28em; text-transform:uppercase; color:var(--soft);
        margin:0 0 2px 3px; text-shadow:0 1px 8px rgba(0,0,0,.85); }
      .rail button { display:flex; align-items:center; gap:10px; background:rgba(18,33,26,.86); border:1px solid var(--rule);
        color:var(--soft); font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
        padding:10px 14px; cursor:pointer; backdrop-filter:blur(4px); transition:border-color .15s,color .15s, transform .15s; min-width:196px; text-align:left; }
      .rail button:hover { color:var(--ink); border-color:var(--brass); transform:translateX(3px); }
      .rail .glyph { font-size:15px; width:18px; text-align:center; color:var(--brass); }
      .rail .rl { display:flex; flex-direction:column; min-width:0; }
      .rail .rl small { font-size:10px; letter-spacing:.03em; text-transform:none; color:var(--faint); margin-top:1px; }
      .rail button:hover .rl small { color:var(--soft); }
      .rail .badge { margin-left:auto; background:var(--brass); color:var(--felt); border-radius:9px; font-size:10px; padding:1px 7px; }

      /* the seat card — the pulled-out chair, center of the room. A soft
         pool of light behind it keeps the bare status lines readable over
         the bright window without walling off the scene. */
      .seatbar { bottom:0; display:flex; flex-direction:column; align-items:center; gap:12px; padding:0 16px 26px;
        --console-w:684px;
        background: linear-gradient(rgba(4,9,6,0), rgba(4,9,6,.5) 38%, rgba(4,9,6,.93) 100%); }
      .seat { display:flex; align-items:center; gap:22px; width:100%; max-width:var(--console-w);
        background:linear-gradient(180deg, rgba(15,27,20,.97), rgba(9,16,12,.97)); border:1px solid var(--rule); border-top:2px solid var(--brass);
        color:var(--ink); padding:20px 20px 20px 24px; box-shadow:0 20px 54px rgba(0,0,0,.58), inset 0 1px 0 rgba(233,221,190,.1);
        animation:rise .5s ease both; backdrop-filter:blur(7px); }
      .seat > div:first-child { flex:1; min-width:0; }
      .seat .kd { font-family:var(--mono); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--brass); }
      .seat .lb { font-family:var(--serif); font-size:25px; font-weight:800; line-height:1.12; margin-top:4px; }
      .seat .rs { font-size:14px; color:var(--soft); margin-top:6px; max-width:46ch; line-height:1.5; }
      .seat .gobtn { font-family:var(--mono); font-size:12.5px; letter-spacing:.1em; text-transform:uppercase; margin-left:auto; border-radius:2px;
        background:var(--brass); color:var(--felt); border:none; padding:17px 26px; cursor:pointer; white-space:nowrap; transition:filter .15s, transform .1s; font-weight:700;
        box-shadow:0 8px 22px rgba(201,162,39,.32), inset 0 1px 0 rgba(255,255,255,.3);
        background-image:linear-gradient(110deg, rgba(255,255,255,0) 30%, rgba(255,255,255,.28) 50%, rgba(255,255,255,0) 70%); background-size:200% 100%; animation:shimmer 5s ease-in-out infinite; }
      .seat .gobtn:hover { filter:brightness(1.12); transform:translateY(-1px); } .seat .gobtn:active { transform:translateY(1px); }
      .feltlink { background:none; border:none; color:var(--faint); font-family:var(--mono); font-size:10.5px; letter-spacing:.1em;
        text-transform:uppercase; cursor:pointer; padding:2px 6px; }
      .feltlink:hover { color:var(--brass); }
      /* the seat's two-game task list — deliberately quieter than the seat:
         the seat is the one pulled-out chair, these are supporting rhythm */
      .tasks { max-width:var(--console-w); width:100%; animation:rise .5s ease both; }
      .taskrow { display:flex; gap:10px; }
      .task { flex:1; display:flex; align-items:center; gap:12px; background:rgba(9,17,12,.82); border:1px solid var(--rule);
        color:var(--soft); padding:12px 15px; cursor:pointer; text-align:left; backdrop-filter:blur(6px); transition:border-color .12s, color .12s, transform .12s; }
      .task:hover { border-color:var(--brass); color:var(--ink); transform:translateY(-1px); }
      .task.done { opacity:.72; } .task.done .tk-i { color:var(--good); }
      .task.marked { border-color:rgba(201,162,39,.5); border-left:3px solid var(--brass); }
      .taskcol { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
      .task.locked { opacity:.5; cursor:default; } .task.locked:hover { border-color:var(--rule); color:var(--soft); }
      .task .tk-i { font-size:16px; color:var(--brass); flex:none; }
      .task .tk-b { display:flex; flex-direction:column; min-width:0; }
      .task .tk-b b { font-family:var(--serif); font-size:13.5px; font-weight:700; color:var(--ink); }
      .task .tk-d { font-family:var(--mono); font-size:11px; letter-spacing:.03em; color:var(--soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .task .tk-at { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--faint); flex:none; }
      .tasksline { max-width:var(--console-w); width:100%; text-align:center; cursor:pointer;
        background:rgba(9,17,12,.55); border:1px solid var(--rule);
        font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft);
        padding:9px 12px; text-shadow:0 1px 6px rgba(0,0,0,.85); animation:rise .5s ease both; backdrop-filter:blur(6px);
        transition:border-color .12s, color .12s; }
      .tasksline:hover { color:var(--ink); border-color:var(--brass); }

      /* --------------------------- overlays --------------------------- */
      .scrim { position:fixed; inset:0; z-index:50; background:rgba(3,7,5,.66); backdrop-filter:blur(5px);
        display:flex; align-items:center; justify-content:center; padding:24px; animation:fade .3s ease both; }
      .sheet { background:var(--panel); border:1px solid var(--rule); border-top:2px solid var(--brass); width:100%; max-width:760px; max-height:92vh; overflow:auto;
        box-shadow:0 30px 80px rgba(0,0,0,.6); animation:cardIn .38s cubic-bezier(.2,.7,.2,1) both; }
      .sheet.wide { max-width:1040px; }
      .sheet:focus { outline:none; }
      .sheet-h { display:flex; align-items:center; gap:14px; padding:18px 24px; border-bottom:1px solid var(--rule); position:sticky; top:0; background:var(--panel); z-index:2; }
      .sheet-h .pin { font-size:20px; color:var(--brass); } .sheet-h .ttl { font-family:var(--serif); font-size:23px; font-weight:800; }
      .sheet-h .sub { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--soft); }
      .sheet-h .x { margin-left:auto; background:none; border:1px solid var(--rule); color:var(--soft); width:36px; height:36px; cursor:pointer; font-size:16px; }

      .btn { font-family:var(--mono); text-transform:uppercase; letter-spacing:.06em; font-size:12px; background:var(--panel2); color:var(--ink);
        border:1px solid var(--ink); padding:12px 18px; cursor:pointer; transition:background .12s,color .12s,transform .1s; }

      .btn.big { padding:15px 26px; font-size:13px; }
      .btn:disabled { opacity:.4; cursor:default; }
      .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      .note { font-size:14px; color:var(--soft); line-height:1.6; max-width:70ch; }
      .lead { font-family:var(--serif); font-size:19px; line-height:1.5; }
      .stamp { display:inline-block; font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
        border:2px solid var(--brass); color:var(--brass); padding:5px 10px; transform:rotate(-3deg); animation:stampin .4s ease both; }
      .stamp.won { border-color:var(--good); color:var(--good); }
      .meter { height:9px; background:var(--felt); border:1px solid var(--rule); overflow:hidden; }
      .meter > i { display:block; height:100%; background:var(--good); transform-origin:left; animation:bandgrow .7s ease both; }
      .kpi { font-family:var(--serif); font-weight:800; font-size:46px; letter-spacing:-.02em; }
      .kpi .rng { font-family:var(--mono); font-size:14px; color:var(--soft); letter-spacing:.02em; }
      .hr { border:none; border-top:1px solid var(--rule); margin:20px 0; }
      .seclabel { font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:var(--soft); text-transform:uppercase; margin-bottom:8px; }

      /* ------------------------------ the table ------------------------------ */
      .tablefelt { position:relative; border:1px solid var(--rule); padding:26px;
        background: radial-gradient(ellipse at 50% 0%, #1c3d2e 0%, #12291f 55%, #0d1e16 100%); overflow:hidden; }
      .tablefelt::before { content:""; position:absolute; inset:10px; border:1.5px solid rgba(201,162,39,.18); border-radius:14px; pointer-events:none; }
      .dealerline { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
      .dealerline .face { width:46px; height:46px; border-radius:50%; object-fit:cover; border:1.5px solid var(--brass); flex:none; background:var(--panel2); }
      .dealerline .facebox { width:46px; height:46px; border-radius:50%; border:1.5px solid var(--brass); flex:none; background:var(--panel2);
        display:flex; align-items:center; justify-content:center; overflow:hidden; }
      .dealerline .say { font-family:var(--serif); font-style:italic; font-size:14.5px; color:var(--soft); }
      /* heads-up: Sahir is present (living loop), larger at his own table */
      .dealerline.hu .hu-face { width:64px; height:64px; border-radius:50%; overflow:hidden; border:1.5px solid var(--brass);
        flex:none; background:var(--panel2); }
      .dealerline.hu .hu-face video, .dealerline.hu .hu-face img { width:100%; height:100%; object-fit:cover; object-position:50% 12%; display:block; }
      .dealerline.hu .say { font-size:15.5px; }
      .dealerline.hu.thinking .hu-face { animation:huThink 1.7s ease-in-out infinite; }
      @keyframes huThink { 0%,100%{ box-shadow:0 0 0 0 rgba(201,162,39,0); } 50%{ box-shadow:0 0 0 7px rgba(201,162,39,.15); } }
      /* the live table: a real conversation over the wire */
      .rtpanel { margin-top:12px; border:1px solid rgba(201,162,39,.45); background:linear-gradient(160deg, rgba(201,162,39,.07), transparent 55%), var(--panel2); padding:16px 18px; }
      .rtpill { display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--brass); margin-bottom:10px; }
      .rtpill .dot { width:7px; height:7px; border-radius:50%; background:var(--brass); animation:rtPulse 1.6s ease-in-out infinite; }
      .rtpill.err .dot { background:var(--ember); animation:none; }
      @keyframes rtPulse { 0%,100%{opacity:.35} 50%{opacity:1} }
      .rtcap { font-family:var(--serif); font-style:italic; font-size:16px; line-height:1.5; color:var(--ink); min-height:24px; }
      .rtyou { font-family:var(--mono); font-size:11.5px; color:var(--soft); margin-top:10px; min-height:16px; }
      .rtyou b { color:var(--brass); font-weight:600; }
      @media (prefers-reduced-motion: reduce){ .rtpill .dot { animation:none; } }
      .playcard { position:relative; background:var(--card); color:var(--card-ink); border-radius:8px; padding:26px 26px 22px;
        box-shadow:0 14px 34px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.35) inset; animation:dealIn .55s cubic-bezier(.2,.8,.25,1) both; min-height:150px; }
      .playcard .corner { position:absolute; top:10px; left:12px; font-family:var(--serif); font-weight:800; font-size:15px; color:var(--ember); }
      .playcard .corner.br { top:auto; left:auto; bottom:10px; right:12px; transform:rotate(180deg); }
      .playcard .q { font-family:var(--serif); font-size:23px; line-height:1.4; }
      .playcard .a { font-size:16.5px; border-top:1px dashed #c9bd9d; padding-top:14px; margin-top:14px; animation:flipIn .35s ease both; }
      .playcard .kind { font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#8a7c58; margin-bottom:8px; }
      .stake { position:absolute; top:-13px; right:16px; display:flex; gap:4px; animation:chipBob 3.5s ease-in-out infinite; }
      .stake.raked { animation:rake .55s ease both; }
      .pchip { width:26px; height:26px; border-radius:50%; border:2.5px dashed rgba(246,239,221,.9); box-shadow:0 3px 8px rgba(0,0,0,.45);
        background:radial-gradient(circle at 50% 40%, #e0bb45 0 34%, #8a6d14 36% 54%, #c9a227 56% 100%); }
      .pchip.g { background:radial-gradient(circle at 50% 40%, #58a87f 0 34%, #23573f 36% 54%, #3f8f6b 56% 100%); }
      .pchip.r { background:radial-gradient(circle at 50% 40%, #cf7257 0 34%, #6e2c1c 36% 54%, #b5533c 56% 100%); }

      /* ---- the deal cinematic: Sahir throws the hand; the top card turns into
             your flashcard. Card faces are never baked into media (Higgsfield
             plates are only the dealer); the backs + faces are crisp HTML. ---- */
      .tablefelt.dealing { min-height:420px; }
      /* keep the real card hidden AND un-animated while the deal plays, so its
         own dealIn (which fills to opacity:1) can't leak through; removing the
         class lets it deal itself into place as the cinematic fades out */
      .tablefelt.dealing .playcard { animation:none !important; opacity:0 !important; }
      .tablefelt.dealing .dealerline, .tablefelt.dealing .conf, .tablefelt.dealing .easeRow,
      .tablefelt.dealing .note, .tablefelt.dealing .tutor, .tablefelt.dealing .rivertag,
      .tablefelt.dealing .choices, .tablefelt.dealing .lead { opacity:0 !important; }
      /* the reveal: the real card cross-dissolves into place (no second flight),
         so the dealt hero card simply "becomes" your full flashcard */
      .tablefelt.revealing .playcard { animation:none !important; opacity:1; transition:opacity .45s ease; }
      .tablefelt.revealing .dealerline, .tablefelt.revealing .conf, .tablefelt.revealing .easeRow,
      .tablefelt.revealing .note, .tablefelt.revealing .tutor, .tablefelt.revealing .rivertag,
      .tablefelt.revealing .choices, .tablefelt.revealing .lead { animation:none; opacity:1; transition:opacity .45s ease .1s; }
      .dealstage { position:absolute; inset:0; z-index:6; overflow:hidden; pointer-events:none; transition:opacity .32s ease; }
      .dealstage.fade { opacity:0; }
      .dealstage .dealer2 { position:absolute; top:-10px; left:50%; width:172px; margin-left:-86px; opacity:.97;
        filter:drop-shadow(0 16px 30px rgba(0,0,0,.6)); animation:dealerSway 2.6s ease-in-out infinite; transform-origin:50% 90%; }
      .dealstage .dealer2 img, .dealstage .dealer2 video { width:100%; display:block; border-radius:7px;
        -webkit-mask-image:linear-gradient(#000 74%, transparent 100%); mask-image:linear-gradient(#000 74%, transparent 100%); }
      .dealstage .dealer2 svg { width:100%; display:block; }
      .dealstage .glowpool { position:absolute; left:50%; top:34%; width:340px; height:200px; margin-left:-170px;
        background:radial-gradient(ellipse at 50% 50%, rgba(240,206,120,.16), transparent 68%); pointer-events:none; }
      @keyframes dealerSway { 0%,100%{transform:rotate(-1.2deg)} 50%{transform:rotate(1.2deg)} }
      /* LIVE dealer: the Higgsfield clip of Sahir dealing fills the felt like a
         real dealer at the table; the hero card then flips up at the front. */
      .dealstage.live .dealer2 { position:absolute; inset:0; width:auto; height:100%; margin:0; animation:none;
        filter:none; opacity:1; }
      .dealstage.live .dealer2 video, .dealstage.live .dealer2 img { width:100%; height:100%; object-fit:cover; border-radius:8px;
        -webkit-mask-image:linear-gradient(180deg,#000 82%, transparent 100%); mask-image:linear-gradient(180deg,#000 82%, transparent 100%); }
      .dealstage.live::after { content:""; position:absolute; inset:0; pointer-events:none;
        background:radial-gradient(ellipse at 50% 30%, transparent 42%, rgba(4,9,6,.5) 100%); }
      .dealstage.live .glowpool { display:none; }
      .dealstage.live .fly { top:60%; }
      .dealstage.live .fly.hero { width:150px; height:210px; margin:-105px 0 0 -75px; }
      .dealstage.live .fly.hero .herocard .q { font-size:13.5px; }
      .fly { position:absolute; left:50%; top:46%; width:128px; height:180px; margin:-90px 0 0 -64px; }
      .cardback { position:absolute; inset:0; border-radius:10px; border:1px solid rgba(233,221,190,.55);
        background:
          repeating-linear-gradient(45deg, rgba(201,162,39,.16) 0 7px, transparent 7px 14px),
          repeating-linear-gradient(-45deg, rgba(201,162,39,.10) 0 7px, transparent 7px 14px),
          radial-gradient(circle at 50% 42%, #1f4835 0%, #123024 58%, #0b1e17 100%);
        box-shadow:0 14px 30px rgba(0,0,0,.55), inset 0 0 0 4px rgba(9,18,13,.65), inset 0 0 0 5px rgba(201,162,39,.4); }
      .cardback::before { content:""; position:absolute; inset:9px; border:1px solid rgba(201,162,39,.5); border-radius:5px; }
      .cardback::after { content:"\2660"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        font-size:40px; color:rgba(201,162,39,.85); text-shadow:0 2px 8px rgba(0,0,0,.6); }
      @keyframes dealThrow {
        0%   { opacity:0; transform:translate(-46px,-270px) rotate(-26deg) scale(.66); }
        26%  { opacity:1; }
        100% { opacity:1; transform:translate(var(--tx,0), var(--ty,0)) rotate(var(--rot,0deg)) scale(1); } }
      .fly.throw { animation:dealThrow .5s cubic-bezier(.2,.74,.24,1) both; }
      .fly.hero { perspective:1500px; z-index:3; }
      .fly.hero .flipper { position:absolute; inset:0; transform-style:preserve-3d; transition:transform .66s cubic-bezier(.2,.8,.2,1); }
      .fly.hero.turn .flipper { transform:rotateY(180deg); }
      .fly.hero .side { position:absolute; inset:0; border-radius:10px; overflow:hidden; backface-visibility:hidden; -webkit-backface-visibility:hidden; }
      .fly.hero .side.face { transform:rotateY(180deg); background:var(--card); color:var(--card-ink);
        box-shadow:0 16px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(201,162,39,.5), 0 1px 0 rgba(255,255,255,.4) inset; }
      .fly.hero .herocard { position:absolute; inset:0; padding:14px 14px 12px; display:flex; flex-direction:column; }
      .fly.hero .herocard .kind { font-family:var(--mono); font-size:7.5px; letter-spacing:.14em; text-transform:uppercase; color:#8a7c58; }
      .fly.hero .herocard .q { font-family:var(--serif); font-size:12px; line-height:1.25; color:var(--card-ink); margin-top:6px; overflow:hidden; }
      .fly.hero .herocard .mini-corner { position:absolute; top:7px; left:9px; font-family:var(--serif); font-weight:800; font-size:11px; color:var(--ember); }
      .fly.hero.pop { animation:heroPop .66s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes heroPop { 0%{transform:translate(var(--tx,0),var(--ty,0)) scale(1)} 100%{transform:translate(0,-4px) scale(1.16)} }
      .river { border-color:rgba(201,162,39,.5) !important; }
      .rivertag { font-family:var(--mono); font-size:11px; color:var(--brass); letter-spacing:.14em; text-transform:uppercase; margin-bottom:10px; }
      .choices { display:flex; flex-direction:column; gap:9px; margin-top:14px; }
      .choice { text-align:left; border:1px solid #b7ab8a; background:#efe6cf; color:var(--card-ink); padding:14px 16px; cursor:pointer; font-size:15px; border-radius:4px; transition:background .12s,transform .1s; }
      .choice:hover { background:#e6dcc2; } .choice:active { transform:translateY(1px); }
      .choice.correct { background:var(--good); color:#fff; border-color:var(--good); }
      .choice.wrong { background:var(--ember); color:#fff; border-color:var(--ember); }
      .conf { display:flex; gap:8px; margin-top:12px; }
      .conf button { flex:1; border:1px solid var(--rule); background:var(--panel2); color:var(--ink); padding:11px; cursor:pointer;
        font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
      .conf button:hover { border-color:var(--brass); color:var(--brass); }
      .conf button small { display:block; color:var(--faint); font-size:9px; letter-spacing:.03em; text-transform:none; }
      .easeRow { display:flex; gap:8px; margin-top:12px; }
      .easeRow button { flex:1; font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em;
        background:var(--panel2); color:var(--ink); border:1px solid var(--rule); border-bottom:3px solid var(--faint); padding:13px 8px; cursor:pointer; }
      .easeRow button:hover { border-color:var(--brass); }
      .easeRow .e1 { border-bottom-color:var(--ember); } .easeRow .e2 { border-bottom-color:var(--soft); }
      .easeRow .e3 { border-bottom-color:var(--good); } .easeRow .e4 { border-bottom-color:var(--brass); }
      textarea.answer { width:100%; min-height:110px; font-family:var(--serif); font-size:16px; padding:14px; border:1px solid #b7ab8a;
        background:#efe6cf; color:var(--card-ink); resize:vertical; border-radius:4px; margin-top:12px; }

      /* the table tutor — ask Sahir about the card just played */
      .tutor { margin-top:14px; border-top:1px dashed var(--rule); padding-top:12px; }
      .tutor .openbtn { background:none; border:1px solid var(--rule); color:var(--soft); font-family:var(--mono);
        font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; padding:8px 14px; cursor:pointer; }
      .tutor .openbtn:hover { border-color:var(--brass); color:var(--brass); }
      .tutor .chat { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow:auto; margin-bottom:10px; }
      .tutor .msg { max-width:86%; padding:9px 13px; font-size:13.5px; line-height:1.55; animation:rise .25s ease both; }
      .tutor .msg.you { align-self:flex-end; background:var(--panel2); border:1px solid var(--rule); color:var(--ink); }
      .tutor .msg.sahir { align-self:flex-start; background:rgba(201,162,39,.08); border:1px solid rgba(201,162,39,.35);
        color:var(--ink); font-family:var(--serif); }
      .tutor .msg.sahir.offline { border-style:dashed; color:var(--soft); }
      .tutor .msg.think i { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--brass); margin:0 2px;
        animation:pulse 1s ease-in-out infinite; }
      .tutor .msg.think i:nth-child(2){ animation-delay:.18s } .tutor .msg.think i:nth-child(3){ animation-delay:.36s }
      .tutor .ask { display:flex; gap:8px; }
      .tutor .ask input { flex:1; font-family:var(--sans); font-size:14px; padding:10px 12px; background:var(--panel2);
        border:1px solid var(--rule); color:var(--ink); }
      .tutor .ask input:focus { outline:none; border-color:var(--brass); }
      .tutor .ask button { font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
        background:var(--brass); color:var(--felt); border:none; padding:10px 16px; cursor:pointer; font-weight:700; }
      .tutor .ask button:disabled { opacity:.5; }
      .scene-clip { width:100%; border:1px solid var(--rule); background:#000; display:block; margin-top:8px; }
      .plate { width:100%; border:1px solid var(--rule); display:block; }

      /* ------------------------------ the circuit ------------------------------ */
      .citypanel { border:1px solid var(--rule); margin-bottom:18px; background:var(--panel2); }
      .cityhead { position:relative; padding:18px 20px; min-height:86px; display:flex; align-items:flex-end; gap:14px; overflow:hidden; }
      .cityhead .bgimg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.5; }
      .cityhead .bgcss { position:absolute; inset:0; }
      .cityhead .shade { position:absolute; inset:0; background:linear-gradient(rgba(7,13,10,.25), rgba(7,13,10,.88)); }
      .cityhead > div { position:relative; }
      .cityhead .stop { font-family:var(--mono); font-size:10px; letter-spacing:.2em; color:var(--brass); text-transform:uppercase; }
      .cityhead .cname { font-family:var(--serif); font-size:24px; font-weight:800; }
      .cityhead .croom { font-family:var(--mono); font-size:11px; color:var(--soft); letter-spacing:.08em; text-transform:uppercase; }
      .cityhead .flav { font-style:italic; font-family:var(--serif); color:var(--soft); font-size:13px; }
      .cityhead .tally { margin-left:auto; text-align:right; }
      .cityhead .tally b { font-family:var(--serif); font-size:22px; }
      .beaten { position:absolute; right:18px; top:14px; }
      .tables { display:grid; grid-template-columns:repeat(auto-fill, minmax(216px, 1fr)); gap:10px; padding:14px; }
      .tbl { position:relative; text-align:left; border:1px solid var(--rule); background:var(--panel); padding:14px 14px 12px; cursor:pointer; overflow:hidden; transition:border-color .15s, transform .15s; }
      .tbl:hover { border-color:var(--brass); transform:translateY(-2px); }
      .tbl .tname { font-family:var(--serif); font-size:18px; font-weight:800; line-height:1.22; color:var(--ink); letter-spacing:-.01em; }
      .tbl.s-won .tname { color:#d8ecd9; }
      .tbl .tmeta { display:flex; align-items:center; gap:6px; margin-top:9px; }
      .tbl .state { font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; padding:2px 7px; border:1px solid var(--rule); color:var(--soft); }
      .tbl.s-won .state { border-color:var(--good); color:var(--good); }
      .tbl.s-open .state { border-color:var(--soft); }
      .tbl.s-lowtable .state { border-color:var(--ember); color:var(--ember); }
      .tbl.s-roped { opacity:.65; } .tbl.s-roped .state { border-style:dashed; }
      .tbl.s-unlisted { opacity:.5; border-style:dashed; cursor:default; }
      .tbl .minichips { display:flex; gap:2.5px; margin-left:auto; }
      .tbl .minichips i { width:9px; height:9px; border-radius:50%; background:radial-gradient(circle at 50% 40%, #e0bb45 0 40%, #8a6d14 42% 60%, #c9a227 62% 100%); }
      .tbl .duebadge { position:absolute; top:8px; right:8px; background:var(--ember); color:#fff; font-family:var(--mono); font-size:10px; border-radius:9px; padding:1px 7px; }
      .tbl .dust { position:absolute; inset:0; pointer-events:none; background:linear-gradient(160deg, rgba(160,158,140,.0), rgba(160,158,140,.55)); }
      .tbl .plaque { position:absolute; top:8px; right:8px; font-size:13px; color:var(--good); }
      .finaltable { position:relative; border:1px solid var(--brass); padding:20px; margin-top:4px; overflow:hidden; min-height:90px; display:flex; align-items:center; gap:16px; }
      .finaltable .bgimg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.45; }
      .finaltable .shade { position:absolute; inset:0; background:linear-gradient(90deg, rgba(7,13,10,.9), rgba(7,13,10,.4)); }
      .finaltable > div { position:relative; }

      /* the book */
      .bookboard { border:1px solid var(--rule); background:#0a1410; padding:26px; font-family:var(--mono); position:relative; }
      .bookboard::before { content:""; position:absolute; inset:8px; border:1px dashed rgba(201,162,39,.25); pointer-events:none; }
      .noline { font-family:var(--serif); font-weight:800; font-size:38px; letter-spacing:.04em; color:var(--soft); }
      .noline b { color:var(--ember); }
      .lineval { color:var(--brass); }
      .bigword { font-family:var(--serif); font-weight:800; font-size:clamp(30px, 5.4vw, 54px); letter-spacing:.18em; text-transform:uppercase;
        line-height:1.1; animation:bigword .9s ease both; }
      .bigword.over { color:var(--ember); } .bigword.well { color:var(--good); } .bigword.under { color:#7c9ec9; } .bigword.none { color:var(--soft); }

      /* the confidence audit (felt vs real) */
      .calgroup { border:1px solid var(--rule); background:var(--panel2); padding:12px 14px; margin-top:10px; }
      .calgroup.lead-group { border-color:rgba(201,162,39,.5); }
      .callabel { font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--soft);
        display:flex; justify-content:space-between; gap:10px; }
      .calbar { display:grid; grid-template-columns:64px 1fr 46px; gap:10px; align-items:center; margin-top:8px; }
      .calbar .tag { font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); }
      .calbar .meter { height:11px; }
      .calbar > b { font-family:var(--mono); font-size:12px; text-align:right; }
      .calbar.felt .meter > i { background:var(--brass); }
      .calbar.real .meter > i { background:var(--good); }
      .calbar.real.miss .meter > i { background:var(--ember); }
      .calgap { font-family:var(--mono); font-size:11px; margin-top:9px; color:var(--soft); }
      .calgap b { color:var(--ink); }
      .caltable { width:100%; border-collapse:collapse; margin-top:8px; font-size:12.5px; }
      .caltable th { font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft);
        text-align:left; padding:5px 8px 5px 0; border-bottom:1px solid var(--rule); }
      .caltable td { padding:6px 8px 6px 0; border-bottom:1px solid var(--rule); }
      .calverd { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
      .calverd.over { color:var(--ember); } .calverd.well { color:var(--good); } .calverd.under { color:#7c9ec9; }

      /* the ledger (calendar) */
      .ledgerhead { display:flex; gap:22px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px; }
      .ledgerhead .stat b { display:block; font-family:var(--serif); font-size:26px; color:var(--ink); }
      .ledgerhead .stat span { font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); }
      .phasebar { display:flex; height:26px; border:1px solid var(--rule); overflow:hidden; margin-bottom:16px; }
      .phasebar .ph { display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--felt); min-width:40px; }
      .ph.build { background:#3f8f6b; } .ph.bridge { background:#c9a227; } .ph.sharpen { background:#b5533c; color:#fff; }
      .calwk { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; margin-bottom:5px; }
      .calwk span { font-family:var(--mono); font-size:9px; letter-spacing:.16em; color:var(--faint); text-transform:uppercase; text-align:center; }
      .calgrid { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
      .cal { border:1px solid var(--rule); background:var(--panel); min-height:92px; padding:7px 8px 22px; position:relative; text-align:left;
        cursor:pointer; overflow:hidden; transition:border-color .12s, transform .12s; color:var(--ink); width:100%; }
      .cal:hover { border-color:var(--brass); transform:translateY(-2px); }
      .cal .d { font-family:var(--mono); font-size:10px; color:var(--faint); display:flex; justify-content:space-between; }
      .cal .load { font-family:var(--mono); font-size:11px; color:var(--soft); margin-top:3px; }
      .cal .foc { font-family:var(--serif); font-size:13.5px; font-weight:700; line-height:1.2; margin-top:3px; color:var(--ink); }
      .cal .sec { font-family:var(--mono); font-size:9px; letter-spacing:.08em; color:var(--brass); text-transform:uppercase; margin-top:2px; }
      .cal.today { border-color:var(--brass); box-shadow:0 0 0 1px var(--brass) inset; }
      .cal.rest { opacity:.6; cursor:default; } .cal.rest:hover { transform:none; border-color:var(--rule); }
      .cal.rest .foc { color:var(--faint); font-style:italic; font-weight:400; }
      .cal.exam { border-color:var(--ember); background:linear-gradient(160deg, #2b1611, var(--panel)); }
      .cal .phdot { position:absolute; left:0; top:0; bottom:0; width:3px; }
      .cal .phdot.build { background:#3f8f6b; } .cal .phdot.bridge { background:#c9a227; } .cal .phdot.sharpen { background:#b5533c; }
      .cal .flag { position:absolute; left:0; right:0; bottom:0; font-family:var(--mono); font-size:8.5px; letter-spacing:.1em;
        text-transform:uppercase; text-align:center; padding:3px 2px; }
      .cal .flag.quiz { background:rgba(124,158,201,.22); color:#bcd3f0; }
      .cal .flag.fl { background:rgba(201,162,39,.28); color:var(--brass); font-weight:700; }
      .cal .flag.exam { background:rgba(181,83,60,.34); color:#f0c0b2; font-weight:700; }
      /* the day-detail sheet */
      .daycard { border:1px solid var(--rule); background:var(--panel2); padding:16px 18px; }
      .daycard .dtop { display:flex; align-items:baseline; gap:10px; }
      .daycard .dtop b { font-family:var(--serif); font-size:22px; font-weight:800; }
      .daycard .plan { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
      .daycard .plan .c { border:1px solid var(--rule); background:var(--panel); padding:10px; text-align:center; }
      .daycard .plan .c b { display:block; font-family:var(--serif); font-size:22px; }
      .daycard .plan .c span { font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--soft); }
      /* the practice-quiz / full-length runner */
      .qzhead { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
      .qzhead .prog { flex:1; }
      .qzscore { text-align:center; padding:12px 0; }
      .qzscore .big { font-family:var(--serif); font-weight:800; font-size:54px; }
      .flsec { border:1px solid var(--rule); margin-bottom:10px; }
      .flsec .fh { display:flex; justify-content:space-between; align-items:center; padding:11px 14px; background:var(--panel2);
        font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--brass); cursor:pointer; }
      .flsec .fh .n { color:var(--soft); }
      .flq { padding:14px; border-top:1px solid var(--rule); }
      .flq .stem { font-family:var(--serif); font-size:16px; margin-bottom:10px; }
      .milelist { margin-top:14px; display:flex; flex-direction:column; gap:8px; }
      .mile-row { display:flex; gap:12px; align-items:baseline; border-left:3px solid var(--rule); padding-left:12px; }
      .mile-row b { font-family:var(--serif); }
      .mile-row .when { font-family:var(--mono); font-size:10.5px; color:var(--brass); min-width:86px; }

      /* vault */
      .shelf { columns:2; column-gap:16px; } @media (max-width:640px){ .shelf{columns:1;} }
      .frame { break-inside:avoid; margin-bottom:16px; border:1px solid var(--rule); background:var(--panel2); }
      .frame .cap { padding:10px 12px; font-family:var(--serif); font-size:14px; }
      .frame .tp { font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--soft); padding:0 12px 10px; }

      /* reels (last hand / the Run) */
      .reel { background:#050a07; color:var(--ink); border:1px solid var(--rule); min-height:320px; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:16px; padding:30px; text-align:center; position:relative; overflow:hidden; }
      .reel .rline { font-family:var(--serif); font-size:22px; line-height:1.5; max-width:34ch; animation:floatUp .8s ease both; }
      .reel .rnum { font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--soft); }
      .reel img.bg, .reel video.bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.3; }
      .reel .bignum { font-family:var(--serif); font-weight:800; font-size:64px; color:var(--brass); }
      .reel .sunrise { position:absolute; inset:0; background:linear-gradient(#05070c 0%, #37273a 45%, #c9793a 85%, #edb45c 100%); opacity:.5; }
      .reeldots { display:flex; gap:6px; justify-content:center; margin-top:6px; }
      .reeldots i { width:7px; height:7px; border-radius:50%; background:var(--rule); }
      .reeldots i.on { background:var(--brass); }

      /* ------------------------------ the film ------------------------------ */
      .film { position:fixed; inset:0; z-index:70; background:#030705; overflow:hidden; }
      .film .shotmedia { position:absolute; inset:0; transition:opacity .9s ease; will-change:opacity; }
      .film .shotmedia video, .film .shotmedia img { width:100%; height:100%; object-fit:cover;
        filter:saturate(1.07) contrast(1.07) brightness(1.02); backface-visibility:hidden; transform:translateZ(0); }
      .film .shotmedia img.kb { animation:kenburns 11s ease-in-out both; }
      .film .shade { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 45%, rgba(0,0,0,.05) 20%, rgba(2,5,3,.78) 100%); }
      .film .bars { position:absolute; top:0; left:0; right:0; display:flex; gap:4px; padding:14px 18px; z-index:5; }
      .film .bars i { flex:1; height:3px; background:#243328; overflow:hidden; display:block; position:relative; }
      .film .bars i b { position:absolute; inset:0; transform-origin:left; background:var(--brass); display:block; }
      .film .skip { position:absolute; top:34px; right:18px; z-index:6; }
      .film .caption { position:absolute; left:0; right:0; bottom:11%; text-align:center; padding:0 26px; z-index:4; }
      .film .caption .line { font-family:var(--serif); font-size:clamp(22px, 3.4vw, 34px); font-weight:800; line-height:1.3; text-shadow:0 2px 18px rgba(0,0,0,.8); animation:floatUp .8s ease both; }
      .film .caption .sub { font-family:var(--mono); font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); margin-top:10px; animation:floatUp 1.1s ease both; }
      .film .bigband { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:4; text-align:center; padding:0 20px; }
      /* the deal: three flashcards arc out of Sahir's hand across the felt */
      @keyframes dealFan1 { 0%{opacity:0;transform:translate(90px,-260px) rotate(24deg) scale(.5)} 60%{opacity:1;transform:translate(-8px,10px) rotate(-8deg)} 100%{opacity:1;transform:translate(0,0) rotate(-6deg)} }
      @keyframes dealFan2 { 0%{opacity:0;transform:translate(0,-280px) rotate(10deg) scale(.5)} 60%{opacity:1;transform:translate(0,12px) rotate(2deg)} 100%{opacity:1;transform:translate(0,0) rotate(0.5deg)} }
      @keyframes dealFan3 { 0%{opacity:0;transform:translate(-90px,-260px) rotate(-20deg) scale(.5)} 60%{opacity:1;transform:translate(8px,10px) rotate(9deg)} 100%{opacity:1;transform:translate(0,0) rotate(6.5deg)} }
      .film .dealfan { position:absolute; left:50%; bottom:26%; transform:translateX(-50%); z-index:4;
        display:flex; gap:14px; align-items:flex-end; width:min(980px, 94vw); justify-content:center; }
      .film .dealfan .playcard { width:min(300px, 30vw); min-height:0; padding:18px 18px 14px; }
      .film .dealfan .fan { opacity:0; }
      .film .dealfan .f1 { animation:dealFan1 .9s cubic-bezier(.2,.85,.3,1) both; }
      .film .dealfan .f2 { animation:dealFan2 .9s cubic-bezier(.2,.85,.3,1) both; }
      .film .dealfan .f3 { animation:dealFan3 .9s cubic-bezier(.2,.85,.3,1) both; }
      .film .logo { display:flex; flex-direction:column; align-items:center; gap:14px; }
      .film .logo .mk { font-family:var(--serif); font-weight:800; font-size:clamp(46px, 9vw, 92px); letter-spacing:.22em; animation:bigword 1.4s ease both; }

      /* ---- the walkthrough act (shots 4–7): the game teaches itself ----
         Pure CSS choreography: every element is pre-rendered and driven by
         animation-delay (fill:both), so a re-render never desyncs the scene
         and there is zero timer state to leak. Initial invisibility always
         comes from the keyframes' 0% frame, never from base opacity — under
         prefers-reduced-motion everything is simply visible and static. */
      .film .walk { position:absolute; left:50%; top:11%; transform:translateX(-50%); z-index:4;
        width:min(980px, 96vw); display:flex; flex-direction:column; align-items:center; }
      .film .actband { font-family:var(--mono); font-size:10.5px; letter-spacing:.3em; text-transform:uppercase;
        color:var(--brass); border:1px solid var(--brass); padding:7px 16px; background:rgba(9,17,12,.72);
        margin-bottom:16px; animation:bigword .8s ease both; }
      @keyframes demoHide { to { opacity:0; visibility:hidden; } }
      @keyframes pressGold { 40%{ transform:scale(.94); } 100%{ background:var(--brass); color:var(--felt); border-color:var(--brass); } }
      @keyframes pressGreen { 40%{ transform:scale(.94); } 100%{ background:var(--good); color:#eaf6ee; border-color:var(--good); } }
      @keyframes tapring { 0%{ opacity:.95; transform:scale(.25); } 100%{ opacity:0; transform:scale(1.7); } }
      @keyframes pathdraw { to { stroke-dashoffset:0; } }
      @keyframes nodeOn { to { border-color:var(--brass); color:var(--ink); background:rgba(201,162,39,.1); } }
      @keyframes flowdot { from { left:-4px; opacity:0; } 15%{ opacity:1; } 85%{ opacity:1; } to { left:calc(100% - 6px); opacity:0; } }
      @keyframes svgFade { from { opacity:0; } to { opacity:1; } }

      /* shot 4 — a hand plays itself under a ghost cursor */
      .film .demohand { position:relative; width:min(520px, 92vw); height:412px; }
      .film .demohand .playcard { position:absolute; top:0; left:0; right:0; height:206px; overflow:hidden;
        padding:22px 22px 16px; animation:dealIn .55s cubic-bezier(.2,.8,.25,1) both; }
      .film .demohand .playcard .q { font-size:18.5px; }
      .film .demohand .playcard .a { font-size:15.5px; margin-top:12px; padding-top:12px; animation:flipIn .35s ease 5.75s both; }
      .film .demohand .dh-row { position:absolute; top:224px; left:0; right:0; }
      .film .demohand .dh-conf { animation:rise .4s ease .8s both, demoHide .3s ease 3.75s forwards; }
      .film .demohand .dh-conf .isPressed { animation:pressGold .35s ease 3s both; }
      .film .demohand .dh-turn { text-align:center; animation:rise .35s ease 3.9s both, demoHide .25s ease 5.5s forwards; }
      .film .demohand .dh-ease { animation:rise .4s ease 6.3s both; }
      .film .demohand .dh-ease .isPressed { animation:pressGreen .35s ease 8.2s both; }
      .film .demohand .dh-out { position:absolute; top:292px; left:0; right:0; text-align:center; }
      .film .demohand .dh-out .stamp { background:rgba(9,17,12,.85); animation:stampin .4s ease 9s both; }
      .film .demohand .dh-out .why { display:inline-block; font-family:var(--mono); font-size:11px; letter-spacing:.06em;
        color:var(--soft); margin-top:14px; padding:6px 12px; background:rgba(5,10,7,.82); border:1px solid var(--rule);
        animation:floatUp .5s ease 9.7s both; }
      .film .ghostcur { position:absolute; z-index:7; width:24px; height:24px; pointer-events:none;
        animation:ghostPath 12.2s linear both; filter:drop-shadow(0 3px 7px rgba(0,0,0,.75)); }
      @keyframes ghostPath {
        0%   { transform:translate(478px, 44px); }
        9%   { transform:translate(462px, 150px); }
        16%  { transform:translate(430px, 240px); }
        30%  { transform:translate(430px, 240px); }   /* dwell: press Raise @3s */
        41%  { transform:translate(254px, 240px); }   /* over Turn it over */
        46%  { transform:translate(254px, 240px); }   /* press @5.2s */
        62%  { transform:translate(322px, 240px); }   /* over Good */
        69%  { transform:translate(322px, 240px); }   /* press @8.2s */
        82%  { transform:translate(410px, 330px); }
        100% { transform:translate(452px, 348px); }
      }
      @media (max-width:560px){ @keyframes ghostPath {
        0%   { transform:translate(86vw, 44px); }
        16%  { transform:translate(76vw, 240px); }
        30%  { transform:translate(76vw, 240px); }
        41%  { transform:translate(45vw, 240px); }
        46%  { transform:translate(45vw, 240px); }
        62%  { transform:translate(57vw, 240px); }
        69%  { transform:translate(57vw, 240px); }
        100% { transform:translate(74vw, 340px); }
      } }
      .film .tapfx { position:absolute; z-index:6; width:34px; height:34px; margin:-17px 0 0 -17px; border-radius:50%;
        border:2.5px solid var(--brass); opacity:0; pointer-events:none; animation:tapring .55s ease-out both; }

      /* shot 5 — where the answer goes (pipeline + forgetting curve) */
      .film .engpipe { display:flex; align-items:stretch; justify-content:center; gap:0; width:min(760px, 94vw); margin-bottom:14px; }
      .film .engpipe .pnode { flex:1; border:1px solid var(--rule); background:rgba(9,17,12,.85); padding:10px 12px;
        text-align:center; color:var(--soft); animation:nodeOn .5s ease both; }
      .film .engpipe .pnode b { display:block; font-family:var(--mono); font-size:11.5px; letter-spacing:.1em; }
      .film .engpipe .pnode small { display:block; font-size:11px; margin-top:3px; color:var(--faint); }
      .film .engpipe .n1 { animation-delay:.5s; } .film .engpipe .n2 { animation-delay:1.6s; } .film .engpipe .n3 { animation-delay:2.7s; }
      .film .engpipe .pflow { position:relative; width:44px; flex:none; align-self:center; height:2px; background:var(--rule); }
      .film .engpipe .pflow::after { content:""; position:absolute; top:-3px; width:8px; height:8px; border-radius:50%;
        background:var(--brass); animation:flowdot 1s ease both; }
      .film .engpipe .f1::after { animation-delay:.9s; } .film .engpipe .f2::after { animation-delay:2s; }
      .film .fcurve { width:min(660px, 92vw); height:auto; background:rgba(6,12,8,.82); border:1px solid var(--rule); }
      .film .fcurve text { font-family:var(--mono); fill:var(--soft); }
      .film .fcurve .draw { stroke-dasharray:1; stroke-dashoffset:1; animation:pathdraw ease forwards; }
      .film .fcurve .ghostln { animation-duration:1.8s; animation-delay:1.2s; }
      .film .fcurve .sawln { animation-duration:4.6s; animation-delay:3.1s; }
      .film .fcurve .fx { opacity:0; animation:svgFade .5s ease forwards; }
      .film .engnote { font-family:var(--mono); font-size:11.5px; letter-spacing:.04em; color:var(--soft); max-width:66ch;
        text-align:center; margin-top:12px; padding:8px 14px; background:rgba(5,10,7,.82); border:1px solid var(--rule);
        animation:floatUp .8s ease 8.6s both; }

      /* shot 6 — the mastery gate: self-ratings bounce, application enters.
         The whole band sits on its own dark glass so it stays legible over
         the bright dusk plate (a plain dark fill: backdrop-filter over a
         playing video forces a per-frame readback and stutters the shot). */
      .film .gateband { display:grid; grid-template-columns:1fr 1.2fr 1fr; gap:14px; width:min(940px, 95vw); align-items:center;
        background:rgba(4,9,6,.88); border:1px solid var(--rule); padding:20px 18px; }
      .film .glane { text-align:center; }
      .film .glabel { font-family:var(--mono); font-size:10px; letter-spacing:.18em; color:var(--ink); text-transform:uppercase;
        margin-bottom:10px; text-shadow:0 1px 8px rgba(0,0,0,.9); animation:fade .5s ease .3s both; }
      .film .gchip { display:block; width:max-content; margin:8px auto; font-family:var(--mono); font-size:11.5px;
        padding:7px 12px; border:1px solid var(--rule); background:rgba(18,33,26,.92); color:var(--ink); }
      @keyframes gbounce { 0%{ transform:none; opacity:0; } 14%{ opacity:1; } 52%{ transform:translateX(92px); opacity:1; }
        72%{ transform:translateX(44px); } 100%{ transform:translateX(44px); opacity:0; } }
      @keyframes gsink { 0%{ transform:none; opacity:0; } 14%{ opacity:1; } 82%{ transform:translateX(-104px); opacity:1; }
        100%{ transform:translateX(-128px); opacity:0; } }
      .film .gchip.flash { animation:gbounce 2.1s ease both; border-color:rgba(181,83,60,.55); }
      .film .gchip.quiz { animation:gsink 1.5s ease both; border-color:rgba(63,143,107,.7); }
      .film .gchip.fc1 { animation-delay:1s; } .film .gchip.fc2 { animation-delay:2.2s; } .film .gchip.fc3 { animation-delay:3.4s; }
      .film .gchip.qc1 { animation-delay:2.4s; } .film .gchip.qc2 { animation-delay:4.7s; } .film .gchip.qc3 { animation-delay:7.3s; }
      .film .gnope { display:inline-block; font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; color:var(--ember);
        border:1.5px dashed var(--ember); padding:6px 10px; margin-top:8px; transform:rotate(-2deg); animation:stampin .4s ease 4.8s both; }
      .film .gyes { display:inline-block; font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; color:var(--good);
        border:1.5px solid rgba(63,143,107,.7); padding:6px 10px; margin-top:8px; animation:stampin .4s ease 8.9s both; }
      .film .gwhy { font-size:12px; color:var(--soft); margin-top:8px; text-shadow:0 1px 8px rgba(0,0,0,.9); animation:fade .5s ease 5.4s both; }
      .film .gtile { position:relative; border:1px solid var(--rule); background:var(--panel); padding:18px 18px 16px;
        animation:cardIn .5s ease .2s both; }
      @keyframes gateglow { to { border-color:var(--good); box-shadow:0 0 0 1px var(--good), 0 14px 44px rgba(23,74,49,.5); } }
      .film .gtile.armed { animation:cardIn .5s ease .2s both, gateglow .6s ease 10.1s forwards; }
      .film .gtile .tname { font-family:var(--serif); font-size:21px; font-weight:800; }
      .film .gtile .gstates { position:absolute; top:14px; right:14px; font-family:var(--mono); font-size:9.5px;
        letter-spacing:.1em; text-transform:uppercase; }
      .film .gtile .st-open { color:var(--soft); border:1px solid var(--rule); padding:2px 7px; animation:demoHide .3s ease 10.1s forwards; }
      .film .gtile .st-won { position:absolute; right:0; top:0; color:var(--good); border:1px solid var(--good); padding:2px 7px;
        white-space:nowrap; animation:svgFade .3s ease 10.15s both; }
      .film .gmeter { position:relative; height:13px; background:var(--felt); border:1px solid var(--rule); margin-top:14px; overflow:visible; }
      .film .gmeter > i { position:absolute; inset:0 auto 0 0; background:var(--good); animation:gatefill 9s linear .5s both; }
      @keyframes gatefill { 0%,16%{ width:7%; } 30%,46%{ width:38%; } 58%,76%{ width:64%; } 90%,100%{ width:83%; } }
      .film .gmeter .bar80 { position:absolute; top:-5px; bottom:-5px; left:80%; width:2px; background:var(--brass); }
      .film .gscale { display:flex; justify-content:space-between; font-family:var(--mono); font-size:9.5px; color:var(--faint);
        letter-spacing:.06em; margin-top:6px; }
      .film .gscale .gbar { color:var(--brass); }
      /* centered via auto margins, not translateX — the stampin keyframes
         own the transform property and would drop a translate on finish */

        background:rgba(5,10,7,.9); animation:stampin .45s ease 10.3s both; }
      .film .gunder { font-family:var(--mono); font-size:11px; letter-spacing:.05em; color:var(--soft); text-align:center;
        margin-top:30px; max-width:70ch; padding:8px 14px; background:rgba(5,10,7,.82); border:1px solid var(--rule);
        animation:floatUp .6s ease 11s both; }

      /* shot 7 — the receipts (three framed proofs) */

      .film .pframe .ph { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; color:var(--brass); text-transform:uppercase; }

      .film .pbars { display:flex; gap:18px; justify-content:center; align-items:flex-end; height:128px; margin-top:14px; }
      .film .pbar { display:flex; flex-direction:column; align-items:center; gap:5px; }
      .film .pbar .ib { width:44px; transform-origin:bottom; animation:bandgrow2 .9s cubic-bezier(.2,.7,.2,1) both; }
      @keyframes bandgrow2 { from { transform:scaleY(0); } to { transform:scaleY(1); } }
      .film .pbar .ib.reread { height:52px; background:linear-gradient(#8a4634, var(--ember)); animation-delay:1s; }
      .film .pbar .ib.tested { height:80px; background:linear-gradient(#2c6e51, var(--good)); animation-delay:1.7s; }
      .film .pbar b { font-family:var(--serif); font-size:17px; } .film .pbar span { font-family:var(--mono); font-size:9px; color:var(--soft); letter-spacing:.05em; }
      .film .pbar .b1 { animation:fade .4s ease 1.7s both; } .film .pbar .b2 { animation:fade .4s ease 2.4s both; }
      .film .pcurves { width:100%; height:auto; margin-top:12px; }

      .film .pcurves .slide { animation-duration:1.2s; animation-delay:3.2s; }

      .film .prow b { font-family:var(--mono); font-size:10px; letter-spacing:.14em; }
      .film .prow.hi { color:var(--ink); border-color:rgba(201,162,39,.55); } .film .prow.hi b { color:var(--brass); }
      .film .prow.lo { color:var(--faint); } .film .prow.lo span { text-decoration:line-through; } .film .prow.lo b { color:var(--faint); }
      .film .prow.h1 { animation:rise .4s ease 5s both; } .film .prow.h2 { animation:rise .4s ease 5.5s both; }
      .film .prow.l1 { animation:rise .4s ease 6s both; } .film .prow.l2 { animation:rise .4s ease 6.4s both; }
      .film .pk { font-size:11.5px; color:var(--soft); line-height:1.55; margin-top:12px; }
      .film .pf1 .pk { animation:fade .5s ease 2.9s both; } .film .pf2 .pk { animation:fade .5s ease 6.2s both; }
      .film .pf3 .pk { animation:fade .5s ease 7s both; }
      @media (max-width:760px){ .film .proofband { grid-template-columns:1fr; gap:8px; }
        .film .gateband { grid-template-columns:1fr; } .film .pbars { height:96px; } }

      /* ------------------------------ the call ------------------------------ */
      .callscrim { position:fixed; inset:0; z-index:75; background:rgba(2,5,3,.9); backdrop-filter:blur(8px);

      /* forms / gate / covers */
      .frow { margin:14px 0; } .flabel { font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--soft); display:block; margin-bottom:6px; }
      .finput { width:100%; font-family:var(--serif); font-size:17px; padding:12px 14px; border:1px solid var(--rule); background:var(--panel2); color:var(--ink); }
      .finput:focus { outline:none; border-color:var(--brass); }
      .cover { position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; padding:26px; overflow:auto;
        background: radial-gradient(ellipse at 50% 30%, #12241b 0%, #0a1510 55%, #060d09 100%); }
      .gate { max-width:460px; width:100%; text-align:center; animation:cardIn .5s ease both; }

      .avgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:14px 0; }

      /* an in-app nudge card — the notification, rendered inside the den */

      /* ------------------------------ simulator ------------------------------ */
      .simchip { position:fixed; left:50%; top:14px; transform:translateX(-50%); z-index:41; display:flex; align-items:center; gap:10px;

      /* ---------------------- the Progress Book (top-right standing) ---------------------- */
      .progbook { position:relative; display:inline-flex; align-items:stretch; height:104px; padding:0; border:none;

      .progbook .pb-spine { width:16px; flex:none; border-radius:5px 0 0 5px; position:relative;
