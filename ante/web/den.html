      /* =========================== THE FILM ===========================
         The cold open, played at every sign-in. Not a poker ad — an MCAT
         thesis: pre-meds already have motivation; the app supplies the
         system. The four big statements are the BrainLift's DOK-4 theses,
         spoken as the house truths. Sahir literally deals real premed
         flashcards across the screen (crisp HTML — never baked into video).
         VO paces the cut when the ElevenLabs lines exist; timers cover it
         when they don't. */
      const FILMCARDS = [
        { k:"recall · amino acids", q:"Which amino acids are positively charged at physiological pH?",
          a:"Lysine, Arginine, Histidine — the basic three." },
        { k:"recall · enzyme kinetics", q:"A competitive inhibitor changes K<sub>m</sub> and V<sub>max</sub> how?",
          a:"K<sub>m</sub> increases; V<sub>max</sub> unchanged." },
        { k:"recall · neuro", q:"Which ion's influx drives the depolarization phase of an action potential?",
          a:"Na⁺ — voltage-gated sodium channels." },
      ];
      const FILM = [
        { vo:1, dur:8600, v:"den_day", img:"den_day.jpg", kind:"title",
          line:"Motivation was never your problem.",
          sub:"You're pre-med. Nobody chooses this path without plenty of it." },
        { vo:2, dur:9800, v:"den_dusk", img:"den_dusk.jpg", kind:"title",
          line:"But motivation alone becomes cramming.",
          sub:"All-nighters and lopsided weeks — the exact pattern a century of learning science calls the worst way to learn." },
        { vo:3, dur:12500, v:"sahir_deal", img:"sahir_deal.jpg", kind:"deal",
          line:"ANTE — an MCAT trainer that runs your schedule.",
          sub:"Twice a day a reminder finds you. You sit down. Sahir deals exactly the cards you're about to forget." },
        { vo:4, dur:9800, v:"den_night", img:"den_night.jpg", kind:"truth", n:1,
          line:"WHEN you study determines your score more than HOW MUCH.",
          sub:"Cepeda 2006, 839 assessments; Bahrick 1993: wider spacing, half the sessions, equal memory." },
        { vo:5, dur:9600, v:"dealer_idle", img:"dealer.jpg", kind:"truth", n:2,
          line:"Motivation is not the problem. The system is.",
          sub:"Steel 2007: consistency leaks at the moment of decision. The stack decides; you just play the top." },
        { vo:6, dur:10200, v:"felt_close", img:"felt_close.jpg", kind:"truth", n:3,
          line:"“Finished the content” is a meaningless milestone.",
          sub:"Until you've proven recall, you've only met it. Bloom's gate; Roediger & Karpicke: familiarity lies." },
        { vo:7, dur:9800, v:"den_dawn", img:"den_dawn.jpg", kind:"truth", n:4,
          line:"Encouragement is a sedative. Honesty is the cure.",
          sub:"“Projected 508, range 503–512, weakest topic: renal” calms you more than any pep talk." },
        { vo:8, dur:6800, v:"den_night", img:"den_night.jpg", kind:"logo",
          line:"The MCAT, played right.",
          sub:"Daily reminders · spaced deals · mastery gates · honest odds" },
      ];
      function filmStart(fromOnboard){
        // no cover, no play button: the projector just rolls (the webview
        // allows autoplay-with-sound, same as Anki's reviewer)
        S.film = { i:0, fromOnboard:!!fromOnboard, started:true, audio:null, timer:null };
        S.filmShown = true;
        musicSet(true, .24);
        renderFilmShot();
        filmPlay();
      }
      function filmMedia(sc){
        const v = sc.v && vid(sc.v);
        if (v) return v;
        if (sc.img && has(sc.img)) return `<img class="kb" src="${ASSET(sc.img)}" alt=""/>`;
        return `<div class="cssden"><div class="sky"></div><div class="skyline"></div><div class="lights"></div><div class="rain"></div><div class="mullions"></div><div class="felt"></div><div class="feltline"></div><div class="smoke"></div><div class="lamp"></div></div>`;
      }
      function filmCardHtml(idx, flipped, cls, delay){
        const c = FILMCARDS[idx % FILMCARDS.length];
        return `<div class="playcard ${cls||""}" style="animation-delay:${delay||0}ms">
          <div class="corner">A♠</div><div class="corner br">A♠</div>
          <div class="kind">${esc(c.k)}</div>
          <div class="q" style="font-size:17px">${c.q}</div>
          ${flipped?`<div class="a" style="animation-delay:${(delay||0)+900}ms">${c.a}</div>`:""}
        </div>`;
      }
      function renderFilmShot(){
        const f=S.film; if(!f) return;
        const sc=FILM[f.i];
        let overlayHtml = "";
        if (sc.kind==="deal"){
          // Sahir literally deals: three real premed flashcards arc onto the felt
          overlayHtml = `<div class="dealfan">
            ${filmCardHtml(0, true, "fan f1", 500)}
            ${filmCardHtml(1, true, "fan f2", 1700)}
            ${filmCardHtml(2, true, "fan f3", 2900)}
          </div>`;
        }
        if (sc.kind==="truth") overlayHtml = `<div class="truthband">
            <div class="truthnum">HOUSE TRUTH · № ${sc.n}</div></div>`;
        if (sc.kind==="logo") overlayHtml = `<div class="bigband"><div class="logo">
            <div class="mono" style="font-size:11px;letter-spacing:.3em;color:var(--soft)">FOR THE MCAT</div>
            <div class="mk">ANTE</div>
            <button class="btn primary big" onclick="filmEnd()">Take your seat →</button></div></div>`;
        const bars = FILM.map((_,i)=>{
          const fill = i<f.i ? `<b style="transform:scaleX(1)"></b>` : (i===f.i?`<b id="barNow" style="transform:scaleX(0)"></b>`:"");
          return `<i>${fill}</i>`;
        }).join("");
        $("#film").innerHTML = `<div class="film">
          <div class="shotmedia">${filmMedia(sc)}</div>
          <div class="shade"></div>
          <div class="bars">${bars}</div>
          <div class="skip"><button class="btn ghost" onclick="filmEnd()">Skip ✕</button></div>
          ${overlayHtml}
          ${sc.kind!=="logo"?`<div class="caption ${sc.kind==="truth"?"truth":""}"><div class="line">${esc(sc.line)}</div>${sc.sub?`<div class="sub">${esc(sc.sub)}</div>`:""}</div>`:""}
        </div>`;
      }
      function filmPlay(){
        const f=S.film; if(!f||!f.started) return;
        const sc=FILM[f.i];
        clearTimeout(f.timer);
        if (f.audio){ try{ f.audio.pause(); }catch(e){} f.audio=null; }
        let dur = sc.dur; let advanced=false;
        const adv=()=>{ if(advanced) return; advanced=true; if(S.film===f) filmNext(); };
        const voName = `vo_film_${sc.vo}.mp3`;
        if (has(voName)){
          try {
            const a=new Audio(ASSET(voName)); f.audio=a; a.volume=.95;
            a.onloadedmetadata=()=>{ if(a.duration&&isFinite(a.duration)){ dur=a.duration*1000+900; armBar(dur); clearTimeout(f.timer); f.timer=setTimeout(adv, dur+600); } };
            a.onended=()=>setTimeout(adv, 650);
            a.onerror=()=>{ clearTimeout(f.timer); f.timer=setTimeout(adv, dur); };
            a.play().catch(()=>{ clearTimeout(f.timer); f.timer=setTimeout(adv, dur); });
          } catch(e){ f.timer=setTimeout(adv, dur); }
        }
        armBar(dur);
        f.timer=setTimeout(adv, dur+900);
      }
      function armBar(ms){
        const b=$("#barNow"); if(!b) return;
        b.style.transition = `transform ${Math.max(300,ms)}ms linear`;
        requestAnimationFrame(()=>{ b.style.transform="scaleX(1)"; });
      }
      function filmNext(){
        const f=S.film; if(!f) return;
        if (f.i < FILM.length-1){ f.i++; renderFilmShot(); filmPlay(); } else filmEnd();
      }
      function filmEnd(){
        const f=S.film; if(!f) return;
        if (f.audio){ try{ f.audio.pause(); }catch(e){} }
        clearTimeout(f.timer);
        const fromOb=f.fromOnboard; S.film=null;
        $("#film").innerHTML="";
        musicSet(MUSIC.pref, .16);
        if (fromOb && S.data && S.data.profile && !S.data.profile.onboarded){ startOnboard(S.data.profile); }
        else { S.view="den"; route(); }
      }

      /* ===================== THE TABLE (a session) ===================== */
      const DEALS = [
        "Let's see what you remember.",
        "The felt is yours.",
        "Play it slow — the order already did the thinking.",
        "The House hates a cold recall. Do it anyway.",
      ];
      function stakeFor(topic){
        const ts=S.data.topics||[]; let best=0, mine=0;
        for(const t of ts){ const v=(t.weight||0)*(1-(t.average_recall||0)); if(v>best) best=v; if(t.topic===topic) mine=v; }
        if(best<=0) return 2;
        return Math.max(1, Math.min(5, Math.round(5*mine/best)||1));
      }
      async function openTable(tag){
        const name = tag ? leaf(tag) : "the felt";
        S.session = { topic:tag, name, tally:{cards:0,quiz:0,raked:0}, mode:"intro", card:null, item:null };
        const pal = tag && (S.data.palace_gallery && (S.data.palace_gallery.groups||[]).find(g=>g.topic===tag));
        S.session.palace = pal && pal.scenes[0];
        renderTable();
      }
      function renderTable(){
        const s=S.session; if(!s) return;
        let body;
        if (s.mode==="intro"){
          const t = s.topic && findTable(s.topic);
          const reason = t && t.reason ? `<div class="note" style="margin-top:8px">${esc(t.reason)}</div>` : "";
          const palace = s.palace ? sceneFigure(s.palace) : "";
          body = `${dealerLine("Your seat's been waiting. " + DEALS[(Math.random()*DEALS.length)|0])}
            <div class="lead">The table at <b>${esc(s.name)}</b>.</div>${reason}
            ${palace?`<div style="margin:14px 0">${palace}</div>`:""}
            <div class="row" style="margin-top:14px"><button class="btn primary big" onclick="tableBegin()">Deal me in →</button>
            <button class="btn ghost" onclick="closeOverlay()">Leave the room</button></div>
            <div class="note" style="margin-top:12px">Cards come off the shoe in points-at-stake order — highest exam value, weakest recall first. The chips on each card are that stake.</div>`;
        } else if (s.mode==="done"){
          const raked = s.tally.raked;
          body = `${dealerLine(raked? "The House took a few. They'll be back on the felt tomorrow — that's the game." : "Clean sweep. The House hates you tonight.")}
            <div style="text-align:center;padding:14px 0">
            <div class="stamp won">Cashed out</div>
            <div class="lead" style="margin-top:14px">${s.tally.cards} cards played · ${s.tally.quiz} river questions.</div>
            <div class="note" style="margin:10px auto">Every hand was spent where it paid most. No fake winnings here — the honest tally lives in the Book and on the Circuit.</div>
            <div class="row" style="justify-content:center;margin-top:14px">
              <button class="btn primary" onclick="closeOverlay()">Back to the den</button>
              <button class="btn ghost" onclick="tableBegin()">Keep playing</button></div></div>`;
        } else if (s.mode==="card"){
          body = tableCard(s);
        } else {
          body = tableRiver(s);
        }
        const done=s.tally.cards+s.tally.quiz;
        overlay(sheet("♠", s.name, `at the table · ${done} played`, `<div class="tablefelt">${body}</div>`, false));
      }
      async function tableBegin(){
        const s=S.session; s.mode="loading"; tableLoading();
        musicKick();
        if(!S.voPlayed){ S.voPlayed=true; playVoice("vo_seat.mp3"); }
        await tableAdvance();
      }
      function tableLoading(){ const b=$(".tablefelt"); if(b) b.innerHTML=`<div class="spin"></div>`; }
      async function tableAdvance(){
        const s=S.session; if(!s) return;
        s.tutor = null; // each card gets a fresh conversation
        const wantRiver=(s.tally.cards+s.tally.quiz)>0 && ((s.tally.cards+s.tally.quiz)%3===2);
        let study=null, quiz=null;
        try { study = await getJSON("/_anki/anteStudy"); } catch(e){}
        try { quiz = await getJSON("/_anki/anteQuiz"); } catch(e){}
        const cardsLeft = study && !study.done && study.card;
        const quizLeft = quiz && !quiz.done && quiz.item;
        if ((wantRiver && quizLeft) || (!cardsLeft && quizLeft)){
          s.mode="river"; s.item=quiz.item; s.qphase=null; s.chosen=null; s.conf=null; s.grade=null; s.shownAt=Date.now();
        } else if (cardsLeft){
          s.mode="card"; s.card=study.card; s.showAns=false; s.conf=null; s.raking=false;
        } else {
          s.mode="done";
        }
        renderTable();
      }

      /* ---- the table tutor: interrogate the card you just played ----
         Works at the felt table, on river questions, AND in Open Felt (both
         flashcards and questions), so the AI is one tap away everywhere. */
      function tutorHost(){
        // whichever play surface is active owns the conversation
        if (S.felt) return S.felt;
        if (S.session) return S.session;
        return null;
      }
      function tutorState(){ const h=tutorHost(); if(!h) return null;
        if(!h.tutor) h.tutor={open:false, msgs:[], busy:false}; return h.tutor; }
      function tutorContext(){
        const f=S.felt;
        if (f){
          if (f.mode==="flash" && f.card && f.show)
            return { front:f.card.question, back:f.card.answer, topic:f.card.topic||"" };
          if (f.mode==="mcq" && f.item && f.phase==="done"){
            const back=(f.item.choices||[])[f.item.correct_index]||"";
            return { front:f.item.stem, back, topic:f.item.topic||"" };
          }
          return null;
        }
        const s=S.session; if(!s) return null;
        if (s.mode==="card" && s.card)
          return { front:s.card.question, back:s.card.answer, topic:s.card.topic||"" };
        if (s.mode==="river" && s.item){
          const g=s.grade||{};
          const back = s.item.type==="open"
            ? (g.model_answer||g.feedback||"")
            : (s.item.choices||[])[s.item.correct_index]||"";
          return { front:s.item.stem, back, topic:s.item.topic||"" };
        }
        return null;
      }
      function tutorHtml(){
        const t=tutorState(); if(!t) return "";
        if (!t.open) return `<div class="tutor" id="tutorHost"><button class="openbtn" onclick="tutorOpen()">🂠 Ask Sahir about this card</button></div>`;
        const msgs = t.msgs.map(m=>`<div class="msg ${m.who} ${m.offline?"offline":""}">${esc(m.text)}</div>`).join("");
        const think = t.busy ? `<div class="msg sahir think"><i></i><i></i><i></i></div>` : "";
        return `<div class="tutor" id="tutorHost">
          <div class="chat" id="tutorChat">${msgs}${think}</div>
          <div class="ask"><input id="tutorIn" placeholder="Why is that the answer? What's the mechanism?" onkeydown="if(event.key==='Enter')tutorSend()"/>
          <button onclick="tutorSend()" ${t.busy?"disabled":""}>Ask</button></div></div>`;
      }
      function tutorRefresh(){
        // patch only the tutor block so the dealt card doesn't re-animate
        const host=$("#tutorHost");
        if (host) host.outerHTML = tutorHtml();
        else if (S.felt) renderFelt();
        else renderTable();
        setTimeout(()=>{ const c=$("#tutorChat"); if(c) c.scrollTop=c.scrollHeight;
          const t=tutorState(); const i=$("#tutorIn");
          if(i && t && !t.busy) i.focus(); }, 40);
      }
      function tutorOpen(){ const t=tutorState(); if(!t) return; t.open=true; tutorRefresh(); }
      async function tutorSend(){
        const t=tutorState(); const ctx=tutorContext();
        if(!t || !ctx || t.busy) return;
        const inp=$("#tutorIn"); const q=(inp&&inp.value||"").trim();
        if(!q){ if(inp) inp.focus(); return; }
        t.msgs.push({who:"you", text:q}); t.busy=true; tutorRefresh();
        const history = t.msgs.slice(0,-1).map(m=>({role:m.who==="you"?"student":"tutor", text:m.text}));
        let out=null;
        try{
          const r = await fetch("/_anki/anteTutor", {method:"POST",
            headers:{"Content-type":"application/binary"},
            body: JSON.stringify({front:ctx.front, back:ctx.back, topic:ctx.topic, history, question:q})});
          out = await r.json();
        }catch(e){}
        t.busy=false;
        t.msgs.push({who:"sahir", offline: !(out&&out.available),
          text: (out&&out.reply) || "The line dropped — ask me again."});
        tutorRefresh();
      }
      function chipsHtml(n, raked){
        let out=`<div class="stake ${raked?"raked":""}">`;
        const cls=["","g","","r",""];
        for(let i=0;i<n;i++) out+=`<span class="pchip ${cls[i%5]}"></span>`;
        return out+`</div>`;
      }
      function tableCard(s){
        const c=s.card;
        const chips=chipsHtml(stakeFor(c.topic), s.raking);
        const ans = s.showAns
          ? `<div class="a">${c.answer.replace(c.question,"")||c.answer}</div>`
          : "";
        const controls = s.showAns
          ? `<div class="easeRow">
               <button class="e1" onclick="tableAnswer(1)">Again</button>
               <button class="e2" onclick="tableAnswer(2)">Hard</button>
               <button class="e3" onclick="tableAnswer(3)">Good</button>
               <button class="e4" onclick="tableAnswer(4)">Easy</button></div>
             <div class="note" style="margin-top:8px;font-size:12px">Again returns it to the shoe — the House rakes the chips for now.</div>
             ${tutorHtml()}`
          : (s.conf==null
            ? `<div class="note" style="margin-top:10px">Before it turns — where are you?</div>
               <div class="conf"><button onclick="tableReveal(0.2)">Check<small>guessing</small></button>
               <button onclick="tableReveal(0.5)">Call<small>probably</small></button>
               <button onclick="tableReveal(0.85)">Raise<small>certain</small></button></div>`
            : `<div class="row" style="margin-top:12px"><button class="btn primary big" onclick="tableFlip()">Turn it over</button></div>`);
        return `${dealerLine("Card up. " + (s.conf==null?"How do you stand before it turns?":"Turn it when you're ready."))}
          <div class="playcard">${chips}
            <div class="corner">A♠</div><div class="corner br">A♠</div>
            <div class="kind">recall · ${esc(leaf(c.topic||""))}</div>
            <div class="q">${c.question}</div>${ans}</div>${controls}`;
      }
      function tableReveal(conf){ S.session.conf=conf; renderTable(); }
      function tableFlip(){ S.session.showAns=true; renderTable(); }
      function tableAnswer(ease){
        const s=S.session; const c=(s.conf==null?"":s.conf);
        if (ease===1 && !s.raking){
          s.raking=true; s.tally.raked++; renderTable();
          setTimeout(()=>{ pycmdSafe("ananswer:1"+(c!==""?":"+c:"")); s.tally.cards++; tableLoading(); setTimeout(tableAdvance,140); }, 560);
          return;
        }
        pycmdSafe("ananswer:"+ease+(c!==""?":"+c:"")); s.tally.cards++; tableLoading(); setTimeout(tableAdvance,140);
      }
      function tableRiver(s){
        const it=s.item;
        const tag=`<div class="rivertag">◆ The river · application — this moves the Circuit</div>`;
        if(it.type==="open"){
          if(s.qphase==="done"){
            const g=s.grade||{};
            return `${tag}<div class="playcard river"><div class="kind">production · ${esc(leaf(it.topic||""))}</div>
              <div class="q" style="font-size:20px">${esc(it.stem)}</div>
              <div class="a"><b>Score ${Math.round((g.score||0)*100)}%.</b> ${esc(g.feedback||"")}${g.model_answer?`<div class="note" style="margin-top:8px;color:#5c5340"><b>Model:</b> ${esc(g.model_answer)}</div>`:""}</div></div>
              ${tutorHtml()}
              <div class="row" style="margin-top:12px"><button class="btn primary" onclick="riverNext()">Continue →</button></div>`;
          }
          return `${tag}<div class="playcard river"><div class="kind">production · ${esc(leaf(it.topic||""))}</div>
            <div class="q" style="font-size:20px">${esc(it.stem)}</div>
            <textarea class="answer" id="oaText" placeholder="Explain it in your own words…"></textarea></div>
            <div class="note" style="margin-top:8px">How sure?</div>
            <div class="conf"><button onclick="riverOpen(0.3)">Check<small>unsure</small></button><button onclick="riverOpen(0.6)">Call<small>fairly</small></button><button onclick="riverOpen(0.9)">Raise<small>confident</small></button></div>`;
        }
        const choices = it.choices.map((c,i)=>{
          let cls="choice";
          if(s.qphase==="done"){ if(i===it.correct_index) cls+=" correct"; else if(i===s.chosen) cls+=" wrong"; }
          const on = s.qphase? "" : `onclick="riverPick(${i})"`;
          return `<button class="${cls}" ${on}>${esc(c)}</button>`;
        }).join("");
        let tail="";
        if(s.qphase==="conf") tail=`<div class="note" style="margin-top:10px">Locked in. How sure?</div>
          <div class="conf"><button onclick="riverConf(0.3)">Check<small>unsure</small></button><button onclick="riverConf(0.6)">Call<small>fairly</small></button><button onclick="riverConf(0.9)">Raise<small>confident</small></button></div>`;
        else if(s.qphase==="done") tail=`${tutorHtml()}<div class="row" style="margin-top:12px"><button class="btn primary" onclick="riverNext()">Continue →</button></div>`;
        return `${tag}<div class="playcard river"><div class="kind">application · ${esc(leaf(it.topic||""))}</div>
          <div class="q" style="font-size:20px">${esc(it.stem)}</div><div class="choices">${choices}</div></div>${tail}`;
      }
      function riverPick(i){ S.session.chosen=i; S.session.qphase="conf"; renderTable(); }
      function riverConf(v){ const s=S.session; const ms=Date.now()-(s.shownAt||Date.now());
        pycmdSafe(`anquiz:${s.item.id}:${s.chosen}:${v}:${ms}`); s.conf=v; s.qphase="done"; renderTable(); }
      async function riverOpen(v){ const s=S.session; const ta=$("#oaText"); const a=ta?ta.value.trim():""; if(!a){ if(ta)ta.focus(); return; }
        const ms=Date.now()-(s.shownAt||Date.now()); s.answer=a; s.conf=v;
        let g=null; try{ g=await getJSON(`/_anki/anteGradeOpen?id=${encodeURIComponent(s.item.id)}&answer=${encodeURIComponent(a)}`);}catch(e){}
        pycmdSafe(`anopen:${s.item.id}:${v}:${ms}:${b64(a)}`); s.grade=g||{score:0,feedback:"Recorded."}; s.qphase="done"; renderTable(); }
      function riverNext(){ S.session.tally.quiz++; tableLoading(); setTimeout(tableAdvance,140); }

      function sceneFigure(sc){
        const media = sc.motion
          ? `<video class="scene-clip" autoplay loop muted playsinline><source src="${STUDIO(sc.motion)}" type="video/mp4"></video>`
          : (sc.still ? `<img class="plate" src="${STUDIO(sc.still)}" alt=""/>` : feltPlate(sc));
        return `<figure style="margin:0">${media}<figcaption class="note" style="margin-top:6px"><b>${esc(sc.title||"Vault scene")}.</b> ${esc(sc.caption||"")}</figcaption></figure>`;
      }
      function feltPlate(sc){
        const anchors=(sc.anchors||[]).map(a=>esc(a.object||a.fact)).slice(0,4);
        return `<div class="plate" style="aspect-ratio:1.6;background:var(--panel2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;text-align:center">
          <div class="serif" style="font-size:20px;font-style:italic">${esc(sc.title||"")}</div>
          <div class="mono" style="font-size:11px;color:var(--brass);letter-spacing:.1em">${anchors.join(" · ")}</div>
          <div class="note" style="max-width:36ch">${esc(sc.caption||sc.scene||"")}</div></div>`;
      }

      /* ===================== OPEN FELT (unlimited practice) ===================== */
      function openFelt(){
        musicKick();
        S.felt = { mode:"flash", last:"", n:0, item:null, card:null, show:false, phase:null, chosen:null };
        feltNext();
      }
      async function feltNext(){
        const f=S.felt; if(!f) return;
        f.tutor=null; // each new card/question starts a fresh conversation
        renderFeltLoading();
        try{
          const d = await getJSON(`/_anki/antePractice?mode=${f.mode}&scope=all&exclude=${encodeURIComponent(f.last)}`);
          if (f.mode==="flash"){ f.card = d.card||null; f.done=!!d.done; f.reason=d.reason; f.last=f.card?String(f.card.id):""; f.show=false; }
          else { f.item = d.item||null; f.done=!!d.done; f.reason=d.reason; f.last=f.item?f.item.id:""; f.phase=null; f.chosen=null; }
        }catch(e){ f.done=true; f.reason="Could not reach the engine."; }
        renderFelt();
      }
      function renderFeltLoading(){ const b=$(".sheet-b"); if(b) b.innerHTML=`<div class="spin"></div>`; else renderFelt(true); }
      function renderFelt(loading){
        const f=S.felt; if(!f) return;
        const tabs = `<div class="row" style="margin-bottom:14px">
          <button class="btn ${f.mode==="flash"?"primary":"ghost"}" onclick="feltMode('flash')">Flashcards</button>
          <button class="btn ${f.mode==="mcq"?"primary":"ghost"}" onclick="feltMode('mcq')">Questions</button>
          <span class="note" style="margin-left:auto">${f.n} played</span></div>`;
        let body;
        if (loading) body = `<div class="spin"></div>`;
        else if (f.done) body = `<div class="note">${esc(f.reason||"Nothing here yet.")}</div>`;
        else if (f.mode==="flash" && f.card){
          body = `<div class="tablefelt"><div class="playcard">
              <div class="corner">◇</div><div class="corner br">◇</div>
              <div class="kind">open felt · ${esc(leaf(f.card.topic||""))}</div>
              <div class="q">${f.card.question}</div>
              ${f.show?`<div class="a">${(f.card.answer||"").replace(f.card.question,"")||f.card.answer}</div>`:""}
            </div>
            ${f.show?tutorHtml():""}
            <div class="row" style="margin-top:14px">
              ${f.show?`<button class="btn primary" onclick="feltDraw()">Next card →</button>`
                      :`<button class="btn primary" onclick="S.felt.show=true;renderFelt()">Turn it over</button>`}
              <button class="btn ghost" onclick="closeOverlay()">Leave</button></div></div>`;
        } else if (f.mode==="mcq" && f.item){
          const it=f.item;
          const choices = it.choices.map((c,i)=>{
            let cls="choice";
            if(f.phase==="done"){ if(i===it.correct_index) cls+=" correct"; else if(i===f.chosen) cls+=" wrong"; }
            const on = f.phase? "" : `onclick="feltPick(${i})"`;
            return `<button class="${cls}" ${on}>${esc(c)}</button>`;
          }).join("");
          body = `<div class="tablefelt"><div class="playcard river">
              <div class="kind">open felt · application · ${esc(leaf(it.topic||""))}</div>
              <div class="q" style="font-size:20px">${esc(it.stem)}</div>
              <div class="choices">${choices}</div></div>
            ${f.phase==="done"?tutorHtml():""}
            ${f.phase==="done"?`<div class="row" style="margin-top:12px"><button class="btn primary" onclick="feltDraw()">Next →</button><button class="btn ghost" onclick="closeOverlay()">Leave</button></div>`:""}
          </div>`;
        } else body = `<div class="spin"></div>`;
        overlay(sheet("◇","Open Felt","unlimited practice — off the clock, spaced play stays the main game", tabs + body, false));
      }
      function feltMode(m){ const f=S.felt; if(!f||f.mode===m) return; f.mode=m; f.last=""; feltNext(); }
      function feltDraw(){ S.felt.n++; feltNext(); }
      function feltPick(i){
        const f=S.felt; if(!f||f.phase) return;
        f.chosen=i; f.phase="done";
        // free-play application answers still count as evidence (they only help)
        pycmdSafe(`anquiz:${f.item.id}:${i}:0.6:0`);
        renderFelt();
      }

      /* ===================== THE CIRCUIT (mastery map) ===================== */
      function findTable(tag){ for(const c of ((S.data.world||{}).cities||[])) for(const t of c.tables) if(t.tag===tag) return t; return null; }
      function openCircuit(){
        const w=S.data.world||{}; const cities=w.cities||[];
        const panels = cities.map(cityPanel).join("");
        const allBeaten = cities.length>0 && cities.every(c=>c.beaten);
        const ftBg = has("final_table.jpg") ? `<img class="bgimg" src="${ASSET("final_table.jpg")}"/>` : `<div class="bgcss" style="background:linear-gradient(100deg,#0a1510,#37273a 60%,#c9793a)"></div>`;
        const days=w.exam_days_left;
        const final = `<div class="finaltable">${ftBg}<div class="shade"></div>
          <div><div class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--brass)">THE LAST STOP</div>
          <div class="serif" style="font-size:24px;font-weight:800">The Final Table</div>
          <div class="note">A rooftop at first light${days!=null?` — ${days} day${days===1?"":"s"} out`:""}. ${allBeaten?"Every room on the Circuit is yours. Walk in like you own this one too.":"It opens when every city on the Circuit is beaten."}</div></div>
          ${allBeaten?`<div style="margin-left:auto"><span class="stamp won">Invited</span></div>`:""}</div>`;
        const legend=(w.legend||[]).map(l=>`<div class="row" style="gap:8px;font-size:12px;color:var(--soft)"><span class="mono" style="color:var(--brass);font-size:10px;min-width:66px;text-transform:uppercase">${esc(l.state)}</span>${esc(l.means)}</div>`).join("");
        overlay(sheet("✈","The Circuit","cities are sections · tables are topics · the Circuit lists only what it can prove",
          `${panels}${final}<hr class="hr"/><div class="seclabel">HOW TO READ THE ROOM</div>${legend}`, true));
      }
      function cityPanel(c){
        const bg = (c.asset && has(c.asset+".jpg")) ? `<img class="bgimg" src="${ASSET(c.asset+".jpg")}"/>` : cityCss(c.id);
        const tables=c.tables.map(tableTile).join("");
        return `<div class="citypanel">
          <div class="cityhead">${bg}<div class="shade"></div>
            <div><div class="stop">Stop ${c.stop} · ${esc(SECNAME[c.id]||c.code)}</div>
              <div class="cname">${esc(c.city)}</div>
              <div class="croom">${esc(c.room)}</div>
              <div class="flav">${esc(c.flavor)}</div></div>
            <div class="tally"><b class="num">${c.won}</b><span class="mono" style="color:var(--soft);font-size:11px"> / ${c.listed||0} won</span></div>
            ${c.beaten?`<div class="beaten"><span class="stamp won">Beaten</span></div>`:""}
          </div>
          <div class="tables">${tables}</div></div>`;
      }
      function cityCss(id){
        const g={ chem_phys:"linear-gradient(110deg,#0d1a2a,#173040 55%,#0d1f18)", cars:"linear-gradient(110deg,#101a30,#26365c 60%,#0d1f2a)",
          bio_biochem:"linear-gradient(110deg,#14260f,#2c4a1c 55%,#123020)", psych_soc:"linear-gradient(110deg,#241226,#3c1f40 55%,#161228)" }[id]
          || "linear-gradient(110deg,#0d1f18,#183028)";
        return `<div class="bgcss" style="background:${g}"></div>`;
      }
      function tableTile(t){
        const stateWord={won:"won",open:"open",lowtable:"low table",roped:"roped off",unlisted:"unlisted"}[t.state]||t.state;
        const chips = t.state==="unlisted" ? "" : `<span class="minichips">${'<i></i>'.repeat(t.chips||1)}</span>`;
        const dust = (t.dust!=null && t.dust>0.25) ? `<div class="dust" style="opacity:${Math.min(.85,t.dust).toFixed(2)}"></div>` : "";
        const due = t.due>0 ? `<span class="duebadge">${t.due>99?"99+":t.due}</span>` : (t.state==="won"?`<span class="plaque">◆</span>`:"");
        return `<button class="tbl s-${t.state}" onclick="tableTap('${jsq(t.tag)}')" title="${esc(t.reason||"")}">
          ${dust}${due}
          <div class="tname">${esc(t.name)}</div>
          <div class="tmeta"><span class="state">${stateWord}</span>${chips}</div>
        </button>`;
      }
      function tableTap(tag){
        const t=findTable(tag); if(!t) return;
        if(t.state==="unlisted") return toast(`${t.name} is unlisted — no cards here yet. Import cards tagged with this topic.`);
        if(t.state==="roped") return toast(`Roped off — beat its prerequisite tables first. ${t.reason||""}`);
        $("#ov").innerHTML=""; openTable(tag);
      }

      /* ===================== THE BOOK (readiness + calibration) ===================== */
      function openBook(){
        const d=S.data; const rd=(d.scores&&d.scores.readiness)||{}; const fc=d.forecast||{};
        let board;
        if (rd.abstained){
          const reasons=(rd.reasons||[]).slice(0,4).map(r=>`<li>${esc(r)}</li>`).join("");
          board = `<div class="bookboard">
            <div class="noline">NO <b>LINE</b></div>
            <div class="mono" style="color:var(--soft);font-size:12px;letter-spacing:.14em;margin-top:4px">INSUFFICIENT ACTION — THE BOOK DOESN'T GUESS</div></div>
            <div class="note" style="margin-top:14px">A confident number with nothing behind it is a guess in a nice font. The oddsmaker posts your line when the evidence is real:</div>
            <ul class="note">${reasons}</ul>`;
        } else {
          const [lo,hi]=(rd.total_range||[null,null]);
          const secs=(rd.sections||[]).map(s=>{ const sid=s.section||s.id;
            return `<div style="margin:10px 0"><div class="row" style="justify-content:space-between"><span>${SECNAME[sid]||sid}</span><b class="num">${s.score||"—"}</b></div>
            <div class="meter"><i style="width:${Math.round(((s.score-118)/14)*100)}%"></i></div></div>`; }).join("");
          const conf=(rd.confidence==null)?"":`· ${esc(String(rd.confidence))} confidence`;
          const traj = fc.available && fc.projected_total
            ? `On this schedule the Book projects <b class="lineval">${fc.projected_total}</b>${fc.projected_range?` (${fc.projected_range[0]}–${fc.projected_range[1]})`:""} by the final table${fc.on_track===false?" — short of your target, so the plan leans into your weakest big tables":", on track"}.`
            : "";
          board = `<div class="bookboard">
              <div class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--soft)">TONIGHT'S LINE</div>
              <div class="row" style="align-items:flex-end;gap:14px;margin-top:6px"><div class="kpi num lineval">${rd.projected_total||"—"}</div>
              <div class="rng" style="padding-bottom:8px">honest range ${lo}–${hi} ${conf}</div></div></div>
            <div class="note" style="margin:12px 0">${esc((rd.reasons||[])[0]||"")}</div>${secs}
            ${traj?`<div class="note" style="margin-top:14px;border-top:1px solid var(--rule);padding-top:12px"><b>The run line.</b> ${traj}</div>`:""}`;
        }
        overlay(sheet("◈","The Book","the house oddsmaker · posts no line without evidence", board + calibrationBlock(d), false));
      }
      function calibrationBlock(d){
        const cal=(d.calibration_sources&&d.calibration_sources.combined)||d.calibration||{};
        const trust=d.self_trust||{};
        let verdict = "NO READ YET", cls="none", detail="Answer with Check / Call / Raise and the Book learns whether your certainty can be trusted.";
        if (cal.available){
          const v=String(cal.verdict||"").toLowerCase();
          if (v.includes("over")){ verdict="OVERCONFIDENT"; cls="over"; detail="You say Raise and miss. The Book pulls your line down and widens the range until your word is good."; }
          else if (v.includes("under")){ verdict="UNDERCONFIDENT"; cls="under"; detail="You know more than you bet. Trust the reps — say Raise when you feel it."; }
          else { verdict="WELL CALIBRATED"; cls="well"; detail="When you say Raise, you're right. The Book takes your word — that's worth points on test day."; }
        }
        const score = trust.available!==false && trust.score!=null ? Math.round(trust.score*100) : null;
        const comparison = (d.calibration_sources&&d.calibration_sources.comparison&&d.calibration_sources.comparison.note)
          ? `<div class="note" style="margin-top:8px">${esc(d.calibration_sources.comparison.note)}</div>` : "";
        return `<hr class="hr"/>
          <div class="seclabel">CONFIDENCE CALIBRATION</div>
          <div class="bigword ${cls}">${verdict}</div>
          <div class="note" style="margin-top:10px">${detail}</div>
          ${score!=null?`<div class="row" style="justify-content:space-between;margin-top:14px"><span class="mono" style="font-size:10px;letter-spacing:.16em;color:var(--soft)">YOUR TELL</span><b class="num serif" style="font-size:26px">${score}</b></div>
          <div class="meter" style="margin-top:6px"><i style="width:${score}%"></i></div>`:""}
          ${comparison}`;
      }

      /* ===================== THE LEDGER (calendar + recalibration) ===================== */
      function openLedger(){
        const d=S.data; const sp=d.study_plan||{}; const recal=d.recalibration||{};
        if (!sp.available){
          overlay(sheet("▦","The Ledger","the plan, night by night",
            `<div class="note">${esc(sp.reason||"Set your exam date in House Rules and the Ledger writes itself — every night from here to the final table.")}</div>
             <div class="row" style="margin-top:14px"><button class="btn primary" onclick="openSettings()">Set the clock →</button></div>`, false));
          return;
        }
        const dr = recal.desired_retention?Math.round(recal.desired_retention*100):null;
        const head = `<div class="ledgerhead">
          <div class="stat"><b class="num">D−${sp.days_remaining}</b><span>to the final table</span></div>
          <div class="stat"><b class="num">${sp.daily_minutes}m</b><span>a night</span></div>
          ${dr?`<div class="stat"><b class="num">${dr}%</b><span>the blinds (retention)</span></div>`:""}
          <div class="stat"><b class="num">${sp.topics_remaining??"—"}</b><span>tables left</span></div>
          <div class="note" style="flex:1;min-width:200px">${esc(recal.headline||"")}</div>
        </div>`;
        const phases=(sp.timeline||[]).filter(p=>p.id!=="sharpen");
        const phasebar = `<div class="phasebar">${phases.map(p=>
          `<div class="ph ${p.id}" style="flex:${Math.max(p.days,1)}" title="${esc(p.blurb||"")}">${esc(p.name)} · ${p.days}d</div>`).join("")}</div>`;
        const cal = sp.calendar||[];
        const miles = sp.milestones||[];
        S.ledger = { cal, mileByOffset:{}, mileByDate:{} };
        miles.forEach(m=>{ S.ledger.mileByOffset[m.offset]=m; if(m.date) S.ledger.mileByDate[m.date]=m; });
        const pad = cal.length ? (new Date(cal[0].date+"T12:00:00").getDay()||7)-1 : 0;
        const wk = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(x=>`<span>${x}</span>`).join("");
        let cells = "";
        for (let i=0;i<pad;i++) cells += `<div></div>`;
        cal.slice(0, 42-pad).forEach((dp,idx)=>{
          const m = S.ledger.mileByOffset[dp.offset];
          // the day's flag: exam > full-length > quiz checkpoint
          let flag = "";
          if (dp.is_exam || (m&&m.kind==="exam")) flag = `<div class="flag exam">★ Exam day</div>`;
          else if (m&&m.kind==="full_length") flag = `<div class="flag fl">◆ Full-length ${m.test_no||""}</div>`;
          else if (m&&(m.kind==="practice_test")) flag = `<div class="flag quiz">✎ Quiz checkpoint</div>`;
          const foc = dp.is_exam ? "The MCAT" : dp.is_rest ? "Rest night" : (dp.focus_label||"Review");
          const load = dp.is_exam||dp.is_rest ? "" : `<div class="load">${dp.minutes}m · ${dp.flashcards||0}🂠 ${(dp.quiz||0)+(dp.open||0)}◆</div>`;
          const sec = (dp.is_exam||dp.is_rest||!dp.section_abbr) ? "" : `<div class="sec">${esc(dp.section_abbr)}</div>`;
          cells += `<button class="cal ${dp.is_today?"today":""} ${dp.is_rest?"rest":""} ${dp.is_exam?"exam":""}" onclick="openDay(${idx})">
            <div class="phdot ${dp.phase}"></div>
            <div class="d"><span>${esc(dp.weekday)}</span><span>${esc((dp.date||"").slice(5))}</span></div>
            <div class="foc">${esc(foc)}</div>${sec}${load}${flag}</button>`;
        });
        const mileList = miles.slice(0,6).map(m=>{
          const act = m.kind==="full_length" ? `<button class="btn ghost" style="margin-left:auto" onclick="openFullLength(${m.test_no||1})">Sit it →</button>`
            : m.kind==="practice_test" ? `<button class="btn ghost" style="margin-left:auto" onclick="openPracticeQuiz()">Take it →</button>` : "";
          return `<div class="mile-row" style="align-items:center"><span class="when num">${esc(m.date||("D+"+m.offset))}</span>
            <div><b>${esc(m.label)}</b><div class="note" style="font-size:12.5px">${esc(m.detail||"")}</div></div>${act}</div>`;
        }).join("");
        const recalNote = `<hr class="hr"/><div class="seclabel">RECALIBRATION — THE CLOCK RETUNES THE GAME</div>
          <div class="note">Everything above is recomputed from your exam date: nightly minutes from the work left, retention ramping ${dr?`to ${Math.round((recal.desired_retention||0)*100)}%`:"up"} as the final table nears (Cepeda 2008), and no card scheduled past test day. Change the date in House Rules and the whole Ledger rewrites itself.</div>
          <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="openSettings()">Retune in House Rules →</button></div>`;
        overlay(sheet("▦","The Ledger",`the plan, night by night · ${esc(sp.exam_date||"")}`,
          head + phasebar + `<div class="calwk">${wk}</div><div class="calgrid">${cells}</div>` +
          (mileList?`<div class="seclabel" style="margin-top:16px">MARKED NIGHTS — QUIZZES & FULL-LENGTHS</div><div class="milelist">${mileList}</div>`:"") +
          recalNote, true));
      }

      /* ---- a single night's plan (click any calendar day) ---- */
      function openDay(idx){
        const L=S.ledger; if(!L) return; const dp=L.cal[idx]; if(!dp) return;
        const m=L.mileByOffset[dp.offset];
        const when = `${dp.weekday} · ${esc(dp.date||"")}${dp.is_today?" · tonight":""}`;
        let body;
        if (dp.is_exam){
          body = `<div class="daycard"><div class="dtop"><b>The MCAT</b><span class="stamp">Exam day</span></div>
            <div class="note" style="margin-top:10px">Trust the reps you've banked. One last morning game, then walk in.</div></div>`;
        } else if (dp.is_rest){
          body = `<div class="daycard"><div class="dtop"><b>Rest night</b></div>
            <div class="note" style="margin-top:10px">Rest is part of the schedule — a freeze night, no chain to break.</div></div>`;
        } else {
          const focus = dp.focus_label ? `${esc(dp.focus_label)} <span class="mono" style="font-size:11px;color:var(--brass)">· ${esc(dp.section_abbr||"")}</span>` : "Mixed review";
          const flTag = m&&m.kind==="full_length";
          const quizTag = m&&m.kind==="practice_test";
          const marker = flTag ? `<span class="stamp">◆ Full-length ${m.test_no||""}</span>`
            : quizTag ? `<span class="stamp" style="border-color:#7c9ec9;color:#bcd3f0">✎ Quiz checkpoint</span>` : "";
          body = `<div class="daycard">
            <div class="dtop"><b>${focus}</b>${marker}</div>
            <div class="note" style="margin-top:6px">${esc(({build:"Build phase — learn new tables, prove them.",bridge:"Bridge phase — connect topics, close gaps.",sharpen:"Sharpen phase — timed practice, taper in.",})[dp.phase]||"")}</div>
            <div class="plan">
              <div class="c"><b class="num">${dp.flashcards||0}</b><span>cards on the felt</span></div>
              <div class="c"><b class="num">${dp.quiz||0}</b><span>river questions</span></div>
              <div class="c"><b class="num">${dp.minutes}</b><span>minutes</span></div>
            </div>
            <div class="note" style="margin-top:12px">Two cues that day: the morning game (before coffee) and the midnight game (before sleep).</div>

            ${quizTag?`<div class="row" style="margin-top:14px"><button class="btn primary" onclick="openPracticeQuiz()">Take the quiz checkpoint →</button><span class="note">re-measure your baseline</span></div>`:""}
            ${(!flTag&&!quizTag&&!dp.is_rest)?`<div class="row" style="margin-top:14px"><button class="btn primary" onclick="openPracticeQuiz()">Play a practice quiz →</button>${dp.focus_tag?`<button class="btn ghost" onclick="$('#ov').innerHTML='';openTable('${jsq(dp.focus_tag)}')">Sit this table →</button>`:""}</div>`:""}

      /* ===================== PRACTICE QUIZ (checkpoint) ===================== */
      async function openPracticeQuiz(){
        musicKick();
        S.quiz = { n:0, total:6, correct:0, item:null, phase:null, chosen:null, last:"" };
        quizNext();
      }
      async function quizNext(){
        const q=S.quiz; if(!q) return;
        if (q.n >= q.total){ return quizScore(); }
        overlay(sheet("✎","Practice quiz","application questions · scored at the end", `<div class="spin"></div>`, false));
        let d=null;
        try{ d = await getJSON(`/_anki/antePractice?mode=mcq&scope=all&exclude=${encodeURIComponent(q.last)}`); }catch(e){}
        q.item = d&&d.item||null; q.phase=null; q.chosen=null;
        if(!q.item){ q.total=q.n; return quizScore(); }
        q.last=q.item.id; renderQuiz();
      }
      function renderQuiz(){
        const q=S.quiz; const it=q.item; if(!it) return;
        const prog=Math.round(q.n/q.total*100);
        const choices = it.choices.map((c,i)=>{
          let cls="choice";
          if(q.phase==="done"){ if(i===it.correct_index) cls+=" correct"; else if(i===q.chosen) cls+=" wrong"; }
          const on=q.phase?"":`onclick="quizPick(${i})"`;
          return `<button class="${cls}" ${on}>${esc(c)}</button>`;
        }).join("");
        const body = `<div class="qzhead"><span class="mono" style="font-size:11px;color:var(--soft)">Q ${q.n+1} / ${q.total}</span>
            <div class="prog"><div class="meter"><i style="width:${prog}%"></i></div></div>
            <span class="mono" style="font-size:11px;color:var(--good)">${q.correct} right</span></div>
          <div class="tablefelt"><div class="playcard river"><div class="kind">application · ${esc(leaf(it.topic||""))}</div>
            <div class="q" style="font-size:19px">${esc(it.stem)}</div><div class="choices">${choices}</div></div></div>
          ${q.phase==="done"?`<div class="row" style="margin-top:12px"><button class="btn primary" onclick="quizAfter()">${q.n+1>=q.total?"See the score →":"Next →"}</button></div>`:""}`;
        overlay(sheet("✎","Practice quiz","application questions · scored at the end", body, false));
      }
      function quizPick(i){
        const q=S.quiz; if(q.phase) return;
        q.chosen=i; q.phase="done";
        if(i===q.item.correct_index) q.correct++;
        pycmdSafe(`anquiz:${q.item.id}:${i}:0.6:0`); // evidence still counts
        renderQuiz();
      }
      function quizAfter(){ const q=S.quiz; q.n++; quizNext(); }
      function quizScore(){
        const q=S.quiz; const pctv=q.total?Math.round(q.correct/q.total*100):0;
        const good=pctv>=80;
        overlay(sheet("✎","Practice quiz","checkpoint complete",
          `<div class="qzscore"><div class="big" style="color:${good?"var(--good)":"var(--brass)"}">${pctv}%</div>
            <div class="note">${q.correct} of ${q.total} — ${good?"above the mastery bar. Tables like this get won.":"below the bar; the Book routes the misses back to the low table."}</div></div>
          <div class="note" style="text-align:center">Every answer fed your mastery map and calibration — a checkpoint is a real loop, not a throwaway.</div>
          <div class="row" style="justify-content:center;margin-top:16px"><button class="btn primary" onclick="openPracticeQuiz()">Another quiz</button>
            <button class="btn ghost" onclick="closeOverlay()">Done</button></div>`, false));
        S.quiz=null;
      }

      /* ===================== FULL-LENGTH ===================== */
      async function openFullLength(testNo){
        musicKick();
        overlay(sheet("◆",`Full-length ${testNo||1}`,"every section, timed in spirit, scored", `<div class="spin"></div>`, false));
        let d=null;
        try{ d = await getJSON(`/_anki/anteFullLength?test=${testNo||1}`); }catch(e){}
        if(!d||!d.sections){ overlay(sheet("◆","Full-length","",`<div class="note">The full-length is unavailable right now.</div>`,false)); return; }
        S.fl = { test:d.test_no, sections:d.sections, answers:{}, open:0, submitted:d.result||null };
        renderFL();
      }
      function renderFL(){
        const f=S.fl; if(!f) return;
        if (f.submitted) return renderFLScore(f.submitted);
        const total = f.sections.reduce((a,s)=>a+s.items.length,0);
        const answered = Object.keys(f.answers).length;
        const secs = f.sections.map((s,si)=>{
          const open = f.open===si;
          const qs = open ? s.items.map(it=>{
            const chosen=f.answers[it.id];
            const choices=it.choices.map((c,i)=>`<button class="choice ${chosen===i?"correct":""}" onclick="flPick('${jsq(it.id)}',${i})">${esc(c)}</button>`).join("");
            return `<div class="flq"><div class="stem">${esc(it.stem)}</div><div class="choices">${choices}</div></div>`;
          }).join("") : "";
          const done=s.items.filter(it=>f.answers[it.id]!=null).length;
          return `<div class="flsec"><div class="fh" onclick="flToggle(${si})"><span>${esc(s.name||SECNAME[s.id]||s.id)}</span><span class="n">${done}/${s.items.length} ${open?"▴":"▾"}</span></div>${qs}</div>`;
        }).join("");
        overlay(sheet("◆",`Full-length ${f.test}`,`every section, scored · ${answered}/${total} answered`,
          `<div class="note">Answer what you can — blanks score nothing, same as the real exam. Tap a section to open it.</div>
           <div style="margin-top:12px">${secs}</div>
           <div class="row" style="margin-top:14px"><button class="btn primary" onclick="flSubmit()">Score the test →</button>
           <button class="btn ghost" onclick="openLedger()">Save for later</button></div>`, true));
      }
      function flToggle(si){ const f=S.fl; f.open = f.open===si?-1:si; renderFL(); }
      function flPick(id,i){ S.fl.answers[id]=i; renderFL(); }
      function flSubmit(){
        const f=S.fl;
        pycmdSafe("anfl:"+f.test+":"+b64(JSON.stringify(f.answers)));
        // score locally for instant feedback (the same scorer runs server-side)
        let total=0; const secOut=[];
        f.sections.forEach(s=>{
          let correct=0; s.items.forEach(it=>{ if(f.answers[it.id]===it.correct_index) correct++; });
          const n=s.items.length; const scaled=118+Math.round(14*(n?correct/n:0));
          total+=scaled; secOut.push({id:s.id,name:s.name,n,correct,scaled});
        });
        renderFLScore({test_no:f.test,sections:secOut,total});
      }
      function renderFLScore(r){
        const secs=(r.sections||[]).map(s=>`<div style="margin:10px 0"><div class="row" style="justify-content:space-between">
          <span>${esc(SECNAME[s.id]||s.name||s.id)}</span><b class="num">${s.scaled||"—"}</b></div>
          <div class="meter"><i style="width:${Math.round((((s.scaled||118)-118)/14)*100)}%"></i></div></div>`).join("");
        overlay(sheet("◆",`Full-length ${r.test_no}`,"scored",
          `<div class="qzscore"><div class="big" style="color:var(--brass)">${r.total||"—"}</div>
            <div class="note">A practice full-length — the Book folds this into your honest line, it never inflates it.</div></div>
          ${secs}
          <div class="row" style="justify-content:center;margin-top:16px"><button class="btn ghost" onclick="openLedger()">← The Ledger</button>
            <button class="btn primary" onclick="closeOverlay()">Done</button></div>`, false));
        S.fl=null;
      }

      /* ===================== THE BACK ROOM (heads-up) ===================== */
      async function openBackroom(preTopic){
        let vd; try{ vd = await getJSON("/_anki/anteViva"); }catch(e){ vd={suggested:[]}; }
        S.viva = { data:vd, session:vd.active||null, rec:null };
        if (preTopic && !S.viva.session){ return headsupStart(preTopic); }
        renderBackroom();
      }
      function renderBackroom(){
        const v=S.viva; const sess=v.session;
        let body;
        if (!sess){
          const list=(v.data.suggested||[]);
          body = `${dealerLine("Push your chips in and explain it straight. I'll know if you're bluffing.")}
            ${v.data.demo?`<div class="note" style="margin-bottom:10px;color:var(--brass)">Demo tour — a real, graded defense; nothing is written to an account.</div>`:""}
            <div class="lead">Go heads-up to win a table outright.</div>
            <div class="note">Explaining a concept in your own words is the strongest proof you own it. Pick a table near the bar:</div>
            <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
            ${list.length?list.map(t=>`<button class="choice" onclick="headsupStart('${jsq(t.topic)}')">
              <b>${esc(t.name)}</b> <span class="mono" style="font-size:11px;color:#5c5340">· ${t.status}${t.accuracy!=null?` · ${Math.round(t.accuracy*100)}% so far`:""}</span></button>`).join("")
              :`<div class="note">Nothing eligible yet — get a table to the open state first, then come defend it.</div>`}</div>`;
        } else if (sess.blocked){
          body = `<div class="note">You've already gone heads-up on that table today. A lost hand routes you back to study, not to instant re-buys — that's the corrective loop, not a slot machine. Come back tomorrow.</div>`;
          v.session=null;
        } else if (sess.status==="open"){
          body = headsupTurn(sess);
        } else {
          body = headsupVerdict(sess);
        }
        overlay(sheet("♠","The Back Room","heads-up with Sahir",body,false));
        if (v.session && v.session.status==="open") setTimeout(()=>{ const t=$("#huText"); if(t) t.focus(); }, 100);
      }
      async function headsupStart(topic){
        pycmdSafe("anviva:start:"+b64(topic));
        await sleep(280);
        try{ const vd=await getJSON("/_anki/anteViva"); S.viva.data=vd; S.viva.session=vd.active; }catch(e){}
        renderBackroom();
      }
      function headsupTurn(sess){
        const ask = sess.ask || sess.opening || sess.question;
        const rounds=(sess.rounds||[]).map(r=>`<div style="border-left:3px solid var(--rule);padding:6px 0 6px 14px;margin:10px 0">
          <div class="serif" style="font-style:italic;color:var(--soft)">${esc(r.question||"")}</div>
          <div style="font-size:14.5px;margin-top:4px">${esc(r.answer||"")}</div></div>`).join("");
        return `${dealerLine(ask)}
          ${rounds?`<div style="margin-top:10px">${rounds}</div>`:""}
          <textarea class="answer" id="huText" placeholder="Speak or type your explanation…" style="background:var(--panel2);border-color:var(--rule);color:var(--ink)"></textarea>
          <div class="row" style="margin-top:12px;align-items:center">
            <button class="btn" id="huMic" onclick="headsupMic()" title="record">🎙 Speak</button>
            <div class="note" id="huHint" style="font-size:12.5px">Tap to answer aloud, or just type. Mechanism first, then why it matters.</div></div>
          <div class="row" style="margin-top:12px"><button class="btn primary" onclick="headsupSubmit()">Lay it down →</button></div>`;
      }
      function headsupVerdict(sess){
        const v=sess.verdict||{}; const media=sess.media||{};
        const clip = media.clip ? `<video class="scene-clip" autoplay playsinline controls><source src="${STUDIO(media.clip)}" type="video/mp4"></video>`
          : (media.still ? `<img class="plate" src="${STUDIO(media.still)}"/>` : "");
        if (media.speech && !media.clip){ playAudio(STUDIO(media.speech)); }
        const stamp = v.passed ? `<div class="stamp won">Table won</div>` : `<div class="stamp">Not yet</div>`;
        const miss = (v.missing&&v.missing.length)?`<div class="note" style="margin-top:8px"><b>Study exactly this:</b> ${v.missing.slice(0,3).map(esc).join("; ")}.</div>`:"";
        return `<div style="text-align:center">${stamp}<div class="lead" style="margin:12px 0">${esc(v.line||"")}</div>${clip}${miss}
          ${v.model_answer&&!v.passed?`<div class="note" style="margin-top:10px;text-align:left"><b>Model answer:</b> ${esc(v.model_answer)}</div>`:""}
          <div class="row" style="justify-content:center;margin-top:16px"><button class="btn primary" onclick="closeOverlay()">${v.passed?"Back to the den":"Back to study"}</button></div></div>`;
      }
      async function headsupSubmit(){
        const ta=$("#huText"); const a=ta?ta.value.trim():""; if(!a){ if(ta) ta.focus(); return; }
        const b=$(".sheet-b"); if(b) b.innerHTML=`<div class="spin"></div><div class="note" style="text-align:center">Sahir considers your answer…</div>`;
        pycmdSafe("anviva:answer:"+b64(a));
        await sleep(600);
        try{ const vd=await getJSON("/_anki/anteViva"); S.viva.data=vd;
          S.viva.session = vd.active || vd.last; }catch(e){}
        renderBackroom();
        if(S.viva.session && S.viva.session.status && S.viva.session.status!=="open"){
          pollVerdict();
        }
      }
      async function pollVerdict(){ let n=0; const iv=setInterval(async ()=>{ n++;
        try{ const vd=await getJSON("/_anki/anteViva"); if(vd.last && vd.last.media){ S.viva.session=vd.last; renderBackroom(); clearInterval(iv); } }catch(e){}
        if(n>6) clearInterval(iv); }, 3500); }
      let _media=null, _chunks=[];
      async function headsupMic(){
        const hint=$("#huHint");
        if(_media && _media.state==="recording"){ _media.stop(); return; }
        try{
          const stream=await navigator.mediaDevices.getUserMedia({audio:true});
          _chunks=[]; _media=new MediaRecorder(stream);
          _media.ondataavailable=(e)=>{ if(e.data.size) _chunks.push(e.data); };
          _media.onstop=async ()=>{ stream.getTracks().forEach(t=>t.stop());
            if(hint) hint.textContent="Transcribing…";
            const blob=new Blob(_chunks,{type:"audio/webm"});
            try{
              const r=await fetch(`/_anki/anteVivaTranscribe?mime=audio/webm`,{method:"POST",headers:{"Content-type":"application/binary"},body:blob});
              const j=await r.json(); const ta=$("#huText");
              if(ta && j.text){ ta.value=(ta.value?ta.value+" ":"")+j.text; }
              if(hint) hint.textContent=j.text?"Transcribed — edit if needed, then lay it down.":"Couldn't hear that — type your answer instead.";
            }catch(e){ if(hint) hint.textContent="Voice unavailable — type your answer."; }
          };
          _media.start(); if(hint) hint.textContent="Listening… tap Speak again to stop.";
        }catch(e){ if(hint) hint.textContent="No microphone — type your answer instead."; }
      }

      /* ===================== THE MIDNIGHT GAME (ritual + reels) ===================== */
      function openMidnight(){
        const r=S.data.ritual||{}; const ds=S.data.dreamseed||{}; const doc=S.data.documentary||{};

          ? `<div class="row" style="margin-top:14px"><button class="btn primary big" onclick="openReel()">▸ The last hand, replayed — ${ds.scenes.length} cards</button></div>

          : `<div class="note" style="margin-top:12px">${esc(ds.reason||"Play today and the last hand replays here at the midnight game.")}</div>`;
        const run = doc.available
          ? `<div class="row" style="margin-top:10px"><button class="btn big" onclick="playRun()">◆ Premiere: The Run</button>
             <button class="btn ghost" onclick="openChronicle()">▤ The Chronicle</button></div>`
          : (doc.days_left!=null?`<div class="note" style="margin-top:10px">The Run premieres ${doc.days_left>1?`in ${doc.days_left} days`:"on exam eve"} — the whole climb, cut from everything you logged.</div>`:"");

      function openReel(){ const ds=S.data.dreamseed||{}; if(!ds.available){ openMidnight(); return; }

        const dots = r.scenes.map((_,i)=>`<i class="${i===r.i?"on":""}"></i>`).join("");

        overlay(sheet(isRun?"◆":"☾", isRun?(r.meta.title||"The Run"):"The last hand, replayed", isRun?"your documentary":"replayed slow — then sleep", body, false));

        const v=sc.visual||{};

          return v.motion?`<video class="bg" autoplay loop muted playsinline><source src="${STUDIO(v.motion)}" type="video/mp4"></video>`:`<img class="bg" src="${STUDIO(v.still)}"/>`;

        if(v.kind==="sunrise") return `<div class="sunrise"></div>`;
        if(v.kind==="range" && v.range) return `<div class="bignum num">${v.range[0]}–${v.range[1]}</div>`;
        if(v.kind==="stat" && v.value!=null) return `<div class="bignum num">${esc(String(v.value))}</div>`;

      /* ===================== THE CALL ===================== */
      let RING = { osc:null, timer:null };
      function ringTone(on){
        try{
          if (!on){ clearInterval(RING.timer); RING.timer=null; return; }
          if (!MUSIC.built && !musicBuild()) return;
          const ctx=MUSIC.ctx;
          const burst=()=>{
            const o=ctx.createOscillator(), g=ctx.createGain();
            o.type="sine"; o.frequency.value=740;
            const o2=ctx.createOscillator(); o2.type="sine"; o2.frequency.value=920;
            const g2=ctx.createGain();
            g.gain.value=0; g2.gain.value=0;
            o.connect(g); o2.connect(g2); g.connect(ctx.destination); g2.connect(ctx.destination);
            const t=ctx.currentTime;
            [g,g2].forEach((gg,i)=>{ gg.gain.setValueAtTime(0,t); gg.gain.linearRampToValueAtTime(.05,t+.03+i*.02); gg.gain.setTargetAtTime(0,t+.75,.1); });
            o.start(t); o2.start(t); o.stop(t+1.2); o2.stop(t+1.2);
          };
          burst(); RING.timer=setInterval(burst, 2000);
        }catch(e){}
      }
      function startCall(){
        if (S.call) return;
        S.call = { phase:"ring", n:0, played:[] };
        store.set("anteCall", todayKey());
        renderCall(); ringTone(true);
      }
      function maybeRing(){
        const d=S.data;
        if (isDemo() || S.film || S.call || S.ob || S.diag) return;
        const hr=new Date().getHours();
        const due=(d.time_back&&d.time_back.due_count)||0;
        if (hr>=12 && hr<17 && due>0 && store.get("anteCall")!==todayKey()){
          setTimeout(()=>{ if(!S.call && !$(".scrim") && !S.film) startCall(); }, 7000);
        }
      }
      function renderCall(){
        const c=S.call; if(!c){ $("#call").innerHTML=""; return; }
        const port = has("dealer.jpg") ? `<img class="port" src="${ASSET("dealer.jpg")}"/>` : `<div class="portbox">${dealerSVG()}</div>`;
        if (c.phase==="ring"){
          $("#call").innerHTML = `<div class="callscrim"><div class="callbox">
            ${port}
            <div class="who">Sahir</div>
            <div class="what">INCOMING · THE EMERALD ROOM</div>
            <div class="note" style="margin:10px auto 18px;max-width:38ch">Three cards, right now, while they're warm. Sixty seconds.</div>
            <div class="row" style="justify-content:center">
              <button class="btn primary big" onclick="answerCall()">Answer</button>
              <button class="btn ghost" onclick="endCall(true)">Not now</button></div>
          </div></div>`;
          return;
        }
        if (c.phase==="done"){
          $("#call").innerHTML = `<div class="callscrim"><div class="callbox">
            ${port}
            <div class="who">That's the hand.</div>
            <div class="note" style="margin:8px auto 18px;max-width:38ch">${c.n} card${c.n===1?"":"s"} played off the clock. I'll hold the table.</div>
            <button class="btn primary" onclick="endCall()">Back to your day</button>
          </div></div>`;
          return;
        }
        // phase "hand": one big card at a time
        const card=c.card;
        if(!card){ $("#call").innerHTML=`<div class="callscrim"><div class="callbox"><div class="spin"></div></div></div>`; return; }
        const ans = c.show
          ? `<div class="a">${(card.answer||"").replace(card.question,"")||card.answer}</div>`
          : "";
        const controls = c.show
          ? `<div class="easeRow" style="max-width:460px;margin:14px auto 0">
              <button class="e1" onclick="callAnswer(1)">Again</button><button class="e2" onclick="callAnswer(2)">Hard</button>
              <button class="e3" onclick="callAnswer(3)">Good</button><button class="e4" onclick="callAnswer(4)">Easy</button></div>`
          : `<div class="row" style="justify-content:center;margin-top:14px"><button class="btn primary big" onclick="S.call.show=true;renderCall()">Turn it over</button></div>`;
        $("#call").innerHTML = `<div class="callscrim"><div class="callbox" style="max-width:560px">
          <div class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--brass);margin-bottom:12px">ON THE LINE WITH SAHIR · CARD ${c.n+1} OF 3</div>
          <div class="playcard" style="text-align:left">
            <div class="corner">☎</div><div class="corner br">☎</div>
            <div class="kind">rapid recall · ${esc(leaf(card.topic||""))}</div>
            <div class="q">${card.question}</div>${ans}</div>
          ${controls}
          <button class="feltlink" style="margin-top:14px" onclick="endCall()">hang up</button>
        </div></div>`;
      }
      async function answerCall(){
        ringTone(false); musicKick();
        const c=S.call; c.phase="hand"; c.card=null; renderCall();
        playVoice("vo_call_open.mp3");
        await callDraw();
      }
      async function callDraw(){
        const c=S.call; if(!c) return;
        try{ const d=await getJSON("/_anki/anteStudy"); c.card = (!d.done && d.card) ? d.card : null; }catch(e){ c.card=null; }
        c.show=false;
        if (!c.card){ c.phase="done"; playVoice("vo_call_done.mp3"); }
        renderCall();
      }
      function callAnswer(ease){
        const c=S.call; if(!c) return;
        pycmdSafe("ananswer:"+ease);
        c.n++;
        if (c.n>=3){ c.phase="done"; playVoice("vo_call_done.mp3"); renderCall(); return; }
        c.card=null; renderCall(); setTimeout(callDraw, 160);

      /* ============ THE BUY-IN GAME (baseline diagnostic) ============ */
      async function diagStart(fromOnboard){
        let payload=null; try{ payload=await getJSON("/_anki/anteDiagnostic"); }catch(e){}
        if(!payload||!payload.form||!payload.form.sections.length){ if(fromOnboard) obFinish(); else toast("The buy-in game is unavailable right now."); return; }
        S.diag={ form:payload.form, si:0, ii:0, phase:null, chosen:null, conf:null, answer:"",
          shownAt:Date.now(), results:{}, answered:0, fromOnboard:!!fromOnboard, mode:"item", secBreak:false };
        renderDiag();
      }
      function diagItem(){ const d=S.diag; const sec=d.form.sections[d.si]; return sec?sec.items[d.ii]:null; }
      function diagCredit(sec,val){ const d=S.diag; const r=d.results[sec.id]=d.results[sec.id]||{sum:0,n:0}; r.sum+=val; r.n++; d.answered++; }
      function renderDiag(){
        const d=S.diag; if(!d) return;
        if(d.mode==="summary") return diagSummary();
        const sec=d.form.sections[d.si]; const it=diagItem();
        const done=d.form.sections.slice(0,d.si).reduce((a,s)=>a+s.count,0)+d.ii;
        const prog=Math.round(done/Math.max(1,d.form.total)*100);
        if(d.secBreak){ const last=d.si===d.form.sections.length-1;
          $("#root").innerHTML=cover(`<div class="mono" style="letter-spacing:.16em;color:var(--soft);font-size:11px">${esc(sec.code)} · RECORDED</div>
            <div class="lead" style="margin:10px 0">No score shown mid-game — you get one honest count at the end.</div>
            <button class="btn primary big" onclick="diagNextSection()">${last?"Count my stack →":"Next section →"}</button>`); return; }
        if(!it) return diagSummary();
        const isOpen=it.type==="open";
        const bodyItem = isOpen
          ? `<textarea class="answer" id="diagText" placeholder="A couple of sentences is plenty…" style="background:var(--panel2);border-color:var(--rule);color:var(--ink)">${esc(d.answer||"")}</textarea>
             <div class="note" style="margin-top:10px">Before you lay it down — how sure?</div>
             <div class="conf"><button onclick="diagOpen(0.35)">Check<small>guessing</small></button><button onclick="diagOpen(0.65)">Call<small>fairly</small></button><button onclick="diagOpen(0.9)">Raise<small>sure</small></button></div>`
          : (()=>{ const ch=it.choices.map((c,i)=>{ let cls="choice"; if(d.phase==="conf"&&i===d.chosen)cls+=" correct"; const on=d.phase?"":`onclick="diagPick(${i})"`; return `<button class="${cls}" ${on}>${esc(c)}</button>`; }).join("");
              let t=`<div class="choices">${ch}</div>`;
              if(d.phase==="conf") t+=`<div class="note" style="margin-top:10px">Locked in — how sure?</div><div class="conf"><button onclick="diagConf(0.35)">Check<small>guessing</small></button><button onclick="diagConf(0.65)">Call<small>fairly</small></button><button onclick="diagConf(0.9)">Raise<small>sure</small></button></div>`;
              return t; })();
        $("#root").innerHTML=cover(`<div style="max-width:560px;text-align:left;width:100%">
          <div class="mono" style="letter-spacing:.14em;color:var(--brass);font-size:11px">THE BUY-IN GAME · ${esc(sec.code)}</div>
          <div class="meter" style="margin:10px 0"><i style="width:${prog}%"></i></div>
          <div class="playcard"><div class="kind">${esc(sec.code)}</div><div class="q" style="font-size:21px">${esc(it.stem)}</div>${d.phase==="grading"?'<div class="note" style="color:#5c5340">Recording…</div>':""}</div>
          ${d.phase==="grading"?"":bodyItem}
          <div class="note" style="margin-top:8px">${d.answered} answered · no right/wrong shown</div>
        </div>`) + `<div style="position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:65;display:flex;flex-direction:column;gap:8px;text-align:right">
          <button class="btn ghost" onclick="diagAbort()">Skip the test →</button>
          <div class="note" style="font-size:11px;max-width:20ch">No penalty — the Book simply abstains until it has evidence.</div>
        </div>`;
        if(isOpen) setTimeout(()=>{ const t=$("#diagText"); if(t) t.focus(); },80);
      }
      function diagPick(i){ S.diag.chosen=i; S.diag.phase="conf"; renderDiag(); }
      function diagConf(v){ const d=S.diag; const it=diagItem(); const ms=Date.now()-(d.shownAt||Date.now());
        pycmdSafe(`anquiz:${it.id}:${d.chosen}:${v}:${ms}`); diagCredit(d.form.sections[d.si], d.chosen===it.correct_index?1:0); diagNext(); }
      async function diagOpen(v){ const d=S.diag; const it=diagItem(); const ta=$("#diagText"); const a=ta?ta.value.trim():""; if(!a){ if(ta)ta.focus(); return; }
        const ms=Date.now()-(d.shownAt||Date.now()); d.answer=a; d.phase="grading"; renderDiag();
        let g=null; try{ g=await getJSON(`/_anki/anteGradeOpen?id=${encodeURIComponent(it.id)}&answer=${encodeURIComponent(a)}`);}catch(e){}
        pycmdSafe(`anopen:${it.id}:${v}:${ms}:${b64(a)}`); diagCredit(d.form.sections[d.si], Math.max(0,Math.min(1,(g&&g.score)||0))); diagNext(); }
      function diagNext(){ const d=S.diag; const sec=d.form.sections[d.si]; d.phase=null; d.chosen=null; d.answer=""; d.shownAt=Date.now();
        if(d.ii<sec.count-1) d.ii++; else d.secBreak=true; renderDiag(); }
      function diagNextSection(){ const d=S.diag; d.secBreak=false;
        if(d.si<d.form.sections.length-1){ d.si++; d.ii=0; d.shownAt=Date.now(); renderDiag(); }
        else { d.mode="summary"; pycmdSafe("andiag:done"); renderDiag(); } }
      function diagAbort(){ const d=S.diag; pycmdSafe(d.answered?"andiag:done":"andiag:skip"); if(d.fromOnboard){ S.diag=null; obFinish(); } else { S.diag=null; loadData(true); } }
      function diagSummary(){
        const d=S.diag;
        const rows=d.form.sections.map(sec=>{ const r=d.results[sec.id]||{sum:0,n:0}; const acc=r.n?r.sum/r.n:null;
          const score=acc==null?null:Math.round(118+14*Math.max(0,Math.min(1,acc))); return {name:sec.name,code:sec.code,n:r.n,acc,score}; });
        const scored=rows.filter(r=>r.n>=4); const total=scored.length===rows.length?rows.reduce((a,r)=>a+r.score,0):null;
        const rowHtml=rows.map(r=>`<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--rule);padding:8px 0">
          <span>${esc(r.name)}</span><b class="num">${r.score!=null?r.score:"—"}</b></div>`).join("");
        const verdict= total!=null?`<div class="kpi num" style="margin-top:10px;color:var(--brass)">${total} <span class="rng">your buy-in · wide band</span></div>`
          :`<div class="note" style="margin-top:10px">Partial count — skipped sections get no reading. The Book doesn't extrapolate.</div>`;
        $("#root").innerHTML=cover(`<div style="max-width:520px;text-align:left;width:100%">
          <div class="stamp">Stack counted</div>${verdict}
          <div style="margin:14px 0">${rowHtml}</div>
          <div class="note">Every answer just fed the Circuit, your comprehension and your calibration — the buy-in <b>is</b> your first hand.</div>
          <div class="row" style="margin-top:16px"><button class="btn primary big" onclick="diagDone()">Into the den →</button></div>
        </div>`);
      }
      function diagDone(){ const d=S.diag; const fromOb=d.fromOnboard; S.diag=null; if(fromOb) obFinish(); else loadData(true); }
      function cover(inner){ return `<div class="cover"><div class="gate" style="max-width:none;width:auto">${inner}</div></div>`; }

      /* ===================== THE SIMULATOR (demo control room) =====================
         Every feature in the app, triggerable from one panel — the whole thing
         runs the real engine over synthetic data (ante/demo.py). */
      function renderSim(){
        const dm=S.data && S.data.demo;
        if (!dm || !dm.enabled){ $("#sim").innerHTML=""; return; }
        if (!S.simOpen){
          $("#sim").innerHTML = `<div class="simchip" onclick="S.simOpen=true;renderSim()"><b>◉ SIMULATOR</b> night ${dm.day}/${dm.runway} · ${String(dm.hour).padStart(2,"0")}:00 <span style="color:var(--soft)">open ▾</span></div>`;
          return;
        }
        const jumps=(dm.jumps||[]).map(j=>`<button onclick="simDay(${j.day})">${esc(j.label)}</button>`).join("");
        const hours=[["Morning",9],["Midday",14],["Dusk",19],["Night",23]].map(([n,h])=>
          `<button class="${dm.hour===h?"on":""}" onclick="simHour(${h})">${n}</button>`).join("");
        $("#sim").innerHTML = `
          <div class="simchip" onclick="S.simOpen=false;renderSim()"><b>◉ SIMULATOR</b> night ${dm.day}/${dm.runway} · ${String(dm.hour).padStart(2,"0")}:00 <span style="color:var(--soft)">close ▴</span></div>
          <div class="simpanel">
            <h4>The clock</h4>
            <input type="range" min="0" max="${dm.runway}" value="${dm.day}" onchange="simDay(this.value)"/>
            <div class="simgrid" style="margin-top:6px">${jumps}</div>
            <div class="hourseg" style="margin-top:8px">${hours}</div>
            <h4>The cinema</h4>
            <div class="simgrid">
              <button onclick="S.simOpen=false;renderSim();filmStart(false)">The film</button>
              <button onclick="S.simOpen=false;renderSim();startCall()">The Call</button>
              <button onclick="simReel()">Last hand reel</button>
              <button onclick="simRun()">The Run</button>
            </div>
            <button class="simwide" onclick="simChronicle()">The Chronicle (print)</button>
            <h4>Quizzes & tests</h4>
            <div class="simgrid">
              <button onclick="S.simOpen=false;renderSim();openPracticeQuiz()">Practice quiz</button>
              <button onclick="S.simOpen=false;renderSim();openFullLength(1)">Full-length 1</button>
            </div>
            <h4>Nudges — the notification system</h4>
            <div class="simgrid">
              <button onclick="simNudge('retrieval')">Morning game</button>
              <button onclick="simNudge('review')">Midday hold</button>
              <button onclick="simNudge('encode')">Midnight game</button>
              <button onclick="simNudge('reward')">Surprise reward</button>
            </div>
            <button class="simwide" onclick="pycmdSafe('annotify:test');toast('Scheduled-nudge test fired.')">Fire next scheduled nudge</button>
            <div class="note" style="margin-top:6px;font-size:11px">Every nudge also shows in-app. For macOS banners, allow “Script Editor / osascript” under System Settings → Notifications.</div>
            <div class="note" style="margin-top:12px">Every number here is the real engine running on a synthetic 90-night history — nothing touches your collection.</div>
          </div>`;
      }
      function simDo(cmd, after){ pycmdSafe(cmd); setTimeout(()=>{ loadData(true).then(()=>{ if(after) after(); }); }, 330); }
      function simDay(n){ simDo("andemo:day:"+n); }
      function simHour(h){ simDo("andemo:hour:"+h); }
      const NUDGE_COPY = {
        retrieval:["The morning game opens","Sit down cold: a short recall hand beats an hour of rereading. The deck is already stacked in your favor."],
        review:["Midday — protect your stack","A few minutes now and the House doesn't claw back what you banked."],
        encode:["The midnight game — last hand before lights out","Play a light hand now and your brain banks it overnight. Then lights out."],
        reward:["A table just went your way","You proved a topic on application — that plaque is yours, banked. (Surprise reward, if rewards are on.)"],
      };
      function simNudge(kind){
        // close the panel so the card is unobstructed, fire the real cue (for
        // the native banner attempt), and always show the in-app nudge card
        S.simOpen=false; renderSim();
        pycmdSafe("annotify:fire:"+kind);
        const c = NUDGE_COPY[kind] || ["Ante","The table's open."];
        if (window.anNudge) anNudge(c[0], c[1]);
      }
      function simReel(){ simDo("andemo:hour:23", ()=>{ S.simOpen=false; renderSim(); openReel(); }); }
      function simRun(){ simDo("andemo:day:89", ()=>{ S.simOpen=false; renderSim(); playRun(); }); }
      function simChronicle(){ simDo("andemo:day:89", ()=>{ S.simOpen=false; renderSim(); openChronicle(); }); }

      /* ---- utilities ---- */
      function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
      function playAudio(url){ try{ const a=new Audio(url); a.play().catch(()=>{}); }catch(e){} }
      function pollStudio(cb){ let n=0; clearInterval(S.studioPoll);
        S.studioPoll=setInterval(async ()=>{ n++; try{ await loadData(true); }catch(e){} if(cb) cb(); if(n>8) clearInterval(S.studioPoll); }, 4000); }

      /* the score starts on the first gesture anywhere (autoplay policy) */
      document.addEventListener("pointerdown", ()=>musicKick(), {capture:true});

      /* boot after DOM ready */
      document.addEventListener("DOMContentLoaded", boot);
      if (document.readyState !== "loading") boot();
    </script>
  </body>
</html>
