# XcodeGen spec for the Ante iOS companion.
#
#   brew install xcodegen
#   cd ios && xcodegen generate
#   open Ante.xcodeproj
#
# One application target, no packages, no external dependencies. The Info.plist
# is generated from the INFOPLIST_KEY_* settings below. Notifications need NO
# plist key — permission is requested at runtime via UNUserNotificationCenter —
# and there is no UIBackgroundModes entry because local notifications fire from
# the system scheduler with the app closed, so no background execution is needed.

name: Ante

options:
  bundleIdPrefix: app.ante
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Ante:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Ante
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ante.ios
        PRODUCT_NAME: Ante
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ante
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
