            <span style="font-size:19px;color:var(--brass)">${r.g}</span>
            <span><b class="serif" style="font-size:16.5px">${r.n}</b><br><span class="note" style="font-size:12.5px">${r.s}</span></span></button>`).join("");
        overlay(sheet("♠","The Rooms","the rest of the house", `<div style="display:flex;flex-direction:column;gap:10px">${body}</div>`, false));
      }

      /* ===================== THE RUN (motivation) ===================== */
      function runBlockHtml(d){
        const st=d.streak||{}; const mom=(d.momentum||{}); const mot=(d.motivation||{});
        const n=st.current_streak||0, target=st.target_days||30;

            <circle cx="60" cy="60" r="${R}" fill="none" stroke="var(--rule)" stroke-width="8"/>
            <circle cx="60" cy="60" r="${R}" fill="none" stroke="${won?"var(--good)":"var(--brass)"}" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`; })();

            <div style="flex:1;min-width:220px">
              <div class="serif" style="font-size:21px;font-weight:800">${won?"The gift card is yours.":"The 30-night run"}</div>

            </div></div>
          <div class="note" style="margin-top:12px"><b>House rules for the run.</b> A night counts only when genuine play happened — ${"≥"}15 real answers at honest speeds. Opening the app counts for nothing. ${st.freezes_remaining!=null?`You hold ${st.freezes_remaining} rest-night freeze(s) this month — rest is part of the schedule.`:""}</div>
          <div class="note" style="margin-top:8px"><b>Momentum.</b> ${esc((mom.message)||"Mastery momentum moves only on real learning.")}</div>
          <div class="row" style="justify-content:space-between;margin-top:12px">
            <span class="note">Rewards are opt-in — autonomy first. ${optIn?"Currently ON.":"Currently OFF."}</span>
            <button class="btn ghost" onclick="toggleRewards(${optIn?"false":"true"})">${optIn?"Turn rewards off":"Opt in to rewards"}</button></div>`;
      }
      async function toggleRewards(on){
        await pycmdAck("anprofile:"+b64(JSON.stringify({rewards_opt_in:!!on})));
        toast(on?"Rewards on — the run pays out at 30 honest nights.":"Rewards off — the honest signals stay.");
        loadData(true).then(()=>openStanding());
      }

      /* ===================== THE BACK ROOM (heads-up) ===================== */
      async function openBackroom(preTopic){
        let vd; try{ vd = await getJSON("/_anki/anteViva"); }catch(e){ vd={suggested:[]}; }
        // a stale live line from an earlier exam never follows you back in
        if (RT.status!=="off" && (!vd.active || vd.active.id!==RT.sessId)) rtLeave(true);
        S.viva = { data:vd, session:vd.active||null, rec:null, saidKey:null };
        if (preTopic && !S.viva.session){ return headsupStart(preTopic); }
        renderBackroom();
        vivaSay();
        pollViva();
      }
      /* Sahir in person: the living dealer loop when the plates exist, the
         still otherwise. mood="thinking" pulses the lamplight while he
         considers an answer. */
      function headsupDealer(text, mood){
        const loop = vid("dealer_idle", `autoplay muted loop playsinline preload="auto"`);
        const inner = loop || (has("dealer.jpg") ? `<img src="${ASSET("dealer.jpg")}"/>` : null);
        const face = inner ? `<div class="hu-face">${inner}</div>` : `<div class="facebox">${dealerSVG()}</div>`;
        return `<div class="dealerline hu${mood==="thinking"?" thinking":""}">${face}<div class="say">${esc(text)}</div></div>`;
      }
      /* Sahir's voice: play the speech attached to the line he is currently
         saying (opening / probe / verdict), exactly once per line. A stale
         `say` from an earlier round (text no longer on the felt) stays quiet. */
      function vivaSay(){
        const v=S.viva; if(!v || !v.session) return;
        // on the live table Sahir speaks in person — the clip pipeline stays
        // quiet, including after a live-delivered verdict (saidKey sentinel)
        if (RT.status!=="off" || v.saidKey==="live") return;
        const sess=v.session;
        let clip=null;
        if (sess.status==="open"){
          const line = sess.ask || sess.opening || sess.question;
          if (sess.say && sess.say.speech && sess.say.text===line) clip=sess.say.speech;
        } else if (sess.media && !sess.media.clip && sess.media.speech){
          clip=sess.media.speech;
        }
        if (clip && v.saidKey!==clip){ v.saidKey=clip; playAudio(STUDIO(clip)); }
      }
      /* One poll for everything Sahir renders in the background: the spoken
         line mid-exam (attached to the active session as `say`) and the
         verdict media after it closes. Open sessions are never re-rendered —
         the student may be typing — the voice just arrives. */
      function pollViva(){
        clearInterval(S.vivaPoll); let n=0;
        S.vivaPoll=setInterval(async ()=>{
          n++;
          if(!S.viva){ clearInterval(S.vivaPoll); return; }
          if (RT.status!=="off"){ clearInterval(S.vivaPoll); return; }
          try{
            const vd=await getJSON("/_anki/anteViva");
            if(!S.viva) return;
            S.viva.data=vd;
            const cur=S.viva.session;
            if (cur && cur.status==="open"){
              const act=vd.active;
              if (act && act.id===cur.id){
                cur.say=act.say||cur.say;
                vivaSay();
                if (cur.say && cur.say.speech) clearInterval(S.vivaPoll);
              }
            } else if (cur && vd.last && vd.last.id===cur.id && vd.last.media){
              S.viva.session=vd.last;
              renderBackroom();
              vivaSay();
              clearInterval(S.vivaPoll);
            }
          }catch(e){}
          if(n>8) clearInterval(S.vivaPoll);
        }, 3000);
      }
      function renderBackroom(){
        const v=S.viva; const sess=v.session;
        let body;
        if (!sess){
          const list=(v.data.suggested||[]);
          body = `${headsupDealer("Push your chips in and explain it straight. I'll know if you're bluffing.")}
            ${v.data.demo?`<div class="note" style="margin-bottom:10px;color:var(--brass)">Demo tour — a real, graded defense; nothing is written to an account.</div>`:""}
            <div class="lead">Go heads-up to win a table outright.</div>
            <div class="note">Explaining a concept in your own words is the strongest proof you own it. Pick a table near the bar:</div>
            <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
            ${list.length?list.map(t=>`<button class="choice" onclick="headsupStart('${jsq(t.topic)}')">
              <b>${esc(t.name)}</b> <span class="mono" style="font-size:11px;color:#5c5340">· ${t.status}${t.accuracy!=null?` · ${Math.round(t.accuracy*100)}% so far`:""}</span></button>`).join("")
              :`<div class="note">Nothing eligible yet — get a table to the open state first, then come defend it.</div>`}</div>`;
        } else if (sess.blocked){
          body = `<div class="note">You've already gone heads-up on that table today. A lost hand routes you back to study, not to instant re-buys — that's the corrective loop, not a slot machine. Come back tomorrow.</div>`;
          v.session=null;
        } else if (sess.status==="open"){
          body = headsupTurn(sess);
        } else {
          body = headsupVerdict(sess);
        }
        overlay(sheet("♠","The Back Room","heads-up with Sahir",body,false));
        if (v.session && v.session.status==="open") setTimeout(()=>{ const t=$("#huText"); if(t) t.focus(); }, 100);
      }
      async function headsupStart(topic){
        // the bridge acks once the session is written, so the refetch is safe
        await pycmdAck("anviva:start:"+b64(topic));
        if(!S.viva) return;
        try{ const vd=await getJSON("/_anki/anteViva"); S.viva.data=vd; S.viva.session=vd.active; }catch(e){}
        renderBackroom();
        vivaSay();
        pollViva();
      }
      function headsupTurn(sess){
        const ask = sess.ask || sess.opening || sess.question;
        const rounds=(sess.rounds||[]).map(r=>`<div style="border-left:3px solid var(--rule);padding:6px 0 6px 14px;margin:10px 0">
          <div class="serif" style="font-style:italic;color:var(--soft)">${esc(r.question||"")}</div>
          <div style="font-size:14.5px;margin-top:4px">${esc(r.answer||"")}</div></div>`).join("");
        if (RT.status!=="off"){ return headsupLivePanel(sess, rounds); }
        const liveBtn = (S.viva.data && S.viva.data.realtime)
          ? `<button class="btn" onclick="rtJoin()" title="a live spoken exam — the ledger still grades">♠ Go live</button>` : "";
        return `${headsupDealer(ask)}
          ${rounds?`<div style="margin-top:10px">${rounds}</div>`:""}
          <textarea class="answer" id="huText" placeholder="Speak or type your explanation…" style="background:var(--panel2);border-color:var(--rule);color:var(--ink)"></textarea>
          <div class="row" style="margin-top:12px;align-items:center">
            <button class="btn" id="huMic" onclick="headsupMic()" title="record">🎙 Speak</button>${liveBtn}
            <div class="note" id="huHint" style="font-size:12.5px">${liveBtn?"Go live for a real conversation, answer aloud in takes, or type.":"Tap to answer aloud, or just type. Mechanism first, then why it matters."}</div></div>
          <div class="row" style="margin-top:12px"><button class="btn primary" onclick="headsupSubmit()">Lay it down →</button></div>`;
      }
      /* Live mode replaces the answer strip: no taps, no textarea — you talk,
         he talks. The rounds ledger keeps filling in as each turn is graded
         through the same deterministic path as a typed answer. */
      function headsupLivePanel(sess, roundsHtml){
        const state = RT.status==="live" ? "in session — speak when ready"
          : (RT.status==="connecting" ? "dealing you in…" : "line lost");
        return `${headsupDealer(sess.ask || sess.opening || sess.question)}
          ${roundsHtml?`<div style="margin-top:10px">${roundsHtml}</div>`:""}
          <div class="rtpanel">
            <div class="rtpill ${RT.status==="error"?"err":""}"><span class="dot"></span>THE LIVE TABLE · ${esc(state)}</div>
            <div class="rtcap" id="rtCap">${esc(RT.caption||"")}</div>
            <div class="rtyou" id="rtYou">${RT.youLine?`<b>you:</b> ${esc(RT.youLine)}`:(RT.status==="live"?"Sahir is listening — take your time.":"")}</div>
            <div class="row" style="margin-top:12px">
              <button class="btn ghost" onclick="rtLeave()">Leave the live table</button>
              <div class="note" style="font-size:11.5px">Every word is graded by the ledger, never by the voice.</div>
            </div>
          </div>`;
      }
      function headsupVerdict(sess){
        const v=sess.verdict||{}; const media=sess.media||{};
        // the talking-head clip when the Studio rendered one; otherwise Sahir's
        // living loop while his spoken verdict plays (vivaSay), or the still
        const clip = media.clip ? `<video class="scene-clip" autoplay playsinline controls><source src="${STUDIO(media.clip)}" type="video/mp4"></video>`
          : (media.speech ? (vid("dealer_idle", `autoplay muted loop playsinline preload="auto" class="scene-clip"`)||"")
          : (media.still ? `<img class="plate" src="${STUDIO(media.still)}"/>` : ""));
        const stamp = v.passed ? `<div class="stamp won">Table won</div>` : `<div class="stamp">Not yet</div>`;
        const miss = (v.missing&&v.missing.length)?`<div class="note" style="margin-top:8px"><b>Study exactly this:</b> ${v.missing.slice(0,3).map(esc).join("; ")}.</div>`:"";
        return `<div style="text-align:center">${stamp}<div class="lead" style="margin:12px 0">${esc(v.line||"")}</div>${clip}${miss}
          ${v.model_answer&&!v.passed?`<div class="note" style="margin-top:10px;text-align:left"><b>Model answer:</b> ${esc(v.model_answer)}</div>`:""}
          <div class="row" style="justify-content:center;margin-top:16px"><button class="btn primary" onclick="closeOverlay()">${v.passed?"Back to the den":"Back to study"}</button></div></div>`;
      }
      async function headsupSubmit(){
        const ta=$("#huText"); const a=ta?ta.value.trim():""; if(!a){ if(ta) ta.focus(); return; }
        const b=$(".sheet-b"); if(b) b.innerHTML=`${headsupDealer("Sahir turns your answer over against the rubric…","thinking")}<div class="spin"></div>`;
        // grading runs inside the bridge call — the ack means the verdict (or
        // next probe) is already on the books, no guessed wait needed
        await pycmdAck("anviva:answer:"+b64(a));
        if(!S.viva) return;
        try{ const vd=await getJSON("/_anki/anteViva"); S.viva.data=vd;
          S.viva.session = vd.active || vd.last; }catch(e){}
        if(S.viva.session && S.viva.session.status==="open") S.viva.saidKey=null;
        renderBackroom();
        vivaSay();
        pollViva();
      }
      let _media=null, _chunks=[];
      async function headsupMic(){
        const hint=$("#huHint");
        if(_media && _media.state==="recording"){ _media.stop(); return; }
        try{
          const stream=await navigator.mediaDevices.getUserMedia({audio:true});
          _chunks=[]; _media=new MediaRecorder(stream);
          _media.ondataavailable=(e)=>{ if(e.data.size) _chunks.push(e.data); };
          _media.onstop=async ()=>{ stream.getTracks().forEach(t=>t.stop());
            const btn=$("#huMic"); if(btn) btn.textContent="🎙 Speak";
            if(hint) hint.textContent="Transcribing…";
            const blob=new Blob(_chunks,{type:"audio/webm"});
            try{
              const r=await fetch(withTok(`/_anki/anteVivaTranscribe?mime=audio/webm`),{method:"POST",headers:{"Content-type":"application/binary"},body:blob});
              const j=await r.json(); const ta=$("#huText");
              if(ta && j.text){ ta.value=(ta.value?ta.value+" ":"")+j.text; }
              if(hint) hint.textContent=j.text?"Transcribed — edit if needed, then lay it down.":"Couldn't hear that — type your answer instead.";
            }catch(e){ if(hint) hint.textContent="Voice unavailable — type your answer."; }
          };
          _media.start(); if(hint) hint.textContent="Listening… tap Speak again to stop.";
          const btn=$("#huMic"); if(btn) btn.textContent="■ Stop";
        }catch(e){
          if(hint) hint.textContent = (e && (e.name==="NotAllowedError"||e.name==="SecurityError"))
            ? "Mic access blocked — allow the microphone for Anki in System Settings → Privacy, then try again."
            : "No microphone found — type your answer instead.";
        }
      }

      /* ===================== THE LIVE TABLE (realtime heads-up) =====================
         A true spoken conversation with Sahir over the OpenAI Realtime API
         (WebRTC). The honesty contract is untouched:

           · create_response is OFF — the model can never speak on its own.
           · Each player turn's official transcript is graded through the SAME
             bridge path as a typed answer (anviva:answer -> submit_answer).
           · Only after the ledger grades does the page hand the model a
             private [LEDGER] cue (built server-side in ante/viva.py) and ask
             for a response. The voice performs; the ledger decides.

         The page never sees the real API key — it fetches a short-lived
         client secret from the local mint endpoint. Everything degrades to
         tap-to-speak when the key, mic, or wire is missing. */
      const RT = { status:"off", pc:null, dc:null, mic:null, audio:null,
        caption:"", youLine:"", queue:Promise.resolve(), spokeVerdict:false, sessId:null };
      const RT_CALLS_URL = "https://api.openai.com/v1/realtime/calls";
      function rtSend(obj){ try{ if(RT.dc && RT.dc.readyState==="open") RT.dc.send(JSON.stringify(obj)); }catch(e){} }
      function rtCue(text){
        if(!text) return;
        rtSend({ type:"conversation.item.create",
          item:{ type:"message", role:"user", content:[{ type:"input_text", text }] } });
        rtSend({ type:"response.create" });
      }
      function rtSetStatus(st){
        RT.status=st;
        // re-render only when the Back Room is the open sheet
        if (S.viva && S.viva.session && $(".sheet")) renderBackroom();
      }
      async function rtJoin(){
        if (RT.status!=="off" || !S.viva || !S.viva.session || S.viva.session.status!=="open") return;
        RT.sessId = S.viva.session.id; RT.caption=""; RT.youLine=""; RT.spokeVerdict=false;
        rtSetStatus("connecting");
        try{
          // the POST permission gate requires this exact content-type header
          // (an opaque-cross-origin guard shared with anteVivaTranscribe)
          const r = await fetch(withTok("/_anki/anteRealtimeSecret"),
            {method:"POST", headers:{"Content-type":"application/binary"}});
          const raw = (await r.text()) || "";
          // a non-JSON body (a Flask 403/500 HTML page) means the request never
          // reached the mint — almost always the den page lost its per-boot
          // token; give a clear, actionable line instead of a JSON-parse error
          let mint;
          try { mint = JSON.parse(raw); }
          catch(_){
            const looksHtml = raw.trim().charAt(0)==="<";
            throw new Error((!window.ANTE_TOKEN || looksHtml)
              ? "this den page lost its session token — close the den and reopen it from the door"
              : "the table didn't answer ("+r.status+")");
          }
          if (!mint.ok){
            // the ledger has to be mid-examination to seat you at the live table
            throw new Error(mint.reason==="no active examination"
              ? "take your seat first — pick a table and start the defense, then go live"
              : (mint.reason==="no key"
                ? "the live table needs an OpenAI key on the desk — the felt still plays: speak in takes or type"
                : (mint.reason||"no seat on the wire")));
          }
          let stream;
          try{
            stream = await navigator.mediaDevices.getUserMedia({audio:true});
          }catch(micErr){
            throw new Error((micErr && (micErr.name==="NotAllowedError"||micErr.name==="SecurityError"))
              ? "mic access is blocked — allow the microphone for Anki in System Settings → Privacy, then go live again"
              : "no microphone found — the felt still plays: speak in takes or type");
          }
          RT.mic = stream;
          const pc = new RTCPeerConnection();
          RT.pc = pc;
          RT.audio = new Audio(); RT.audio.autoplay = true;
          pc.ontrack = (e)=>{ RT.audio.srcObject = e.streams[0]; };
          stream.getTracks().forEach(t=>pc.addTrack(t, stream));
          const dc = pc.createDataChannel("oai-events");
          RT.dc = dc;
          dc.onmessage = (e)=>{ try{ rtEvent(JSON.parse(e.data)); }catch(err){} };
          dc.onopen = ()=>{
            pycmdSafe("anviva:live:on");
            // Sahir opens: greet + put the exam question on the felt (the cue
            // text comes from the ledger's own module, server-side)
            const cue = S.viva.session && S.viva.session.rt_cue;
            rtCue(cue || "[LEDGER — PRIVATE] Greet the player and ask the exam question.");
          };
          dc.onclose = ()=>{ if (RT.status!=="off") rtLeave(true); };
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          const sdpResp = await fetch(RT_CALLS_URL, {
            method:"POST",
            headers:{ "Authorization":"Bearer "+mint.value, "Content-Type":"application/sdp" },
            body: offer.sdp,
          });
          if (!sdpResp.ok) throw new Error("the wire refused the call ("+sdpResp.status+")");
          await pc.setRemoteDescription({ type:"answer", sdp: await sdpResp.text() });
          rtSetStatus("live");
        }catch(e){
          rtTeardown();
          rtSetStatus("off");
          const msg = (e && e.message) ? e.message : "the wire is down";
          // only append the felt-fallback reminder when the message hasn't
          // already said it (the mic/key lines carry their own guidance)
          const tail = /felt|takes or type/i.test(msg) ? "" : ". The felt still plays: speak in takes or type.";
          toast("Couldn't open the live table — "+msg+tail);
        }
      }
      function rtTeardown(){
        try{ if(RT.mic) RT.mic.getTracks().forEach(t=>t.stop()); }catch(e){}
        try{ if(RT.dc) RT.dc.close(); }catch(e){}
        try{ if(RT.pc) RT.pc.close(); }catch(e){}
        try{ if(RT.audio){ RT.audio.srcObject=null; } }catch(e){}
        RT.pc=null; RT.dc=null; RT.mic=null; RT.audio=null;
      }
      function rtLeave(silent){
        const wasLive = RT.status!=="off";
        rtTeardown();
        RT.status="off"; RT.caption=""; RT.youLine="";
        if (wasLive) pycmdSafe("anviva:live:off");
        if (!silent && S.viva && S.viva.session && $(".sheet")) renderBackroom();
      }
      function rtEvent(ev){
        const t = ev && ev.type;
        if (t==="response.created"){
          RT.caption="";
          const el=$("#rtCap"); if(el) el.textContent="";
        } else if (t==="response.output_audio_transcript.delta" || t==="response.audio_transcript.delta"){
          RT.caption += (ev.delta||"");
          const el=$("#rtCap"); if(el) el.textContent=RT.caption;
        } else if (t==="input_audio_buffer.speech_started"){
          RT.youLine="";
          const el=$("#rtYou"); if(el) el.innerHTML="<b>you:</b> …";
        } else if (t==="conversation.item.input_audio_transcription.completed"){
          const said=(ev.transcript||"").trim();
          RT.youLine = said || "(nothing came through)";
          const el=$("#rtYou"); if(el) el.innerHTML="<b>you:</b> "+esc(RT.youLine);
          // grade turns strictly in order, one at a time
          RT.queue = RT.queue.then(()=>rtGrade(said)).catch(()=>{});
        } else if (t==="conversation.item.input_audio_transcription.failed"){
          RT.queue = RT.queue.then(()=>rtGrade("")).catch(()=>{});
        } else if (t==="response.done"){
          if (RT.spokeVerdict){
            // the verdict has been delivered — hang up gently, keep the sheet
            setTimeout(()=>{ if(RT.status!=="off") rtLeave(true); }, 600);
          }
        } else if (t==="error"){
          // surface once, then fall back to the tap-to-speak felt
          if (RT.status==="live" || RT.status==="connecting"){
            toast("The live table dropped — the felt still plays.");
            rtLeave();
          }
        }
      }
      /* One graded live turn: the official transcript goes through the exact
         same bridge as a typed answer; the refreshed session (new probe or a
         verdict) carries the next ledger cue for the voice. */
      async function rtGrade(said){
        if (RT.status!=="live" || !S.viva) return;
        if (!said){
          const cue=(S.viva.data && S.viva.data.rt_silence_cue) || "";
          if (cue) rtCue(cue);
          return;
        }
        await pycmdAck("anviva:answer:"+b64(said));
        if (!S.viva || RT.status!=="live") return;
        try{
          const vd=await getJSON("/_anki/anteViva");
          S.viva.data=vd;
          const sess = (vd.active && vd.active.id===RT.sessId) ? vd.active
            : (vd.last && vd.last.id===RT.sessId ? vd.last : null);
          if (!sess) return;
          S.viva.session=sess;
          if (sess.status!=="open"){
            RT.spokeVerdict = true;   // the ledger closed it; Sahir delivers
            S.viva.saidKey = "live";  // never replay the TTS verdict over him
          }
          renderBackroom();
          if (sess.rt_cue) rtCue(sess.rt_cue);
        }catch(e){}
      }

      /* ===================== THE VAULT ===================== */

      /* ===================== THE MIDNIGHT GAME (ritual + reels) ===================== */

        const body=`
          <div class="mn-hero">

      }
      /* leaving a reel never rewinds it: the scene you were on is kept for the
         night (the reel is nightly, so a fresh day starts a fresh replay) */
      function reelResumeAt(id, scenes){
        const t=todayGame(id);
        const i=t?(t.i|0):0;
        return Math.max(0, Math.min(scenes.length-1, i));
      }
      function openReel(){ const ds=S.data.dreamseed||{}; if(!ds.available){ openMidnight(); return; }
        if(!S.voPlayed){ S.voPlayed=true; playVoice("vo_midnight.mp3"); }
        S.reel={ kind:"reel", i:reelResumeAt("reel", ds.scenes), scenes:ds.scenes, meta:ds }; renderReel(); }
      function playRun(){ const doc=S.data.documentary||{}; if(!doc.available){ openMidnight(); return; }
        S.reel={ kind:"run", i:reelResumeAt("run", doc.chapters), scenes:doc.chapters, meta:doc }; renderReel(); }
      function renderReel(){
        const r=S.reel; if(!r) return;
        const sc=r.scenes[r.i]||{};
        const isRun=r.kind==="run";
        const visual = isRun ? runVisual(sc) : (sc.still ? `<img class="bg" src="${STUDIO(sc.still)}"/>` : "");
        const dots = r.scenes.map((_,i)=>`<i class="${i===r.i?"on":""}"></i>`).join("");
        const num = isRun ? (sc.title||"") : `${r.i+1} / ${r.scenes.length}`;
        const body = `<div class="reel">${visual}<div class="rnum">${esc(num)}</div>
          <div class="rline">${esc(sc.line||"")}</div>
          ${sc.caption?`<div class="note" style="max-width:34ch">${esc(sc.caption)}</div>`:""}
          <div class="reeldots">${dots}</div></div>
          <div class="row" style="justify-content:space-between;margin-top:12px">
            <button class="btn ghost" onclick="closeOverlay()">Close</button>
            <button class="btn primary" onclick="reelNext()">${r.i<r.scenes.length-1?"Next →":"Lights down"}</button></div>`;
        overlay(sheet(isRun?"◆":"☾", isRun?(r.meta.title||"The Run"):"The last hand, replayed", isRun?"your documentary":"replayed slow — then sleep", body, false));
      }
      function runVisual(sc){
        const v=sc.visual||{};
        if(v.kind==="scene" && (v.motion||v.still)){
          return v.motion?`<video class="bg" autoplay loop muted playsinline><source src="${STUDIO(v.motion)}" type="video/mp4"></video>`:`<img class="bg" src="${STUDIO(v.still)}"/>`;
        }
        if(v.kind==="sunrise") return `<div class="sunrise"></div>`;
        if(v.kind==="range" && v.range) return `<div class="bignum num">${v.range[0]}–${v.range[1]}</div>`;
        if(v.kind==="stat" && v.value!=null) return `<div class="bignum num">${esc(String(v.value))}</div>`;
        return "";
      }
      function reelNext(){ const r=S.reel;
        if(r.i<r.scenes.length-1){ r.i++; saveGame(r.kind==="run"?"run":"reel", {date:todayKey(), i:r.i}); renderReel(); }
        else { clearGame(r.kind==="run"?"run":"reel"); toast(r.kind==="run"?"Walk in like you've done this ten thousand times.":"Lights down — your brain plays the night shift."); closeOverlay(); } }

      /* ===================== THE CALL ===================== */
      let RING = { osc:null, timer:null };
      function ringTone(on){
        try{
          if (!on){ clearInterval(RING.timer); RING.timer=null; return; }
          if (!MUSIC.built && !musicBuild()) return;
          const ctx=MUSIC.ctx;
          const burst=()=>{
            const o=ctx.createOscillator(), g=ctx.createGain();
            o.type="sine"; o.frequency.value=740;
            const o2=ctx.createOscillator(); o2.type="sine"; o2.frequency.value=920;
            const g2=ctx.createGain();
            g.gain.value=0; g2.gain.value=0;
            o.connect(g); o2.connect(g2); g.connect(ctx.destination); g2.connect(ctx.destination);
            const t=ctx.currentTime;
            [g,g2].forEach((gg,i)=>{ gg.gain.setValueAtTime(0,t); gg.gain.linearRampToValueAtTime(.05,t+.03+i*.02); gg.gain.setTargetAtTime(0,t+.75,.1); });
            o.start(t); o2.start(t); o.stop(t+1.2); o2.stop(t+1.2);
          };
          burst(); RING.timer=setInterval(burst, 2000);
        }catch(e){}
      }
      function startCall(){
        if (S.call) return;
        S.call = { phase:"ring", n:0, played:[] };
        store.set("anteCall", todayKey());
        renderCall(); ringTone(true);
        syncBackgroundPlayback(); // the call scrim covers the room
      }
      function maybeRing(){
        const d=S.data;
        if (isDemo() || S.film || S.call || S.ob || S.diag) return;
        const hr=new Date().getHours();
        const due=(d.time_back&&d.time_back.due_count)||0;
        if (hr>=12 && hr<17 && due>0 && store.get("anteCall")!==todayKey()){
          setTimeout(()=>{ if(!S.call && !$(".scrim") && !S.film) startCall(); }, 7000);
        }
      }
      function renderCall(){
        const c=S.call; if(!c){ $("#call").innerHTML=""; return; }
        const port = has("dealer.jpg") ? `<img class="port" src="${ASSET("dealer.jpg")}"/>` : `<div class="portbox">${dealerSVG()}</div>`;
        if (c.phase==="ring"){
          $("#call").innerHTML = `<div class="callscrim"><div class="callbox">
            ${port}
            <div class="who">Sahir</div>
            <div class="what">INCOMING · THE EMERALD ROOM</div>
            <div class="note" style="margin:10px auto 18px;max-width:38ch">Three cards, right now, while they're warm. Sixty seconds.</div>
            <div class="row" style="justify-content:center">
              <button class="btn primary big" onclick="answerCall()">Answer</button>
              <button class="btn ghost" onclick="endCall(true)">Not now</button></div>
          </div></div>`;
          return;
        }
        if (c.phase==="done"){
          const who = c.dropped ? "The line dropped." : "That's the hand.";
          const note = c.dropped
            ? `Couldn't reach the engine${c.n?` — the ${c.n} card${c.n===1?"":"s"} you played still counted`:""}. The table's here when the line is back.`
            : `${c.n} card${c.n===1?"":"s"} played off the clock. I'll hold the table.`;
          $("#call").innerHTML = `<div class="callscrim"><div class="callbox">
            ${port}
            <div class="who">${who}</div>
            <div class="note" style="margin:8px auto 18px;max-width:38ch">${note}</div>
            ${c.dropped?`<button class="btn" style="margin-right:8px" onclick="S.call.phase='hand';S.call.dropped=false;renderCall();callDraw()">Try again</button>`:""}
            <button class="btn primary" onclick="endCall()">Back to your day</button>
          </div></div>`;
          return;
        }
        // phase "hand": one big card at a time
        const card=c.card;
        if(!card){ $("#call").innerHTML=`<div class="callscrim"><div class="callbox"><div class="spin"></div></div></div>`; return; }
        const ans = c.show
          ? `<div class="a">${(card.answer||"").replace(card.question,"")||card.answer}</div>`
          : "";
        const controls = c.show
          ? `<div class="easeRow" style="max-width:460px;margin:14px auto 0">
              <button class="e1" onclick="callAnswer(1)">Again</button><button class="e2" onclick="callAnswer(2)">Hard</button>
              <button class="e3" onclick="callAnswer(3)">Good</button><button class="e4" onclick="callAnswer(4)">Easy</button></div>`
          : `<div class="row" style="justify-content:center;margin-top:14px"><button class="btn primary big" onclick="S.call.show=true;renderCall()">Turn it over</button></div>`;
        $("#call").innerHTML = `<div class="callscrim"><div class="callbox" style="max-width:560px">
          <div class="mono" style="font-size:10px;letter-spacing:.2em;color:var(--brass);margin-bottom:12px">ON THE LINE WITH SAHIR · CARD ${c.n+1} OF 3</div>
          <div class="playcard" style="text-align:left">
            <div class="corner">☎</div><div class="corner br">☎</div>
            <div class="kind">rapid recall · ${esc(leaf(card.topic||""))}</div>
            <div class="q">${card.question}</div>${ans}</div>
          ${controls}
          <button class="feltlink" style="margin-top:14px" onclick="endCall()">hang up</button>
        </div></div>`;
      }
      async function answerCall(){
        ringTone(false); musicKick();
        const c=S.call; c.phase="hand"; c.card=null; renderCall();
        playVoice("vo_call_open.mp3");
        await callDraw();
      }
      async function callDraw(){
        const c=S.call; if(!c) return;
        let failed=false;
        try{ const d=await getJSON("/_anki/anteStudy"); c.card = (!d.done && d.card) ? d.card : null; }catch(e){ c.card=null; failed=true; }
        c.show=false;
        if (c.card) c.cardShownAt=Date.now();
        if (!c.card){
          c.phase="done"; c.dropped=failed;
          if(!failed) playVoice("vo_call_done.mp3"); // no victory line on a dead line
        }
        renderCall();
      }
      async function callAnswer(ease){
        const c=S.call; if(!c || c.answering) return;
        c.answering=true;
        const ms=Math.max(0, Date.now()-(c.cardShownAt||Date.now()));
        await pycmdAck("ananswer:"+ease+"::"+ms);
        if (S.call!==c) return;
        c.answering=false; c.n++;
        if (c.n>=3){ c.phase="done"; playVoice("vo_call_done.mp3"); renderCall(); return; }
        c.card=null; renderCall(); setTimeout(callDraw, 160);
      }
      function endCall(declined){
        ringTone(false);
        S.call=null; $("#call").innerHTML="";
        syncBackgroundPlayback(); // resume the room after the call closes
        if(!declined) loadData(true);
      }

      /* ============================== ONBOARDING ============================== */
      function defaultExam(){ const d=new Date(); d.setMonth(d.getMonth()+3); return d.toISOString().slice(0,10); }
      function startOnboard(p){ S.ob={ step:0, exam_date:(p&&p.exam_date)||defaultExam(), target_score:(p&&p.target_score)||512, avatar:(p&&p.avatar)||"" }; renderOnboard(); }
      function renderOnboard(){
        const o=S.ob; if(!o){ startOnboard(S.data.profile||{}); return; }
        if (o.step===1) return renderAvatarPick();
        const body=`<div class="gate" style="max-width:540px;text-align:left">
          <div class="mk" style="font-size:30px;letter-spacing:.12em"><span style="display:inline-block;width:8px;height:28px;background:var(--brass);vertical-align:-3px;margin-right:10px"></span>THE CLOCK</div>
          <div class="tag">One date sets everything. Your whole schedule is computed backward from the day you sit the MCAT — the blinds rise as the final table nears, because <b>when</b> you study beats <b>how much</b>.</div>
          <div class="frow"><label class="flabel">When do you sit?</label><input class="finput" type="date" id="obDate" value="${o.exam_date}"/></div>
          <div class="frow"><label class="flabel">Target (472–528)</label><input class="finput num" type="number" min="472" max="528" id="obTarget" value="${o.target_score}"/></div>
          <div class="row"><button class="btn primary big" onclick="obToAvatar()">Continue → pick your seat</button></div>
          <div class="note" style="margin-top:14px">Next: your seat portrait, then the buy-in game — a short measured baseline, so the Book knows where you actually start and abstains where it has no evidence.</div>
        </div>`;
        $("#root").innerHTML=`<div class="cover">${body}</div>`;
      }
      function obToAvatar(){ const o=S.ob; o.exam_date=($("#obDate")||{}).value||o.exam_date; o.target_score=parseInt(($("#obTarget")||{}).value)||o.target_score;
        o.step=1; renderOnboard(); }
      function renderAvatarPick(){
        const o=S.ob;
        const avatars = AVATARS.map(a=>{
          const sel = o.avatar===a.id ? "sel" : "";
          const img = has(a.id+".jpg") ? `<img src="${ASSET(a.id+".jpg")}"/>` : `<div class="mono-face2">${a.name.split(" ")[1][0]}</div>`;
          return `<button class="avpick ${sel}" onclick="obPick('${a.id}')">${img}<div class="nm">${esc(a.name)}</div></button>`;
        }).join("");
        const body=`<div class="gate" style="max-width:540px;text-align:left">
          <div class="mk" style="font-size:30px;letter-spacing:.12em"><span style="display:inline-block;width:8px;height:28px;background:var(--brass);vertical-align:-3px;margin-right:10px"></span>YOUR SEAT</div>
          <div class="tag">Pick the player who sits across from Sahir. (Cosmetic — the Book only ever grades your answers.)</div>
          <div class="avgrid">${avatars}</div>
          <div class="row"><button class="btn primary big" onclick="obToBuyin()">Continue → the buy-in game</button>
            <button class="btn ghost" onclick="S.ob.step=0;renderOnboard()">Back</button></div>
        </div>`;
        $("#root").innerHTML=`<div class="cover">${body}</div>`;
      }
      function obPick(id){ S.ob.avatar = (S.ob.avatar===id) ? "" : id; renderAvatarPick(); }
      function obToBuyin(){ diagStart(true); }
      async function obFinish(){ const o=S.ob;
        await pycmdAck("anprofile:"+b64(JSON.stringify({exam_date:o.exam_date,target_score:o.target_score,avatar:o.avatar,onboarded:true})));
        S.ob=null; toast("The clock is set. Recalibrated to your exam date."); loadData(true); }

      /* ============ THE BUY-IN GAME (baseline diagnostic) ============ */
      async function diagStart(fromOnboard){
        let payload=null; try{ payload=await getJSON("/_anki/anteDiagnostic"); }catch(e){}
        if(!payload||!payload.form||!payload.form.sections.length){ if(fromOnboard) obFinish(); else toast("The buy-in game is unavailable right now."); return; }
        S.diag={ form:payload.form, si:0, ii:0, phase:null, chosen:null, conf:null, answer:"",
          shownAt:Date.now(), results:{}, answered:0, fromOnboard:!!fromOnboard, mode:"item", secBreak:false };
        // an interrupted buy-in resumes mid-form (the form is deterministic,
        // so the indices land on the same questions)
        const saved = payload.taken ? null : gameState("buyin");
        if (saved && saved.answered>0){
          const d=S.diag;
          d.si=Math.max(0, Math.min(payload.form.sections.length-1, saved.si|0));
          d.ii=Math.max(0, Math.min(payload.form.sections[d.si].count-1, saved.ii|0));
          d.results=saved.results||{}; d.answered=saved.answered|0; d.secBreak=!!saved.secBreak;
          toast(`Back at the buy-in — ${d.answered} answered, resuming where you left it.`);
        }
        renderDiag();
      }
      function diagSnapshot(){
        const d=S.diag; if(!d) return;
        saveGame("buyin", {si:d.si, ii:d.ii, secBreak:d.secBreak, results:d.results, answered:d.answered});
      }
      function diagItem(){ const d=S.diag; const sec=d.form.sections[d.si]; return sec?sec.items[d.ii]:null; }
      function diagCredit(sec,val){ const d=S.diag; d.answered++;
        // val==null means grading was unreachable: the answer is recorded for
        // later but earns no local credit — never scored as a silent 0
        if(val==null) return;
        const r=d.results[sec.id]=d.results[sec.id]||{sum:0,n:0}; r.sum+=val; r.n++; }
      function renderDiag(){
        const d=S.diag; if(!d) return;
        if(d.mode==="summary") return diagSummary();
        const sec=d.form.sections[d.si]; const it=diagItem();
        const done=d.form.sections.slice(0,d.si).reduce((a,s)=>a+s.count,0)+d.ii;
        const prog=Math.round(done/Math.max(1,d.form.total)*100);
        if(d.secBreak){ const last=d.si===d.form.sections.length-1;
          $("#root").innerHTML=cover(`<div class="mono" style="letter-spacing:.16em;color:var(--soft);font-size:11px">${esc(sec.code)} · RECORDED</div>
            <div class="lead" style="margin:10px 0">No score shown mid-game — you get one honest count at the end.</div>
            <button class="btn primary big" onclick="diagNextSection()">${last?"Count my stack →":"Next section →"}</button>`); return; }
        if(!it) return diagSummary();
        const isOpen=it.type==="open";
        const bodyItem = isOpen
          ? `<textarea class="answer" id="diagText" placeholder="A couple of sentences is plenty…" style="background:var(--panel2);border-color:var(--rule);color:var(--ink)">${esc(d.answer||"")}</textarea>
             <div class="note" style="margin-top:10px">Before you lay it down — how sure?</div>
             <div class="conf"><button onclick="diagOpen(0.35)">Check<small>guessing</small></button><button onclick="diagOpen(0.65)">Call<small>fairly</small></button><button onclick="diagOpen(0.9)">Raise<small>sure</small></button></div>`
          : (()=>{ const ch=it.choices.map((c,i)=>{ let cls="choice"; if(d.phase==="conf"&&i===d.chosen)cls+=" correct"; const on=d.phase?"":`onclick="diagPick(${i})"`; return `<button class="${cls}" ${on}>${esc(c)}</button>`; }).join("");
              let t=`<div class="choices">${ch}</div>`;
              if(d.phase==="conf") t+=`<div class="note" style="margin-top:10px">Locked in — how sure?</div><div class="conf"><button onclick="diagConf(0.35)">Check<small>guessing</small></button><button onclick="diagConf(0.65)">Call<small>fairly</small></button><button onclick="diagConf(0.9)">Raise<small>sure</small></button></div>`;
              return t; })();
        $("#root").innerHTML=cover(`<div style="max-width:560px;text-align:left;width:100%">
          <div class="mono" style="letter-spacing:.14em;color:var(--brass);font-size:11px">THE BUY-IN GAME · ${esc(sec.code)}</div>
          <div class="meter" style="margin:10px 0"><i style="width:${prog}%"></i></div>
          <div class="playcard"><div class="kind">${esc(sec.code)}</div><div class="q" style="font-size:21px">${esc(it.stem)}</div>${d.phase==="grading"?'<div class="note" style="color:#5c5340">Recording…</div>':""}</div>
          ${d.phase==="grading"?"":bodyItem}
          <div class="note" style="margin-top:8px">${d.answered} answered · no right/wrong shown</div>
        </div>`) + `<div style="position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:65;display:flex;flex-direction:column;gap:8px;text-align:right">
          <button class="btn ghost" onclick="diagAbort()">Skip the test →</button>
          <div class="note" style="font-size:11px;max-width:20ch">No penalty — the Book simply abstains until it has evidence.</div>
        </div>`;
        if(isOpen) setTimeout(()=>{ const t=$("#diagText"); if(t) t.focus(); },80);
      }
      function diagPick(i){ S.diag.chosen=i; S.diag.phase="conf"; renderDiag(); }
      function diagConf(v){ const d=S.diag; const it=diagItem(); const ms=Date.now()-(d.shownAt||Date.now());
        pycmdSafe(`anquiz:${it.id}:${d.chosen}:${v}:${ms}`); diagCredit(d.form.sections[d.si], d.chosen===it.correct_index?1:0); diagNext(); }
      async function diagOpen(v){ const d=S.diag; const it=diagItem(); const ta=$("#diagText"); const a=ta?ta.value.trim():""; if(!a){ if(ta)ta.focus(); return; }
        const ms=Date.now()-(d.shownAt||Date.now()); d.answer=a; d.phase="grading"; renderDiag();
        let g=null, failed=false;
        try{ g=await getJSON(`/_anki/anteGradeOpen?id=${encodeURIComponent(it.id)}&answer=${encodeURIComponent(a)}`);}catch(e){ failed=true; }
        pycmdSafe(`anopen:${it.id}:${v}:${ms}:${b64(a)}`);
        diagCredit(d.form.sections[d.si], failed||!g ? null : Math.max(0,Math.min(1,g.score||0)));
        diagNext(); }
      function diagNext(){ const d=S.diag; const sec=d.form.sections[d.si]; d.phase=null; d.chosen=null; d.answer=""; d.shownAt=Date.now();
        if(d.ii<sec.count-1) d.ii++; else d.secBreak=true; diagSnapshot(); renderDiag(); }
      function diagNextSection(){ const d=S.diag; d.secBreak=false;
        if(d.si<d.form.sections.length-1){ d.si++; d.ii=0; d.shownAt=Date.now(); diagSnapshot(); renderDiag(); }
        else { d.mode="summary"; pycmdSafe("andiag:done"); clearGame("buyin"); renderDiag(); } }
      async function diagAbort(){ const d=S.diag; clearGame("buyin");
        await pycmdAck(d.answered?"andiag:done":"andiag:skip"); if(d.fromOnboard){ S.diag=null; obFinish(); } else { S.diag=null; loadData(true); } }
      function diagSummary(){
        const d=S.diag;
        const rows=d.form.sections.map(sec=>{ const r=d.results[sec.id]||{sum:0,n:0}; const acc=r.n?r.sum/r.n:null;
          const score=acc==null?null:Math.round(118+14*Math.max(0,Math.min(1,acc))); return {name:sec.name,code:sec.code,n:r.n,acc,score}; });
        const scored=rows.filter(r=>r.n>=4); const total=scored.length===rows.length?rows.reduce((a,r)=>a+r.score,0):null;
        const rowHtml=rows.map(r=>`<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--rule);padding:8px 0">
          <span>${esc(r.name)}</span><b class="num">${r.score!=null?r.score:"—"}</b></div>`).join("");
        const verdict= total!=null?`<div class="kpi num" style="margin-top:10px;color:var(--brass)">${total} <span class="rng">your buy-in · wide band</span></div>`
          :`<div class="note" style="margin-top:10px">Partial count — skipped sections get no reading. The Book doesn't extrapolate.</div>`;
        $("#root").innerHTML=cover(`<div style="max-width:520px;text-align:left;width:100%">
          <div class="stamp">Stack counted</div>${verdict}
          <div style="margin:14px 0">${rowHtml}</div>
          <div class="note">Every answer just fed the Circuit, your comprehension and your calibration — the buy-in <b>is</b> your first hand.</div>
          <div class="row" style="margin-top:16px"><button class="btn primary big" onclick="diagDone()">Into the den →</button></div>
        </div>`);
      }
      function diagDone(){ const d=S.diag; const fromOb=d.fromOnboard; S.diag=null; if(fromOb) obFinish(); else loadData(true); }
      function cover(inner){ return `<div class="cover"><div class="gate" style="max-width:none;width:auto">${inner}</div></div>`; }

      /* ===================== THE SIMULATOR (demo control room) =====================
         Every feature in the app, triggerable from one panel — the whole thing
         runs the real engine over synthetic data (ante/demo.py). */
      function renderSim(){
        const dm=S.data && S.data.demo;
        if (!dm || !dm.enabled){ $("#sim").innerHTML=""; return; }
        if (!S.simOpen){
          $("#sim").innerHTML = `<div class="simchip" onclick="S.simOpen=true;store.set('anteSim','open');renderSim()"><b>◉ SIMULATOR</b> night ${dm.day}/${dm.runway} · ${String(dm.hour).padStart(2,"0")}:00 <span style="color:var(--soft)">open ▾</span></div>`;
          return;
        }
        const jumps=(dm.jumps||[]).map(j=>`<button onclick="simDay(${j.day})">${esc(j.label)}</button>`).join("");
        const hours=[["Morning",9],["Midday",14],["Dusk",19]].map(([n,h])=>
          `<button class="${dm.hour===h?"on":""}" onclick="simHour(${h})">${n}</button>`).join("");
        $("#sim").innerHTML = `
          <div class="simchip" onclick="S.simOpen=false;store.set('anteSim','closed');renderSim()"><b>◉ SIMULATOR</b> night ${dm.day}/${dm.runway} · ${String(dm.hour).padStart(2,"0")}:00 <span style="color:var(--soft)">close ▴</span></div>
          <div class="simpanel">
            <h4>The clock</h4>
            <input type="range" min="0" max="${dm.runway}" value="${dm.day}" onchange="simDay(this.value)"/>
            <div class="simgrid" style="margin-top:6px">${jumps}</div>
            <div class="hourseg" style="margin-top:8px">${hours}</div>
            <h4>The cinema</h4>
            <div class="simgrid">
              <button onclick="filmStart(false)">The film</button>
              <button onclick="startCall()">The Call</button>
            </div>
            <h4>Quizzes & tests</h4>
            <div class="simgrid">
              <button onclick="openPracticeQuiz()">Practice quiz</button>
              <button onclick="openFullLength(1)">Full-length 1</button>
            </div>
            <h4>Nudges — the notification system</h4>
            <div class="simgrid">
              <button onclick="simNudge('retrieval')">Morning game</button>
              <button onclick="simNudge('review')">Midday hold</button>
              <button onclick="simNudge('encode')">Midnight game</button>
              <button onclick="simNudge('reward')">Surprise reward</button>
            </div>
            <div class="note" style="margin-top:6px;font-size:11px">Every nudge also shows in-app. For macOS banners, allow “Script Editor / osascript” under System Settings → Notifications.</div>
            <div class="note" style="margin-top:12px">Every number here is the real engine running on a synthetic 90-night history — nothing touches your collection.</div>
          </div>`;
      }
      function simDo(cmd, after){ pycmdAck(cmd).then(()=>loadData(true)).then(()=>{ if(after) after(); }); }
      function simDay(n){ simDo("andemo:day:"+n); }
      function simHour(h){ simDo("andemo:hour:"+h); }
      const NUDGE_COPY = {
        retrieval:["The morning game opens","Sit down cold: a short recall hand beats an hour of rereading. The deck is already stacked in your favor."],
        review:["Midday — protect your stack","A few minutes now and the House doesn't claw back what you banked."],
        encode:["The midnight game — last hand before lights out","Play a light hand now and your brain banks it overnight. Then lights out."],
        reward:["A table just went your way","You proved a topic on application — that plaque is yours, banked. (Surprise reward, if rewards are on.)"],
      };
      function simNudge(kind){
        // fire the real cue (for the native banner attempt) and always show
        // the in-app nudge card; the panel stays up — it floats above it
        pycmdSafe("annotify:fire:"+kind);
        const c = NUDGE_COPY[kind] || ["Ante","The table's open."];
        if (window.anNudge) anNudge(c[0], c[1]);
      }
      /* ---- utilities ---- */
      function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
      function playAudio(url){ try{ const a=new Audio(url); a.play().catch(()=>{}); }catch(e){} }
      function pollStudio(cb){ let n=0; clearInterval(S.studioPoll);
        S.studioPoll=setInterval(async ()=>{ n++; try{ await loadData(true); }catch(e){} if(cb) cb(); if(n>8) clearInterval(S.studioPoll); }, 4000); }

      /* ===================== KEYBOARD PLAY =====================
         The felt plays from the keys: 1/2/3 for Check/Call/Raise, Space or
         Enter to turn a card, 1–4 to grade (Anki muscle memory), digits to
         pick an answer, Esc to leave the room. Inert while typing. */
      function kbFocusables(sh){
        return Array.from(sh.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])'))
          .filter(el=>!el.disabled && el.offsetParent!==null);
      }
      document.addEventListener("keydown", (e)=>{
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        const key=e.key;
        const sh=$("#ov .sheet");
        // the overlay is modal: keep Tab inside the open sheet
        if (key==="Tab" && sh){
          const f=kbFocusables(sh);
          if (f.length){
            const first=f[0], last=f[f.length-1], cur=document.activeElement;
            if (e.shiftKey && (cur===first || cur===sh || !sh.contains(cur))){ last.focus(); e.preventDefault(); }
            else if (!e.shiftKey && (cur===last || !sh.contains(cur))){ first.focus(); e.preventDefault(); }
          }
          return;
        }
        const t=e.target;
        const typing = t && (t.tagName==="INPUT" || t.tagName==="TEXTAREA" || t.isContentEditable);
        if (typing){
          if (key==="Escape"){ t.blur(); e.preventDefault(); }
          return;
        }
        const eat=(fn)=>{ e.preventDefault(); fn(); };
        if (key==="Escape"){
          if (S.call) return eat(()=>endCall(S.call.phase==="ring"));
          if (S.film) return eat(filmEnd);
          if ($("#ov .scrim")) return eat(closeOverlay);
          return;
        }
        const digit = /^[1-9]$/.test(key) ? parseInt(key) : 0;
        const go = key===" " || key==="Enter";
        // the Call rides above everything
        if (S.call){
          const c=S.call;
          if (c.phase==="ring" && go) return eat(answerCall);
          if (c.phase==="hand" && c.card){
            if (!c.show && go) return eat(()=>{ c.show=true; renderCall(); });
            if (c.show && digit>=1 && digit<=4) return eat(()=>callAnswer(digit));
            if (c.show && key===" ") return eat(()=>callAnswer(3));
          }
          return;
        }
        if (S.film) return; // the film has its own Skip
        const s=S.session;
        if (s){
          if ((s.mode==="intro"||s.mode==="error") && go) return eat(tableBegin);
          if (s.mode==="done" && key==="Enter") return eat(closeOverlay);
          if (s.mode==="card" && s.card){
            if (!s.showAns){
              if (s.conf==null && digit>=1 && digit<=3) return eat(()=>tableReveal([0.2,0.5,0.85][digit-1]));
              if (s.conf!=null && go) return eat(tableFlip);
            } else {
              if (digit>=1 && digit<=4) return eat(()=>tableAnswer(digit));
              if (go) return eat(()=>tableAnswer(3));
            }
            return;
          }
          if (s.mode==="river" && s.item){
            if (s.qphase==="done"){ if (go) return eat(riverNext); return; }
            if (s.item.type!=="open"){
              if (!s.qphase && digit && digit<=(s.item.choices||[]).length) return eat(()=>riverPick(digit-1));
              if (s.qphase==="conf" && digit>=1 && digit<=3) return eat(()=>riverConf([0.3,0.6,0.9][digit-1]));
            }
            return;
          }
          return;
        }
        const f=S.felt;
        if (f && !f.done){
          if (f.mode==="flash" && f.card){
            if (!f.show && go) return eat(()=>{ f.show=true; renderFelt(); });
            if (f.show && go) return eat(feltDraw);
          } else if (f.mode==="mcq" && f.item){
            if (!f.phase && digit && digit<=(f.item.choices||[]).length) return eat(()=>feltPick(digit-1));
            if (f.phase==="done" && go) return eat(feltDraw);
          }
          return;
        }
        const q=S.quiz;
        if (q && q.item){
          if (!q.phase && digit && digit<=(q.item.choices||[]).length) return eat(()=>quizPick(digit-1));
          if (q.phase==="done" && go) return eat(quizAfter);
          return;
        }
        // the buy-in game (Esc never aborts it — skipping is an explicit choice)
        const d=S.diag;
        if (d && d.mode!=="summary"){
          if (d.secBreak){ if (go) eat(diagNextSection); return; }
          const it=diagItem();
          if (it && it.type!=="open" && d.phase!=="grading"){
            if (!d.phase && digit && digit<=(it.choices||[]).length) return eat(()=>diagPick(digit-1));
            if (d.phase==="conf" && digit>=1 && digit<=3) return eat(()=>diagConf([0.35,0.65,0.9][digit-1]));
          }
          return;
        }
      });

      /* the score starts on the first gesture anywhere (autoplay policy) */
      document.addEventListener("pointerdown", ()=>musicKick(), {capture:true});

      /* boot after DOM ready */
      document.addEventListener("DOMContentLoaded", boot);
      if (document.readyState !== "loading") boot();
    </script>
  </body>
</html>
